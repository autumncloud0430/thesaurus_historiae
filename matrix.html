<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>同時代マトリクス</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap');
:root{--bg:#06090f;--gold:#c9a96e;--gold2:#e8c888;--text:#d4cfc6;--text2:#8a857d;--text3:#555048}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");opacity:.4}
.hdr{padding:16px 20px;border-bottom:1px solid rgba(201,169,110,.08);display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.hdr h1{font-family:'Noto Serif JP',serif;font-size:14px;font-weight:700;color:var(--gold2)}
.hdr a{font-size:11px;color:var(--gold);text-decoration:none;opacity:.5}.hdr a:hover{opacity:1}

/* Slider area */
.slider-wrap{padding:12px 20px 8px;border-bottom:1px solid rgba(201,169,110,.04)}
.slider-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.slider-label .era{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:700;color:var(--gold2)}
.slider-label .hint{font-size:8px;color:var(--text3)}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:rgba(201,169,110,.1);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--gold);cursor:pointer;border:2px solid var(--bg);box-shadow:0 0 8px rgba(201,169,110,.4)}
input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--gold);cursor:pointer;border:2px solid var(--bg)}

/* Period buttons */
.period-btns{display:flex;gap:3px;flex-wrap:wrap;padding:6px 20px 10px;border-bottom:1px solid rgba(201,169,110,.04)}
.period-btns button{font-family:'Noto Sans JP',sans-serif;font-size:7px;padding:3px 7px;border:1px solid rgba(201,169,110,.12);border-radius:3px;background:rgba(201,169,110,.03);color:var(--text3);cursor:pointer;transition:all .15s;white-space:nowrap}
.period-btns button:hover{background:rgba(201,169,110,.08);color:var(--text2)}
.period-btns button.active{background:rgba(201,169,110,.12);color:var(--gold2);border-color:rgba(201,169,110,.3)}

/* Cards grid */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px;padding:14px 16px 40px;max-width:1400px;margin:0 auto}
.card{border:1px solid rgba(201,169,110,.08);border-radius:8px;padding:12px 14px;background:rgba(255,255,255,.01);transition:all .2s}
.card:hover{background:rgba(255,255,255,.02);border-color:rgba(201,169,110,.15)}
.card-region{font-family:'Noto Serif JP',serif;font-size:11px;font-weight:700;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid rgba(201,169,110,.06)}
.card-region.r0{color:#88b0d4}
.card-region.r1{color:#d4b888}
.card-region.r2{color:#88d4b0}
.card-region.r3{color:#d4c088}
.card-region.r4{color:#c0a0c0}
.card-body{font-size:9.5px;color:var(--text2);line-height:1.8}
.card-body strong{color:var(--text);font-weight:600}

/* Nav arrows */
.nav-arrows{display:flex;justify-content:center;gap:12px;padding:8px 0}
.nav-arrows button{font-size:11px;padding:4px 16px;border:1px solid rgba(201,169,110,.15);border-radius:4px;background:rgba(201,169,110,.05);color:var(--gold);cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.nav-arrows button:hover{background:rgba(201,169,110,.1)}
.nav-arrows button:disabled{opacity:.2;cursor:default}

.note{text-align:center;padding:8px 20px 32px;max-width:800px;margin:0 auto}.note p{font-size:9px;color:var(--text3);line-height:1.8}.note strong{color:var(--gold)}

@media(max-width:600px){
.hdr{padding:10px 12px}.hdr h1{font-size:11px}
.slider-wrap{padding:8px 12px}
.slider-label .era{font-size:14px}
.period-btns{padding:4px 12px;gap:2px}
.period-btns button{font-size:6px;padding:2px 5px}
.grid{grid-template-columns:1fr;gap:8px;padding:10px 12px 30px}
.card{padding:10px 12px}
.card-region{font-size:10px}
.card-body{font-size:9px}
.nav-arrows button{font-size:10px;padding:3px 12px}
.note p{font-size:8px}
}
</style>
</head>
<body>
<div class="hdr"><h1>同時代マトリクス ― 「その時、世界では何が起きていたか」</h1><a href="index.html">← Ad Indicem</a></div>

<div class="slider-wrap">
 <div class="slider-label">
 <span class="era" id="era-label">前500頃</span>
 <span class="hint">← スライダーまたはボタンで時代を選択 →</span>
 </div>
 <input type="range" id="slider" min="0" max="36" value="0" step="1">
</div>

<div class="period-btns" id="period-btns"></div>

<div class="nav-arrows">
 <button id="prev-btn" onclick="navigate(-1)">◀ 前の時代</button>
 <button id="next-btn" onclick="navigate(1)">次の時代 ▶</button>
</div>

<div class="grid" id="grid"></div>

<div class="note"><p>同時代マトリクス＝<strong>「同じ時代に世界各地で何が起きていたか」を一覧できるツール</strong>。スライダーを動かして各時代の5地域を比較してみてください。</p></div>

<script>

"インド＝★経済自由化(1991マンモーハン＝シン財務相→ラーオ首相)→規制緩和・外資導入→IT産業の急成長(バンガロール＝「インドのシリコンバレー」)→BRICSの一角→GDP世界5位へ。★ヒンドゥー・ナショナリズムの台頭(BJP＝インド人民党→アヨーディヤーのモスク破壊1992→宗教対立)。東南アジア＝★ASEAN拡大(ベトナム1995・ミャンマー・ラオス1997・カンボジア1999→10カ国に)→ただし★アジア通貨危機(1997タイから→インドネシア＝スハルト退陣1998)→IMF介入→構造改革。東ティモール独立(2002インドネシアから)。ミャンマー＝アウンサンスーチーの民主化運動→軟禁","★中国＝天安門事件(1989.6.4→民主化運動を武力弾圧→国際的非難)→ただし★経済改革は加速(鄧小平「南巡講話」1992→市場経済化を加速)→★WTO加盟(2001)→「世界の工場」→★GDP世界2位(2010)→習近平(2012→一帯一路2013→南シナ海の軍事拠点化→米中対立の激化)。韓国＝★民主化(1987六月民主抗争→直接選挙)→★IMF危機(1997→構造改革)→IT先進国(サムスン・LG)→K-POP・韓流の世界的拡散。日本＝★バブル崩壊(1991→「失われた10年→20年→30年」)→阪神大震災(1995)→小泉構造改革→リーマンショック(2008)→東日本大震災・福島原発事故(2011)→安倍政権(2012-20)。台湾＝★民主化(1996初の総統直接選挙→李登輝)→政権交代(2000民進党・陳水扁)→中台関係の緊張","米＝冷戦後の「唯一の超大国」(★パクス＝アメリカーナ)→★9.11同時多発テロ(2001.9.11→ブッシュ「テロとの戦い」→アフガニスタン戦争2001→イラク戦争2003→大量破壊兵器は見つからず)→★オバマ(2009初の黒人大統領→医療保険改革)→★トランプ(2017「アメリカ＝ファースト」→パリ協定離脱・TPP離脱・米中貿易戦争)。ラテンアメリカ＝民主化の波→ただし左派の台頭(チャベス＝ベネズエラ・モラレス＝ボリビア・ルラ＝ブラジル)→揺り戻し。アフリカ＝★ルワンダ虐殺(1994→約80万人のツチ族が殺害→「国際社会の不介入」の象徴)→ただし経済成長も(携帯電話革命・中国の投資)。★南アフリカ＝アパルトヘイト撤廃(1991)→★マンデラ大統領(1994)＝「虹の国」→ただし経済格差は継続"],["2000頃","★EU拡大(2004年に旧東欧10カ国が加盟→27カ国に)。ユーロ流通(2002)。ただしリスボン条約(2007)・債務危機(ギリシア2010)→EU懐疑論の台頭→★ブレグジット(英のEU離脱・国民投票2016→離脱2020)。ロシア＝プーチン政権(2000-)→権威主義化→★ウクライナ侵攻(2022)。テロとの戦い(9.11→アフガン・イラク戦争)→ISの台頭と壊滅","★9.11同時多発テロ(2001)→アフガニスタン戦争(2001-)→★イラク戦争(2003)→フセイン政権崩壊→宗派対立→IS(「イスラーム国」)の台頭(2014)→壊滅。★「アラブの春」(2011)→チュニジア・エジプト・リビアで政権崩壊→ただしシリア内戦(2011-)→難民危機。イラン核合意(2015→米が離脱2018)。サウジvsイランの代理戦争(イエメン)","インド＝★IT産業の急成長(バンガロール)。経済自由化の成果→BRICSの一角。核保有(1998実験)。モディ政権(2014-)→ヒンドゥー・ナショナリズム。東南アジア＝★ASEAN経済共同体(2015)→中国の南シナ海進出への対応。ミャンマー＝民主化(2010s→2021軍事クーデタ)。インドネシア＝世界最大のイスラーム国家→民主化の成功例","★中国＝WTO加盟(2001)→「世界の工場」→GDP世界2位(2010)→★習近平(2012-)→一帯一路構想(2013)→米中対立の激化(貿易戦争→技術覇権争い)。★北朝鮮核問題。韓国＝IT先進国→K-POP・韓流の世界的拡散。日本＝「失われた20年」→安倍政権(2012-20)→東日本大震災(2011)。台湾＝民主化の深化→中台関係の緊張","米＝★9.11(2001)→「テロとの戦い」→オバマ(2009-17初の黒人大統領)→トランプ(2017-21「アメリカ・ファースト」)→バイデン(2021-)。★SNS革命(Facebook・Twitter→情報空間の変容)。ラテンアメリカ＝左派の台頭(チャベス・モラレス・ルラ)→揺り戻し。アフリカ＝経済成長(携帯電話革命)→ただし紛争も(ソマリア・コンゴ・南スーダン)。★SDGs(2015)→気候変動が最大の課題に"]];

var REGIONS = ['ヨーロッパ','西アジア・北アフリカ','南・東南アジア','東アジア','南北アメリカ・アフリカ'];
var currentIdx = 0;

function render(idx) {
 currentIdx = idx;
 var row = DATA[idx];
 document.getElementById('era-label').textContent = row[0];
 document.getElementById('slider').value = idx;

 // Update buttons
 var btns = document.querySelectorAll('.period-btns button');
 for (var i = 0; i < btns.length; i++) {
 btns[i].classList.toggle('active', i === idx);
 }

 // Update nav
 document.getElementById('prev-btn').disabled = (idx === 0);
 document.getElementById('next-btn').disabled = (idx === DATA.length - 1);

 // Render cards
 var grid = document.getElementById('grid');
 grid.innerHTML = '';
 for (var r = 0; r < REGIONS.length; r++) {
 var card = document.createElement('div');
 card.className = 'card';
 var body = row[r + 1].replace(/★/g, '<strong>★</strong>');
 // Bold text between ★ markers is already using strong tags from data
 card.innerHTML = '<div class="card-region r' + r + '">' + REGIONS[r] + '</div><div class="card-body">' + body + '</div>';
 grid.appendChild(card);
 }
}

function navigate(dir) {
 var newIdx = currentIdx + dir;
 if (newIdx >= 0 && newIdx < DATA.length) render(newIdx);
}

// Slider
document.getElementById('slider').addEventListener('input', function {
 render(parseInt(this.value));
});

// Period buttons
var btnContainer = document.getElementById('period-btns');
for (var i = 0; i < DATA.length; i++) {
 var btn = document.createElement('button');
 btn.textContent = DATA[i][0];
 btn.setAttribute('data-idx', i);
 btn.addEventListener('click', function {
 render(parseInt(this.getAttribute('data-idx')));
 });
 btnContainer.appendChild(btn);
}

// Keyboard nav
document.addEventListener('keydown', function(e) {
 if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault; navigate(-1); }
 if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault; navigate(1); }
});

// Init
render(0);
</script>
