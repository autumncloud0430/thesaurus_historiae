var ERA_YEARS=[-3000,-2000,-1500,-1000,-700,-500,-400,-323,-300,-200,-100,-1,100,200,300,400,500,600,700,800,900,1000,1100,1200,1279,1300,1400,1492,1530,1600,1650,1700,1715,1783,1800,1815,1880,1900,1914,1920,1930,1938,1945,1960,1994,2000];

var DATA=R.map(function(r){
 var yN=pY(r[1]);
 var bestIdx=0,bestDist=Infinity;
 ERA_YEARS.forEach(function(ey,i){var d=Math.abs((yN||0)-ey);if(d<bestDist){bestDist=d;bestIdx=i}});
 return{n:r[0],y:r[1],la:r[2],lo:r[3],d:r[4],cat:r[5],yN:yN,eraIdx:bestIdx};
}).filter(function(d){return d.eraIdx===38});

var activeCats={B:true,T:true,C:true,S:true};
var pointMarkers=[],labelLayer=null,currentFiltered=[];

function toggleCat(cat){
 activeCats[cat]=!activeCats[cat];
 var any=false;for(var k in activeCats)if(activeCats[k])any=true;
 if(!any)activeCats[cat]=true;
 for(var k in CATS){document.getElementById("p"+k.toLowerCase()).className="tb"+(activeCats[k]?" on":"")}
 renderPoints;
}

function getFiltered(){
 var d=DATA.filter(function(x){return activeCats[x.cat]});
 var s=document.getElementById("search").value.toLowerCase();
 if(s)d=d.filter(function(x){return x.n.toLowerCase().indexOf(s)>=0||x.d.toLowerCase().indexOf(s)>=0});
 return d.sort(function(a,b){return(a.yN||0)-(b.yN||0)});
}

function renderPoints(){
 pointMarkers.forEach(function(m){map.removeLayer(m)});pointMarkers=[];
 if(labelLayer){map.removeLayer(labelLayer)}
 labelLayer=L.layerGroup.addTo(map);
 var items=getFiltered;currentFiltered=items;
 items.forEach(function(d){
 var cc=CATS[d.cat];
 var r=d.cat==="S"?4:d.cat==="C"?4.5:5.5;
 [0,-360,360].forEach(function(off){
 var hit=L.circleMarker([d.la,d.lo+off],{radius:14,fillColor:"transparent",fillOpacity:0,stroke:false,interactive:true}).addTo(map);
 var dot=L.circleMarker([d.la,d.lo+off],{radius:r,fillColor:cc.c,fillOpacity:0.7,color:"rgba(255,255,255,0.2)",weight:1,opacity:0.4,interactive:false}).addTo(map);
 hit.bindPopup(
 "<div style='font-weight:700;font-size:13px;color:"+cc.c+"'>"+cc.l.slice(0,2)+" "+d.n+"</div>"+
 "<div style='font-size:10px;color:#777'>"+d.y+"</div>"+
 "<div style='font-size:11px;color:#aaa;line-height:1.5;margin-top:3px'>"+d.d+"</div>",
 {className:"tp",maxWidth:300}
 );
 hit._d=d;dot._d=d;pointMarkers.push(hit);pointMarkers.push(dot);
 });
 });
 document.getElementById("cnt").textContent=items.length+"\u4ef6";
 pointMarkers.forEach(function(m){try{m.bringToFront}catch(e){}});
 updateLabels;
}

function updateLabels(){
 if(labelLayer){map.removeLayer(labelLayer)}
 labelLayer=L.layerGroup.addTo(map);
 var zoom=map.getZoom;if(zoom<5)return;
 var bounds=map.getBounds.pad(0.1);
 var max=zoom<7?80:300,count=0;
 for(var i=0;i<currentFiltered.length;i++){
 if(count>=max)break;
 var d=currentFiltered[i];
 if(!bounds.contains([d.la,d.lo]))continue;
 var cc=CATS[d.cat];
 var lbl=L.tooltip({permanent:true,direction:"right",offset:[6,0],className:"ml ml-"+d.cat,opacity:1});
 lbl.setContent(d.n);lbl.setLatLng([d.la,d.lo]);
 labelLayer.addLayer(lbl);count++;
 }
}
var lt=null;
function dbl(){if(lt)clearTimeout(lt);lt=setTimeout(updateLabels,150)}
map.on("zoomend",dbl);map.on("moveend",dbl);

renderPoints;
</script>
