ルク裁判(1945-46)。&quot;}"><rect x="1638.0645161290322" y="83" width="741.9354838709678" height="24" rx="3" fill="rgba(100,30,30,.3)" stroke="rgba(100,30,30,.45)" stroke-width="0.5"/><text x="2009.032258064516" y="97.5" text-anchor="middle" fill="var(--text)" font-size="6" font-family="Noto Serif JP" font-weight="700">ホロコースト</text></g><rect x="80" y="114" width="2300" height="30" fill="rgba(255,255,255,.01)" rx="2"/><text x="4" y="132.0" fill="var(--gold2)" font-size="7" font-family="Noto Serif JP" font-weight="700">イタリア</text><g data-tip="{&quot;n&quot;: &quot;イタリアの中立&quot;, &quot;e&quot;: &quot;1914-15&quot;, &quot;d&quot;: &quot;三国同盟(独墺伊)だったが中立。ロンドン秘密条約で「未回収のイタリア」を約束され連合国側へ。&quot;}"><rect x="80.0" y="117" width="74.19354838709677" height="24" rx="3" fill="rgba(160,155,130,.15)" stroke="rgba(160,155,130,.25)" stroke-width="0.5"/><text x="117.09677419354838" y="131.5" text-anchor="middle" fill="var(--text)" font-size="6" font-family="Noto Serif JP" font-weight="700">中立</text></g><g data-tip="{&quot;n&quot;: &quot;イタリアのWW1&quot;, &quot;e&quot;: &quot;1915-18&quot;, &quot;d&quot;: &quot;墺と苦戦。カポレット惨敗(1917)。ヴィットリオ＝ヴェネト(1918)で勝利。しかし戦後領土不満→「勝利なき勝利者」。&quot;}"><rect x="154.19354838709677" y="117" width="222.5806451612903" height="24" rx="3" fill="rgba(70,120,180,.3)" stroke="rgba(70,120,180,.45)" stroke-width="0.5"/><text x="265.48387096774195" y="131.5" text-anchor="middle" fill="var(--text)" font-size="6" font-family="Noto Serif JP" font-weight="700">WW1:連合国</text></g><g data-tip="{&quot;n&quot;: &quot;イタリア戦後&quot;, &quot;e&quot;: &quot;1919-22&quot;, &quot;d&quot;: &quot;領土不満＋経済危機。ダンヌンツィオのフィウメ占領。労働争議→中産階級がファシズムに期待。&quot;}"><rect x="450.96774193548384" y="117" width="222.5806451612903" height="24" rx="3" fill="rgba(80,150,110,.18)" stroke="rgba(80,150,110,.28)" stroke-width="0.5"/><text x="562.258064516129" y="131.5" text-anchor="middle" fill="var(--text)" font-size="6" font-family="Noto Serif JP" font-weight="700">戦後混乱</text></g><g data-tip="{&quot;n&quot;: &quot;ムッソリーニ(戦前) ipt>var tt=document.getElementById("tooltip");document.querySelectorAll("[data-tip]").forEach(function(el){el.style.cursor="pointer";el.addEventListener("mouseenter",function(e){var d=JSON.parse(el.getAttribute("data-tip"));tt.querySelector(".tt-name").textContent=d.n||"";tt.querySelector(".tt-era").textContent=d.e||"";tt.querySelector(".tt-desc").textContent=d.d||"";tt.style.display="block";var r=el.getBoundingClientRect();var tx=Math.min(r.left,window.innerWidth-370);var ty=r.bottom+6;if(ty+tt.offsetHeight>window.innerHeight)ty=r.top-tt.offsetHeight-6;tt.style.left=Math.max(4,tx)+"px";tt.style.top=ty+"px"});el.addEventListener("mouseleave",function(){tt.style.display="none"})});</script></body></html>
