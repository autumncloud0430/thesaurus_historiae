</style></head><body><div class="hdr"><h1>冷戦年表タイムライン(1945-1991)</h1><a href="charts.html">← Ad Chartae</a></div><div class="legend"><div class="li"><div class="ld" style="background:rgba(100,130,180,.15);border:1px solid rgba(100,130,180,.25)"></div>米大統領</div><div class="li"><div class="ld" style="background:rgba(100,150,130,.12);border:1px solid rgba(100,150,130,.22)"></div>英首相</div><div class="li"><div class="ld" style="background:rgba(180,80,80,.2);border:1px solid rgba(180,80,80,.3)"></div>東側</div><div class="li"><div class="ld" style="background:rgba(80,150,120,.2);border:1px solid rgba(80,150,120,.3)"></div>第三世界</div><div class="li" style="font-size:6px">各バーにマウスオーバーで詳細 ← 横スクロール →</div></div><div class="wrap"><svg viewBox="0 0 1800 320" xmlns="http://www.w3.org/2000/svg" style="width:1800px;height:320px;min-width:1800px"><defs><style>g[data-tip]:hover rect{filter:brightness(1.3)}</style></defs><line x1="90.0" y1="32" x2="90.0" y2="320" stroke="rgba(255,255,255,.015)"/><text x="90.0" y="30" text-anchor="middle" fill="rgba(201,169,110,.25)" font-size="6" font-family="Cormorant Garamond">1945</text><line x1="273.695652173913" y1="26" x2="273.695652173913" y2="320" stroke="rgba(201,169,110,.06)"/><text x="273.695652173913" y="22" text-anchor="middle" fill="rgba(201,169,110,.5)" font-size="8" font-family="Cormorant Garamond" font-weight="700">1950</text><line x1="457.39130434782606" y1="32" x2="457.39130434782606" y2="320" stroke="rgba(255,255,255,.015)"/><text x="457.39130434782606" y="30" text-anchor="middle" fill="rgba(201,169,110,.25)" font-size="6" font-family="Cormorant Garamond">1955</text><line x1="641.0869565217391" y1="26" x2="641.0869565217391" y2="320" stroke="rgba(201,169,110,.06)"/><text x="641.0869565217391" y="22" text-anchor="middle" fill="rgba(201,169,110,.5)" font-size="8" font-family="Cormorant Garamond" font-weight="700">1960</text><line x1="824.7826086956521" y1="32" x2="824.7826086956521" y2="320" stroke="rgba(255,255,255,.015)"/><text x="824.7826086956521" y="30" text-anchor="middle" fill="rgba(201,169,110,.25)" font-size="6" font-family="Cormorant Garamond">1965</text><line x1="1008.4782608695651" y1="26" x2="1008.4782608695651" y2="320" stroke="rgba(201,169,110,.06)"/><text x="1008.4782608695651" y="22" text-anchor="middle" fill="rgba(201,169,110,.5)" font-size="8" font-family="Cormorant Garamond" font-weight="700">1970</text><line x1="1192.1739130434783" y1="32" x2="1192.1739130434783" y2="320" stroke="rgba(255,255,255,.015)"/><text x="1192.1739130434783" y="30" text-anchor="middle" fill="rgba(201,169,110,.25)" font-size="6" font-family="Cormorant Garamond">1975</text><line x1="1375.8695652173915" y1="26" x2="1375.8695652173915" y2="320" stroke="rgba(201,169,110,.06)"/><text x="1375.8695652173915" y="22" text-anchor="middle" fill="rgba(201,169,110,.5)" font-size="8" font-family="Cormorant Garamond" font-weight="700">1980</text><line x1="1559.5652173913043" y1="32" x2="1559.5652173913043" y2="320" stroke="rgba(255,255,255,.015)"/><text x="1559.5652173913043" y="30" text-anchor="middle" fill="rgba(201,169,110,.25)" font-size="6" font-family="Cormorant Garamond">1985</text><line x1="1743.2608695652175" y1="26" x2="1743.2608695652175" y2="320" stroke="rgba(201,169,110,.06)"/><text x="1743.2608695652175" y="22" text-anchor="middle" fill="rgba(201,169,110,.5)" font-size="8" font-family="Cormorant Garamond" font-weight="700">1990</text><text x="4" y="58" fill="var(--gold2)" font-size="7" font-family="Noto Serif JP" font-weight="700">米大統領</text><g data-tip="{&quot;n&quot;: &quot;トルーマン(民主党)&quot;, &quot;e&quot;: &quot;1945-53&quot;, &quot;d&quot;: &quot;広島・長崎への原爆投下決定。トルーマン＝ドクトリン(1947)＝共産主義の封じ込め宣言(ギリシャ・トルコへの軍事援助)。マーシャル＝プラン(1947)＝西欧復興計画で共産主義の浸透を防止。NATO創設(1949)。ベルリン封鎖(1948-49)→大空輸。朝鮮戦争参戦(1950)→マッカーサー解任。NSC-68＝軍事予算の大幅増額。&quot;}"><rect x="90.0" y="50" width="293.9130434782609" height="16" rx="3" fill="rgba(100,130,180,.15)" stroke="rgba(100,130,180,.25)" stroke-width="0.5"/><text x="236.95652173913044" y="61.0" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">トルーマン</text></g><g data-tip="{&quot;n&quot;: &quot;アイゼンハワー(共和党)&quot;, &quot;e&quot;: &quot;1953-61&quot;, &quot;d&quot;: &quot;WW2欧州連合軍最高司令官出身。朝鮮戦争休戦(1953)。「大量報復戦略」＝核兵器による抑止。スエズ危機(1956)で英仏の介入を制止→米ソ二極体制の明確化。ハンガリー事件(1956)は不介入。U-2偵察機撃墜事件(1960)で米ソ関係悪化。退任演説で「軍産複合体」への警告。&quot;}"><rect x="383.9130434782609" y="50" width="293.9130434782609" height="16" rx="3" fill="rgba(100,130,180,.15)" stroke="rgba(100,130,180,.25)" stroke-width="0.5"/><text x="530.8695652173913" y="61.0" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">アイゼンハワー</text></g><g data-tip="{&quot;n&quot;: &quot;ケネディ(民主党)&quot;, &quot;e&quot;: &quot;1961-63&quot;, &quot;d&quot;: &quot;43歳で就任(史上最年少)。「ニューフロンティア」。ピッグス湾事件(1961)＝キューバ侵攻の失敗。キューバ危機(1962.10)＝ソ連のミサイル配備をめぐり核戦争の瀬戸際→フルシチョフと交渉で撤去。部分的核実験禁止条約(PTBT、1963)。公民権運動を支持。1963年11月ダラスで暗殺。「ベルリン市民」演説。&quot;}"><rect x="677.8260869565217" y="50" width="73.47826086956525" height="16" rx="3" fill="rgba(100,130,180,.15)" stroke="rgba(100,130,180,.25)" stroke-width="0.5"/><text x="714.5652173913044" y="61.0" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">ケネディ</text></g><g data-tip="{&quot;n&quot;: &quot;ジョンソン(民主党)&quot;, &quot;e&quot;: &quot;1963-69&quot;, &quot;d&quot;: &quot;ケネディ暗殺で昇格。公民権法(1964)・投票権法(1965)を成立＝人種差別の法的解消。「偉大な社会」＝メディケア等の福祉拡充。トンキン湾決議(1964)→ベトナム戦争の本格的軍事介入(最大54万人を派兵)。反戦運動の高まりで再選を断念。&quot;}"><rect x="751.304347826087" y="50" width="220.43478260869563" height="16" rx="3" fill="rgba(100,130,180,.15)" stroke="rgba(100,130,180,.25)" stroke-width="0.5"/><text x="861.5217391304348" y="61.0" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">ジョンソン</text></g><g data-tip="{&quot;n&quot;: &quot;ニクソン(共和党)&quot;, &quot;e&quot;: &quot;1969-74&quot;, &quot;d&quot;: &quot;デタント(緊張緩和)の推進者。キッシンジャーを国家安全保障補佐官に起用。ニクソン訪中(1972)＝米中接近→冷戦構造の転換。SALT I(1972)＝米ソの核軍備制限。ベトナムの「名誉ある撤退」→パリ和平協定(1973)。ウォーターゲート事件(1974)で辞任(史上唯一)。&quot;}"><rect x="971.7391304347826" y="50" width="183.69565217391312" height="16" rx="3" fill="rgba(100,130,180,.15)" stroke="rgba(100,130,180,.25)" stroke-width="0.5"/><text x="1063.5869565217392" y="61.0" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">ニクソン</text></g><g data-tip="{&quot;n&quot;: &quot;フォード(共和党)&quot;, &quot;e&quot;: &quot;1974-77&quot;, &quot;d&quot;: &quot;ニクソン辞任により副大統領から昇格(選挙を経ずに就任した唯一の大統領)。ニクソンに恩赦を与え批判を浴びる。ヘルシンキ宣言(1975)＝欧州安全保障協力会議(CSCE)。サイゴン陥落(1975)＝ベトナム戦争の完全な敗北。&quot;}"><rect x="1155.4347826086957" y="50" width="110.21739130434776" height="16" rx="3" fill="rgba(100,130,180,.15)" stroke="rgba(100,130,180,.25)" stroke-width="0.5"/><text x="1210.5434782608695" y="61.0" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">フォード</text></g><g data-tip="{&quot;n&quot;: &quot;カーター(民主党)&quot;, &quot;e&quot;: &quot;1977-81&quot;, &quot;d&quot;: &quot;人権外交を掲げる。キャンプ＝デービッド合意(1978)＝エジプトのサダトとイスラエルのベギンの和平→初のアラブ・イスラエル平和条約。イラン革命(1979)→アメリカ大使館人質事件(444日間)。ソ連アフガニスタン侵攻(1979)→SALT II批准拒否・モスクワ五輪ボイコット→デタントの終焉。&quot;}"><rect x="1265.6521739130435" y="50" width="146.9565217391305" height="16" rx="3" fill="rgba(100,130,180,.15)" stroke="rgba(100,130,180,.25)" stroke-width="0.5"/><text x="1339.1304347826087" y="61.0" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">カーター</text></g><g data-tip="{&quot;n&quot;: &quot;レーガン(共和党)&quot;, &quot;e&quot;: &quot;1981-89&quot;, &quot;d&quot;: &quot;「強いアメリカ」の復活。ソ連を「悪の帝国」と呼ぶ。SDI(戦略防衛構想、スターウォーズ計画)→軍拡競争でソ連の財政を圧迫。グレナダ侵攻(1983)。レーガノミクス＝減税・規制緩和。ゴルバチョフとの関係改善→INF条約(1987)＝中距離核ミサイル全廃。イラン＝コントラ事件。&quot;}"><rect x="1412.608695652174" y="50" width="293.91304347826076" height="16" rx="3" fill="rgba(100,130,180,.15)" stroke="rgba(100,130,180,.25)" stroke-width="0.5"/><text x="1559.5652173913045" y="61.0" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">レーガン</text></g><g data-tip="{&quot;n&quot;: &quot;ブッシュ(共和党)&quot;, &quot;e&quot;: &quot;1989-93&quot;, &quot;d&quot;: &quot;マルタ会談(1989.12)＝ゴルバチョフと冷戦終結を宣言。ベルリンの壁崩壊(1989.11)→ドイツ統一(1990.10)を支持。湾岸戦争(1991)＝イラクのクウェート侵攻に対し多国籍軍を組織。ソ連崩壊(1991.12)に立ち会い「新世界秩序」を宣言。START I(1991)＝戦略核兵器削減。&quot;}"><rect x="1706.5217391304348" y="50" width="73.47826086956525" height="16" rx="3" fill="rgba(100,130,180,.15)" stroke="rgba(100,130,180,.25)" stroke-width="0.5"/><text x="1743.2608695652175" y="61.0" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">ブッシュ</text></g><text x="4" y="76" fill="var(--gold2)" font-size="7" font-family="Noto Serif JP" font-weight="700">英首相</text><g data-tip="{&quot;n&quot;: &quot;アトリー(労働党)&quot;, &quot;e&quot;: &quot;1945-51&quot;, &quot;d&quot;: &quot;チャーチルを破って当選。戦後福祉国家建設＝NHS(国民保健サービス)創設(1948)・主要産業国有化(鉄道・石炭・鉄鋼)。インド・パキスタン独立(1947)・パレスチナ撤退→帝国の解体開始。NATO参加。マーシャル＝プランを受け入れ。&quot;}"><rect x="90.0" y="68" width="220.43478260869563" height="14" rx="3" fill="rgba(100,150,130,.12)" stroke="rgba(100,150,130,.22)" stroke-width="0.5"/><text x="200.2173913043478" y="78.0" text-anchor="middle" fill="var(--text)" font-size="4.5" font-family="Noto Serif JP" font-weight="700">アトリー</text></g><g data-tip="{&quot;n&quot;: &quot;チャーチル(保守党)&quot;, &quot;e&quot;: &quot;1951-55&quot;, &quot;d&quot;: &quot;WW2の英雄が首相に復帰。「鉄のカーテン」演説(1946)は野党時代。冷戦期の英米「特別な関係」を強化。エリザベス2世即位(1952)。高齢(77歳)と健康悪化で1955年辞任。&quot;}"><rect x="310.4347826086956" y="68" width="146.95652173913044" height="14" rx="3" fill="rgba(100,150,130,.12)" stroke="rgba(100,150,130,.22)" stroke-width="0.5"/><text x="383.9130434782609" y="78.0" text-anchor="middle" fill="var(--text)" font-size="4.5" font-family="Noto Serif JP" font-weight="700">チャーチル</text></g><g data-tip="{&quot;n&quot;: &quot;イーデン(保守党)&quot;, &quot;e&quot;: &quot;1955-57&quot;, &quot;d&quot;: &quot;外相として長年の経験。スエズ危機(1956)＝ナセルのスエズ運河国有化に対し英仏イスラエルがエジプトに軍事介入→米ソ双方の反対で撤退を余儀なくされる。大英帝国の限界を世界に露呈。失敗の責任を取り辞任。&quot;}"><rect x="457.39130434782606" y="68" width="73.47826086956519" height="14" rx="3" fill="rgba(100,150,130,.12)" stroke="rgba(100,150,130,.22)" stroke-width="0.5"/><text x="494.13043478260863" y="78.0" text-anchor="middle" fill="var(--text)" font-size="4.5" font-family="Noto Serif JP" font-weight="700">イーデン</text></g><g data-tip="{&quot;n&quot;: &quot;マクミラン(保守党)&quot;, &quot;e&quot;: &quot;1957-63&quot;, &quot;d&quot;: &quot;「変化の風」演説(1960)＝南アフリカの国会でアフリカの脱植民地化を容認する歴史的演説。EEC加盟申請→ド＝ゴールのフランスが拒否(1963)。部分的核実験禁止条約(1963)。プロフューモ事件で退陣。「国民はかつてこれほど豊かだったことはない」。&quot;}"><rect x="530.8695652173913" y="68" width="220.43478260869574" height="14" rx="3" fill="rgba(100,150,130,.12)" stroke="rgba(100,150,130,.22)" stroke-width="0.5"/><text x="641.0869565217391" y="78.0" text-anchor="middle" fill="var(--text)" font-size="4.5" font-family="Noto Serif JP" font-weight="700">マクミラン</text></g><g data-tip="{&quot;n&quot;: &quot;ウィルソン(労働党)&quot;, &quot;e&quot;: &quot;1964-70&quot;, &quot;d&quot;: &quot;ベトナム戦争への英軍派兵を拒否(米との同盟は維持)。ポンド切り下げ(1967)。スエズ以東からの英軍撤退を決定(1968)→帝国の終焉。北アイルランド問題が深刻化。&quot;}"><rect x="788.0434782608696" y="68" width="220.4347826086955" height="14" rx="3" fill="rgba(100,150,130,.12)" stroke="rgba(100,150,130,.22)" stroke-width="0.5"/><text x="898.2608695652174" y="78.0" text-anchor="middle" fill="var(--text)" font-size="4.5" font-family="Noto Serif JP" font-weight="700">ウィルソン</text></g><g data-tip="{&quot;n&quot;: &quot;ヒース(保守党)&quot;, &quot;e&quot;: &quot;1970-74&quot;, &quot;d&quot;: &quot;EC(欧州共同体)加盟(1973.1)を実現。第一次石油危機(1973)→英経済の打撃。炭鉱ストで「週3日勤務」を強制→選挙で敗北。&quot;}"><rect x="1008.4782608695651" y="68" width="146.9565217391306" height="14" rx="3" fill="rgba(100,150,130,.12)" stroke="rgba(100,150,130,.22)" stroke-width="0.5"/><text x="1081.9565217391305" y="78.0" text-anchor="middle" fill="var(--text)" font-size="4.5" font-family="Noto Serif JP" font-weight="700">ヒース</text></g><g data-tip="{&quot;n&quot;: &quot;ウィルソン→キャラハン(労働党)&quot;, &quot;e&quot;: &quot;1974-79&quot;, &quot;d&quot;: &quot;ウィルソンが1976年辞任→キャラハンが後継。IMFからの借り入れ(1976)＝英経済の衰退の象徴。「不満の冬(Winter of Discontent)」(1978-79)＝公務員ストの頻発。サッチャーの保守党に大敗。&quot;}"><rect x="1155.4347826086957" y="68" width="183.69565217391278" height="14" rx="3" fill="rgba(100,150,130,.12)" stroke="rgba(100,150,130,.22)" stroke-width="0.5"/><text x="1247.282608695652" y="78.0" text-anchor="middle" fill="var(--text)" font-size="4.5" font-family="Noto Serif JP" font-weight="700">キャラハン</text></g><g data-tip="{&quot;n&quot;: &quot;サッチャー(保守党)&quot;, &quot;e&quot;: &quot;1979-90&quot;, &quot;d&quot;: &quot;「鉄の女」。新自由主義(サッチャリズム)＝国有企業の民営化(BT・BA等)・規制緩和・労働組合の弱体化(炭鉱スト1984-85に勝利)。フォークランド紛争(1982)でアルゼンチンに勝利→支持率回復。レーガンと連携し冷戦の終結を推進。人頭税(ポールタックス)への反発で党内から退陣を迫られる。&quot;}"><rect x="1339.1304347826085" y="68" width="404.130434782609" height="14" rx="3" fill="rgba(100,150,130,.12)" stroke="rgba(100,150,130,.22)" stroke-width="0.5"/><text x="1541.195652173913" y="78.0" text-anchor="middle" fill="var(--text)" font-size="4.5" font-family="Noto Serif JP" font-weight="700">サッチャー</text></g><g data-tip="{&quot;n&quot;: &quot;メージャー(保守党)&quot;, &quot;e&quot;: &quot;1990-97&quot;, &quot;d&quot;: &quot;サッチャーの後任。湾岸戦争(1991)に参加。マーストリヒト条約(1992)＝EU(欧州連合)の創設に合意するが英国内は欧州懐疑論が台頭。「ブラック＝ウェンズデー」(1992)＝ERM離脱で経済的打撃。&quot;}"><rect x="1743.2608695652175" y="68" width="36.73913043478251" height="14" rx="3" fill="rgba(100,150,130,.12)" stroke="rgba(100,150,130,.22)" stroke-width="0.5"/><text x="1761.6304347826087" y="78.0" text-anchor="middle" fill="var(--text)" font-size="4.5" font-family="Noto Serif JP" font-weight="700">メージャー</text></g><rect x="90" y="88" width="1690" height="40" fill="rgba(255,255,255,.01)" rx="2"/><text x="4" y="112" fill="var(--gold2)" font-size="7" font-family="Noto Serif JP" font-weight="700">西側陣営</text><g data-tip="{&quot;n&quot;: &quot;戦後秩序の形成&quot;, &quot;e&quot;: &quot;1945-49&quot;, &quot;d&quot;: &quot;国連創設(1945)。ブレトンウッズ体制(IMF・世界銀行)＝ドル基軸の国際経済秩序。トルーマン＝ドクトリン(1947)＝ギリシャ・トルコへの援助＝封じ込めの宣言。マーシャル＝プラン(1947)＝西欧に130億ドルの復興援助→ソ連は東欧諸国の参加を禁止。ベルリン封鎖(1948-49)→米英の大空輸で西ベルリンの補給を維持。&quot;}"><rect x="90.0" y="93" width="146.95652173913044" height="30" rx="3" fill="rgba(100,130,180,.2)" stroke="rgba(100,130,180,.3)" stroke-width="0.5"/><text x="163.47826086956522" y="111.0" text-anchor="middle" fill="var(--text)" font-size="7" font-family="Noto Serif JP" font-weight="700">戦後秩序</text></g><g data-tip="{&quot;n&quot;: &quot;封じ込め政策&quot;, &quot;e&quot;: &quot;1949-62&quot;, &quot;d&quot;: &quot;NATO結成(1949)＝西側の集団防衛体制。朝鮮戦争(1950-53)＝冷戦最初の「熱い戦争」。スエズ危機(1956)＝米が英仏を制止→米ソ二極体制の確定。ハンガリー事件(1956)＝民主化運動をソ連が戦車で弾圧→西側は不介入。キューバ危機(1962)＝核戦争の瀬戸際→ホットライン設置→デタントへの転換点。&quot;}"><rect x="236.95652173913044" y="93" width="477.6086956521738" height="30" rx="3" fill="rgba(100,130,180,.25)" stroke="rgba(100,130,180,.35)" stroke-width="0.5"/><text x="475.7608695652174" y="111.0" text-anchor="middle" fill="var(--text)" font-size="7" font-family="Noto Serif JP" font-weight="700">封じ込め</text><text x="475.7608695652174" y="120.0" text-anchor="middle" fill="var(--text3)" font-size="5.5" font-family="Noto Sans JP">NATO</text></g><g data-tip="{&quot;n&quot;: &quot;デタント(緊張緩和)&quot;, &quot;e&quot;: &quot;1962-79&quot;, &quot;d&quot;: &quot;キューバ危機後の米ソ対話。部分的核実験禁止条約(1963)。核拡散防止条約(NPT、1968)。ニクソン訪中(1972)＝米中接近で冷戦構造が流動化。SALT I(1972)＝戦略核の上限を設定。ヘルシンキ宣言(1975)＝CSCE＝欧州の人権・国境の尊重。ベトナム戦争終結(1975)＝サイゴン陥落。&quot;}"><rect x="714.5652173913043" y="93" width="624.5652173913043" height="30" rx="3" fill="rgba(100,130,180,.18)" stroke="rgba(100,130,180,.28)" stroke-width="0.5"/><text x="1026.8478260869565" y="111.0" text-anchor="middle" fill="var(--text)" font-size="7" font-family="Noto Serif JP" font-weight="700">デタント</text><text x="1026.8478260869565" y="120.0" text-anchor="middle" fill="var(--text3)" font-size="5.5" font-family="Noto Sans JP">緊張緩和</text></g><g data-tip="{&quot;n&quot;: &quot;新冷戦&quot;, &quot;e&quot;: &quot;1979-89&quot;, &quot;d&quot;: &quot;ソ連アフガン侵攻(1979)でデタント崩壊。レーガンの「悪の帝国」発言。SDI(スターウォーズ計画)で軍拡競争→ソ連の財政を圧迫。グレナダ侵攻(1983)。しかしゴルバチョフ登場(1985)→INF条約(1987)で中距離核全廃→緊張緩和へ転換。&quot;}"><rect x="1339.1304347826085" y="93" width="367.39130434782624" height="30" rx="3" fill="rgba(100,130,180,.22)" stroke="rgba(100,130,180,.32)" stroke-width="0.5"/><text x="1522.8260869565215" y="111.0" text-anchor="middle" fill="var(--text)" font-size="7" font-family="Noto Serif JP" font-weight="700">新冷戦</text><text x="1522.8260869565215" y="120.0" text-anchor="middle" fill="var(--text3)" font-size="5.5" font-family="Noto Sans JP">レーガン</text></g><g data-tip="{&quot;n&quot;: &quot;冷戦の終結&quot;, &quot;e&quot;: &quot;1989-91&quot;, &quot;d&quot;: &quot;ベルリンの壁崩壊(1989.11.9)。東欧革命(ポーランド→ハンガリー→チェコ→ルーマニア)＝ドミノ式に共産主義体制が崩壊。マルタ会談(1989.12)＝米ソが冷戦終結を宣言。ドイツ統一(1990.10.3)。ソ連崩壊(1991.12.25)＝ゴルバチョフ辞任→CIS(独立国家共同体)→冷戦体制の完全な終焉。&quot;}"><rect x="1706.5217391304348" y="93" width="73.47826086956525" height="30" rx="3" fill="rgba(100,180,130,.2)" stroke="rgba(100,180,130,.3)" stroke-width="0.5"/><text x="1743.2608695652175" y="111.0" text-anchor="middle" fill="var(--text)" font-size="7" font-family="Noto Serif JP" font-weight="700">冷戦終結</text></g><text x="4" y="160" fill="var(--gold2)" font-size="7" font-family="Noto Serif JP" font-weight="700">主要事件</text><line x1="163.47826086956522" y1="135" x2="163.47826086956522" y2="190" stroke="rgba(201,169,110,.3)" stroke-width="0.5"/><text x="163.47826086956522" y="155" text-anchor="middle" fill="rgba(201,169,110,.6)" font-size="5" font-family="Noto Sans JP" transform="rotate(-35,163.47826086956522,155)">1947 トルーマン</text><line x1="200.2173913043478" y1="135" x2="200.2173913043478" y2="190" stroke="rgba(201,169,110,.3)" stroke-width="0.5"/><text x="200.2173913043478" y="155" text-anchor="middle" fill="rgba(201,169,110,.6)" font-size="5" font-family="Noto Sans JP" transform="rotate(-35,200.2173913043478,155)">1948 ベルリン封鎖</text><line x1="236.95652173913044" y1="135" x2="236.95652173913044" y2="190" stroke="rgba(201,169,110,.3)" stroke-width="0.5"/><text x="236.95652173913044" y="155"
