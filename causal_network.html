.nd{cursor:pointer;transition:opacity .2s}.nd:hover rect{filter:brightness(1.2)}

<div class="tooltip-box" id="tooltip"></div>
<script>
function showTheme(key) {
  document.querySelectorAll('.theme-svg').forEach(function(el){el.style.display='none';});
  document.getElementById('theme-'+key).style.display='';
  document.querySelectorAll('.tabs button').forEach(function(b){
    b.classList.toggle('active', b.getAttribute('data-key')===key);
  });
  clearHighlight();
}
document.querySelectorAll('.tabs button').forEach(function(b){
  b.addEventListener('click', function(){ showTheme(this.getAttribute('data-key')); });
});
var tooltip = document.getElementById('tooltip');
document.addEventListener('click', function(e) {
  var nd = e.target.closest('.nd');
  if (nd) {
    var id = nd.getAttribute('data-id');
    var desc = nd.getAttribute('data-desc');
    var container = nd.closest('.theme-svg');
    container.querySelector('svg').classList.add('dim');
    container.querySelectorAll('.nd').forEach(function(n){n.classList.remove('hi');});
    container.querySelectorAll('.ed').forEach(function(ed){ed.classList.remove('hi');});
    nd.classList.add('hi');
    container.querySelectorAll('.ed').forEach(function(ed){
      if(ed.getAttribute('data-from')===id || ed.getAttribute('data-to')===id){
        ed.classList.add('hi');
        var other = ed.getAttribute('data-from')===id ? ed.getAttribute('data-to') : ed.getAttribute('data-from');
        var otherNd = container.querySelector('.nd[data-id="'+other+'"]');
        if(otherNd) otherNd.classList.add('hi');
      }
    });
    tooltip.innerHTML = desc;
    tooltip.style.display = 'block';
    var rect = nd.getBoundingClientRect();
    var tx = rect.right + 10;
    var ty = rect.top;
    if (tx + 350 > window.innerWidth) tx = rect.left - 350;
    if (ty + 300 > window.innerHeight) ty = window.innerHeight - 320;
    if (ty < 10) ty = 10;
    tooltip.style.left = tx + 'px';
    tooltip.style.top = ty + 'px';
  } else if (!e.target.closest('.tooltip-box') && !e.target.closest('.tabs')) {
    clearHighlight();
  }
});
function clearHighlight() {
  document.querySelectorAll('svg').forEach(function(s){s.classList.remove('dim');});
  document.querySelectorAll('.nd').forEach(function(n){n.classList.remove('hi');});
  document.querySelectorAll('.ed').forEach(function(ed){ed.classList.remove('hi');});
  tooltip.style.display = 'none';
}</script>
