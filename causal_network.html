<g class="nd" data-id="yangwu" data-desc="<strong>洋務運動(1861-95)</strong><br>★<b>「中体西用」</b>＝中国の体制(体)は維持し西洋の技術(用)だけを導入。曾国藩・李鴻章・左宗棠・張之洞。<br>軍事工場(江南製造総局)・海軍(北洋艦隊)・通信・鉄道。<br>★<b>制度改革を伴わない技術導入の限界</b>＝日清戦争の敗北で証明される。"><rect x="490" y="140" width="210" height="36" rx="6" fill="rgba(180,140,60,.15)" stroke="rgba(180,140,60,.3)" stroke-width="1.5"/><text x="595" y="162" text-anchor="middle" fill="#d4c088" font-size="8" font-family="Noto Serif JP" font-weight="700">洋務運動(1861-95)</text></g>

<g class="nd" data-id="sino_jp" data-desc="<strong>日清戦争(1894-95)</strong><br>朝鮮の甲午農民戦争(東学党の乱)→日清両国が出兵→★<b>下関条約</b>(1895)＝遼東半島・台湾割譲・賠償金2億両・朝鮮の独立承認。★三国干渉→遼東半島返還。<br>★<b>「中体西用」の失敗を証明</b>→制度改革(変法)の議論が活発化。<br>★列強の中国分割(租借地・勢力範囲)の契機。"><rect x="340" y="260" width="210" height="40" rx="6" fill="rgba(180,80,80,.15)" stroke="rgba(180,80,80,.3)" stroke-width="1.5"/><text x="445" y="284" text-anchor="middle" fill="#d4c088" font-size="8" font-family="Noto Serif JP" font-weight="700">日清戦争(1894-95)</text></g>

<g class="nd" data-id="wuxu" data-desc="<strong>戊戌変法(1898)</strong><br>★康有為・梁啓超が光緒帝に改革を建議→★<b>百日維新(103日間)</b>→科挙の改革・近代的学校設立・軍制改革等を急進的に実施。<br>★<b>西太后のクーデタ(戊戌政変)</b>で挫折→譚嗣同ら6人処刑(戊戌六君子)→光緒帝は幽閉。<br>★改革派の挫折→革命派(孫文)が台頭する契機。"><rect x="110" y="380" width="210" height="36" rx="6" fill="rgba(180,140,60,.15)" stroke="rgba(180,140,60,.3)" stroke-width="1.5"/><text x="215" y="402" text-anchor="middle" fill="#d4c088" font-size="8" font-family="Noto Serif JP" font-weight="700">戊戌変法(1898)</text></g>

<g class="nd" data-id="boxer" data-desc="<strong>義和団事件(1900)</strong><br>「扶清滅洋」を掲げる義和団(民衆の排外運動)→北京の列国公使館を包囲→★<b>8カ国連合軍</b>(英米仏独露日伊墺)が北京を占領。<br>★<b>北京議定書</b>(1901)＝巨額の賠償金＋列国の北京駐兵権→清の半植民地化が決定的に。<br>→清末新政(科挙廃止1905等)→ただし「too late」。"><rect x="560" y="380" width="210" height="36" rx="6" fill="rgba(180,80,80,.15)" stroke="rgba(180,80,80,.3)" stroke-width="1.5"/><text x="665" y="402" text-anchor="middle" fill="#d4c088" font-size="8" font-family="Noto Serif JP" font-weight="700">義和団事件(1900)</text></g>

<g class="nd" data-id="xinhai" data-desc="<strong>辛亥革命(1911)</strong><br>四川暴動(鉄道国有化反対)→武昌蜂起(1911.10.10)→各省が独立宣言→★<b>中華民国</b>成立(1912.1.1)→孫文が臨時大総統→★<b>宣統帝(溥儀)退位</b>(1912.2)。<br>★<b>アジア最初の共和国</b>。三民主義(民族・民権・民生)。<br>ただし袁世凱に大総統の座を譲渡→袁世凱の独裁→帝政運動→死(1916)→軍閥割拠。"><rect x="110" y="500" width="210" height="36" rx="6" fill="rgba(80,150,120,.15)" stroke="rgba(80,150,120,.3)" stroke-width="1.5"/><text x="215" y="522" text-anchor="middle" fill="#d4c088" font-size="8" font-family="Noto Serif JP" font-weight="700">辛亥革命(1911)</text></g>

<g class="nd" data-id="warlord" data-desc="<strong>軍閥割拠(1916-28)</strong><br>袁世凱死後に中央政府の権威が崩壊→各地の軍閥(直隷派・安徽派・奉天派)が割拠→統一国家が機能しない時代。<br>★<b>日本の対華21カ条要求</b>(1915)→中国のナショナリズムを刺激。"><rect x="110" y="620" width="210" height="36" rx="6" fill="rgba(180,140,60,.15)" stroke="rgba(180,140,60,.3)" stroke-width="1.5"/><text x="215" y="642" text-anchor="middle" fill="#d4c088" font-size="8" font-family="Noto Serif JP" font-weight="700">軍閥割拠(1916-28)</text></g>

<g class="nd" data-id="may4" data-desc="<strong>五四運動(1919)</strong><br>パリ講和会議でドイツが持っていた山東省の権益が日本に移譲→★<b>北京の学生が抗議デモ(1919.5.4)</b>→全国的な反日・反帝国主義運動に拡大。<br>★<b>新文化運動</b>(白話文学＝魯迅「狂人日記」・陳独秀「新青年」)の延長。<br>★<b>マルクス主義の受容</b>→李大釗・陳独秀→★<b>中国共産党結成(1921)</b>。"><rect x="390" y="620" width="210" height="36" rx="6" fill="rgba(80,150,120,.15)" stroke="rgba(80,150,120,.3)" stroke-width="1.5"/><text x="495" y="642" text-anchor="middle" fill="#d4c088" font-size="8" font-family="Noto Serif JP" font-weight="700">五四運動(1919)</text></g>

<g class="nd" data-id="guogong" data-desc="<strong>第一次国共合作(1924-27)</strong><br>孫文が「連ソ・容共・扶助工農」を採択→国民党と共産党が協力→★<b>北伐</b>(1926蒋介石)→軍閥打倒。<br>★<b>上海クーデタ(1927.4.12)</b>＝蒋介石が共産党を弾圧→国共分裂→★<b>南京国民政府</b>樹立。<br>共産党→農村に拠点→江西ソヴィエト→★<b>長征(1934-36)</b>→毛沢東が指導権確立。"><rect x="110" y="740" width="210" height="36" rx="6" fill="rgba(180,140,60,.15)" stroke="rgba(180,140,60,.3)" stroke-width="1.5"/><text x="215" y="762" text-anchor="middle" fill="#d4c088" font-size="8" font-family="Noto Serif JP" font-weight="700">国共合作と分裂(1924-27)</text></g>

<g class="nd" data-id="civil" data-desc="<strong>日中戦争→国共内戦(1937-49)</strong><br>★<b>西安事件</b>(1936)→第二次国共合作→★<b>日中戦争</b>(1937盧溝橋事件→南京事件→重慶遷都)。<br>戦後→国共内戦再開→★<b>共産党の勝利</b>(農民の支持＋土地改革＋ゲリラ戦術)。<br>国民党は台湾に撤退(1949)。"><rect x="560" y="740" width="210" height="36" rx="6" fill="rgba(180,80,80,.15)" stroke="rgba(180,80,80,.3)" stroke-width="1.5"/><text x="665" y="762" text-anchor="middle" fill="#d4c088" font-size="8" font-family="Noto Serif JP" font-weight="700">日中戦争→国共内戦</text></g>

<g class="nd" data-id="prc" data-desc="<strong>中華人民共和国(1949-)</strong><br>★毛沢東が天安門で建国宣言(1949.10.1)。朝鮮戦争参戦→大躍進政策(1958失敗)→★<b>文化大革命</b>(1966-76)→毛沢東死去→★<b>改革開放</b>(1978鄧小平)→★<b>天安門事件</b>(1989)→市場経済化→世界第2位の経済大国。"><rect x="560" y="850" width="210" height="36" rx="6" fill="rgba(80,150,120,.15)" stroke="rgba(80,150,120,.3)" stroke-width="1.5"/><text x="665" y="872" text-anchor="middle" fill="#d4c088" font-size="8" font-family="Noto Serif JP" font-weight="700">中華人民共和国(1949-)</text></g>

</svg></div>
<div class="theme-svg" id="theme-eastasia" style="display:none">
<svg viewBox="0 0 880 860" xmlns="http://www.w3.org/2000/svg" style="width:880px;height:860px;min-width:880px">
<defs><marker id="ah_ea" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="rgba(201,169,110,.7)"/></marker></defs>

<g class="ed" data-from="sakuho" data-to="chokou"><line x1="290" y1="38" x2="580" y2="38" stroke="rgba(201,169,110,.35)" stroke-width="2" marker-end="url(#ah_ea)"/><text x="435" y="30" fill="rgba(201,169,110,.6)" font-size="7" font-family="Noto Sans JP">朝貢で冊封関係を維持</text></g>
<g class="ed" data-from="sakuho" data-to="western"><line x1="185" y1="56" x2="185" y2="145" stroke="rgba(201,169,110,.35)" stroke-width="2" marker-end="url(#ah_ea)"/><text x="195" y="105" fill="rgba(201,169,110,.6)" font-size="7" font-family="Noto Sans JP">西洋が体制外から衝撃</text></g>
<g class="ed" data-from="chokou" data-to="western"><path d="M685,56 Q435,100 280,148" fill="none" stroke="rgba(201,169,110,.35)" stroke-width="2" marker-end="url(#ah_ea)"/><text x="490" y="100" fill="rgba(201,169,110,.6)" font-size="7" font-family="Noto Sans JP">朝貢貿易では不十分→自由貿易要求</text></g>
<g class="ed" data-from="western" data-to="treaty"><line x1="185" y1="186" x2="185" y2="270" stroke="rgba(201,169,110,.35)" stroke-width="2" marker-end="url(#ah_ea)"/><text x="195" y="230" fill="rgba(201,169,110,.6)" font-size="7" font-family="Noto Sans JP">不平等条約の強制</text></g>
<g class="ed" data-from="treaty" data-to="sino_jp2"><path d="M290,293 Q350,340 340,385" fill="none" stroke="rgba(201,169,110,.35)" stroke-width="2" marker-end="url(#ah_ea)"/><text x="330" y="345" fill="rgba(201,169,110,.6)" font-size="7" font-family="Noto Sans JP">条約体制内の日清対立</text></g>
<g class="ed" data-from="sino_jp2" data-to="russo_jp"><path d="M450,423 Q550,445 560,485" fill="none" stroke="rgba(201,169,110,.35)" stroke-width="2" marker-end="url(#ah_ea)"/><text x="530" y="450" fill="rgba(201,169,110,.6)" font-size="7" font-family="Noto Sans JP">朝鮮・満州をめぐる日露対立</text></g>
<g class="ed" data-from="sino_jp2" data-to="imperialism"><path d="M345,423 Q345,475 345,525" fill="none" stroke="rgba(201,169,110,.35)" stroke-width="2" marker-end="url(#ah_ea)"/><text x="330" y="478" fill="rgba(201,169,110,.6)" font-size="7" font-family="Noto Sans JP">日本の帝国主義化</text></g>
<g class="ed" data-from="russo_jp" data-to="imperialism"><path d="M600,521 Q520,555 490,530" fill="none" stroke="rgba(201,169,110,.35)" stroke-width="2" marker-end="url(#ah_ea)"/><text x="570" y="548" fill="rgba(201,169,110,.6)" font-size="7" font-family="Noto Sans JP">大陸進出が本格化</text></g>
<g class="ed" data-from="imperialism" data-to="ww2ea"><line x1="400" y1="566" x2="400" y2="650" stroke="rgba(201,169,110,.35)" stroke-width="2" marker-end="url(#ah_ea)"/><text x="410" y="610" fill="rgba(201,169,110,.6)" font-size="7" font-family="Noto Sans JP">大東亜共栄圏→太平洋戦争</text></g>
<g class="ed" data-from="ww2ea" data-to="coldwar_ea"><line x1="400" y1="700" x2="400" y2="775" stroke="rgba(201,169,110,.35)" stroke-width="2" marker-end="url(#ah_ea)"/><text x="410" y="740" fill="rgba(201,169,110,.6)" font-size="7" font-family="Noto Sans JP">日本敗戦→米ソによる分断</text></g>

<g class="nd" data-id="sakuho" data-desc="<strong>冊封体制(前漢〜19C)</strong><br>★<b>中国皇帝が周辺国の王を「冊封」</b>＝称号と印璽を授けて君臣関係を結ぶ→東アジアの国際秩序の基本原理。<br>朝鮮・ベトナム・琉球が典型的な冊封国。日本は★<b>足利義満以降は冊封から離脱</b>→独自の立場。<br>★<b>華夷秩序</b>＝中華(文明)を中心に同心円状に「夷狄」が広がるという世界観。"><rect x="80" y="20" width="210" height="36" rx="6" fill="rgba(180,140,60,.15)" stroke="rgba(180,140,60,.3)" stroke-width="1.5"/><text x="185" y="42" text-anchor="middle" fill="#d4c088" font-size="8" font-family="Noto Serif JP" font-weight="700">冊封体制(前漢〜19C)</text></g>

<g class="nd" data-id="chokou" data-desc="<strong>朝貢貿易</strong><br>冊封国が中国に使節を送り貢物を献上→★<b>中国皇帝が「回賜」として数倍の品を与える</b>→実質的には中国が損をする→ただし「中華の威信」の表現。<br>明の★<b>海禁政策</b>→朝貢貿易が唯一の合法的貿易→密貿易(倭寇)の原因に。<br>★<b>清代</b>＝広州一港貿易(公行制度)→イギリスとの摩擦→アヘン戦争の遠因。"><rect x="580" y="20" width="210" height="36" rx="6" fill="rgba(180,140,60,.15)" stroke="rgba(180,140,60,.3)" stroke-width="1.5"/><text x="685" y="42" text-anchor="middle" fill="#d4c088" font-size="8" font-family="Noto Serif JP" font-weight="700">朝貢貿易</text></g>

<g class="nd" data-id="western" data-desc="<strong>西洋の衝撃(18C末〜19C)</strong><br>★アヘン戦争(1840-42)→南京条約→★<b>不平等条約体制の始まり</b>。ペリー来航(1853)→日本の開国。<br>★<b>冊封体制(華夷秩序)とウェストファリア体制(主権国家体系)の衝突</b>→前者が後者に敗北。<br>各国の対応：日本(明治維新)＝成功、清(洋務運動)＝失敗、朝鮮(鎖国→開国)＝遅れ。"><rect x="80" y="150" width="210" height="36" rx="6" fill="rgba(180,80,80,.15)" stroke="rgba(180,80,80,.3)" stroke-width="1.5"/><text x="185" y="172" text-anchor="middle" fill="#d4c088" font-size="8" font-family="Noto Serif JP" font-weight="700">西洋の衝撃(18C末〜19C)</text></g>

<g class="nd" data-id="treaty" data-desc="<strong>条約体制への移行(19C半ば)</strong><br>★<b>不平等条約の網</b>＝領事裁判権・協定関税・最恵国待遇→東アジア各国を「条約体制」に組み込む。<br>★<b>万国公法(国際法)の受容</b>→日本が最も積極的(条約改正を目標に近代化)。<br>★<b>冊封体制と条約体制の並存期</b>＝清は朝鮮・ベトナムとの宗属関係を主張し続ける→日清・仏清戦争の一因。"><rect x="80" y="275" width="210" height="36" rx="6" fill="rgba(80,150,120,.15)" stroke="rgba(80,150,120,.3)" stroke-width="1.5"/><text x="185" y="297" text-anchor="middle" fill="#d4c088" font-size="8" font-family="Noto Serif JP" font-weight="700">条約体制への移行(19C半ば)</text></g>

<g class="nd" data-id="sino_jp2" data-desc="<strong>日清戦争(1894-95)</strong><br>★<b>東アジア国際秩序の転換点</b>。日本が清(冊封体制の中心)に勝利→★<b>冊封体制の最終的な崩壊</b>→朝鮮の独立(＝清との宗属関係の消滅)。<br>★<b>下関条約</b>→台湾割譲・遼東半島(→三国干渉で返還)・賠償金。<br>★列強の中国分割が本格化→租借地(独＝膠州湾・露＝旅順大連・英＝威海衛・仏＝広州湾)。"><rect x="240" y="388" width="210" height="36" rx="6" fill="rgba(180,80,80,.15)" stroke="rgba(180,80,80,.3)" stroke-width="1.5"/><text x="345" y="410" text-anchor="middle" fill="#d4c088" font-size="8" font-family="Noto Serif JP" font-weight="700">日清戦争(1894-95)</text></g>

<g class="nd" data-id="russo_jp" data-desc="<strong>日露戦争(1904-05)</strong><br>満州・朝鮮をめぐる日露対立→★<b>ポーツマス条約</b>＝南樺太・南満州鉄道・韓国の優越権。<br>★<b>非白人国家が白人大国に勝利</b>→アジアの民族運動に衝撃(イラン立憲革命・青年トルコ革命・インドの国民会議派)。<br>★日本の韓国併合(1910)→東アジアにおける日本の帝国主義が確立。"><rect x="560" y="488" width="210" height="36" rx="6" fill="rgba(180,80,80,.15)" stroke="rgba(180,80,80,.3)" stroke-width="1.5"/><text x="665" y="510" text-anchor="middle" fill="#d4c088" font-size="8" font-family="Noto Serif JP" font-weight="700">日露戦争(1904-05)</text></g>

<g class="nd" data-id="imperialism" data-desc="<strong>日本の帝国主義(1910-45)</strong><br>★韓国併合(1910)→★<b>21カ条要求</b>(1915)→山東問題→満州事変(1931)→★<b>満州国</b>(1932傀儡国家)→日中戦争(1937)→<b>大東亜共栄圏</b>。<br>★<b>東アジアにおける「新秩序」の試み</b>＝欧米帝国主義に代わる日本中心の秩序→ただし実態は日本の支配と搾取。"><rect x="295" y="530" width="210" height="36" rx="6" fill="rgba(180,140,60,.15)" stroke="rgba(180,140,60,.3)" stroke-width="1.5"/><text x="400" y="552" text-anchor="middle" fill="#d4c088" font-size="8" font-family="Noto Serif JP" font-weight="700">日本の帝国主義(1910-45)</text></g>

<g class="nd" data-id="ww2ea" data-desc="<strong>WW2と東アジア(1941-45)</strong><br>★<b>太平洋戦争</b>(1941.12真珠湾)→日本の敗戦(1945.8)→★<b>帝国主義的秩序の完全な崩壊</b>。<br>★<b>カイロ宣言</b>(1943)→ヤルタ会談→ポツダム宣言→日本の無条件降伏。<br>★<b>東アジアの再編</b>＝中華民国が常任理事国に(→中華人民共和国に交替1971)。朝鮮の南北分断(38度線)。日本の占領(GHQ)。"><rect x="295" y="655" width="210" height="40" rx="6" fill="rgba(180,80,80,.15)" stroke="rgba(180,80,80,.3)" stroke-width="1.5"/><text x="400" y="679" text-anchor="middle" fill="#d4c088" font-size="8" font-family="Noto Serif JP" font-weight="700">WW2と東アジア(1941-45)</text></g>

<g class="nd" data-id="coldwar_ea" data-desc="<strong>冷戦と東アジア(1945-)</strong><br>★<b>米ソ冷戦</b>→東アジアの分断＝★<b>朝鮮半島の南北分断</b>(1948)→朝鮮戦争(1950-53)→★<b>中国大陸と台湾の分断</b>。<br>日米安保体制(1951)＋日韓基本条約(1965)＋日中国交正常化(1972)。<br>★<b>冷戦の終結(1989)</b>→ただし東アジアでは★<b>冷戦構造が残存</b>(北朝鮮・台湾問題・米中対立)→★<b>21世紀の「新冷戦」</b>へ？<br>★冊封体制→条約体制→帝国主義→冷戦→米中二極という<b>東アジア国際秩序の重層的変容</b>。"><rect x="295" y="780" width="210" height="36" rx="6" fill="rgba(80,150,120,.15)" stroke="rgba(80,150,120,.3)" stroke-width="1.5"/><text x="400" y="802" text-anchor="middle" fill="#d4c088" font-size="8" font-family="Noto Serif JP" font-weight="700">冷戦と東アジア(1945-)</text></g>

</svg></div>

<script>
function showTheme(key) {
  document.querySelectorAll('.theme-svg').forEach(function(el){el.style.display='none';});
  document.getElementById('theme-'+key).style.display='';
  document.querySelectorAll('.tabs button').forEach(function(b){
    b.classList.toggle('active', b.getAttribute('data-key')===key);
  });
  clearHighlight();
}
document.querySelectorAll('.tabs button').forEach(function(b){
  b.addEventListener('click', function(){ showTheme(this.getAttribute('data-key')); });
});
var tooltip = document.getElementById('tooltip');
document.addEventListener('click', function(e) {
  var nd = e.target.closest('.nd');
  if (nd) {
    var id = nd.getAttribute('data-id');
    var desc = nd.getAttribute('data-desc');
    var container = nd.closest('.theme-svg');
    container.querySelector('svg').classList.add('dim');
    container.querySelectorAll('.nd').forEach(function(n){n.classList.remove('hi');});
    container.querySelectorAll('.ed').forEach(function(ed){ed.classList.remove('hi');});
    nd.classList.add('hi');
    container.querySelectorAll('.ed').forEach(function(ed){
      if(ed.getAttribute('data-from')===id || ed.getAttribute('data-to')===id){
        ed.classList.add('hi');
        var other = ed.getAttribute('data-from')===id ? ed.getAttribute('data-to') : ed.getAttribute('data-from');
        var otherNd = container.querySelector('.nd[data-id="'+other+'"]');
        if(otherNd) otherNd.classList.add('hi');
      }
    });
    tooltip.innerHTML = desc;
    tooltip.style.display = 'block';
    var rect = nd.getBoundingClientRect();
    var tx = rect.right + 10;
    var ty = rect.top;
    if (tx + 350 > window.innerWidth) tx = rect.left - 350;
    if (ty + 300 > window.innerHeight) ty = window.innerHeight - 320;
    if (ty < 10) ty = 10;
    tooltip.style.left = tx + 'px';
    tooltip.style.top = ty + 'px';
  } else if (!e.target.closest('.tooltip-box') && !e.target.closest('.tabs')) {
    clearHighlight();
  }
});
function clearHighlight() {
  document.querySelectorAll('svg').forEach(function(s){s.classList.remove('dim');});
  document.querySelectorAll('.nd').forEach(function(n){n.classList.remove('hi');});
  document.querySelectorAll('.ed').forEach(function(ed){ed.classList.remove('hi');});
  tooltip.style.display = 'none';
}</script>
<div class="note"><p>因果関係ネットワーク＝<strong>複数の原因が合流し、1つの結果が複数方向に分岐する「網目状の因果」を可視化</strong>。ノードをクリックすると関連する因果だけがハイライトされます。</p></div>
</body></html>
