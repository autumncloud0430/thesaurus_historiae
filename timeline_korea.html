ont-weight="700">(新羅)</text><rect x="120" y="192" width="2250" height="42" fill="rgba(255,255,255,.006)" rx="2"/><text x="4" y="209" fill="var(--gold2)" font-size="6.5" font-family="Noto Serif JP" font-weight="700">南端</text><text x="4" y="219" fill="var(--gold2)" font-size="6.5" font-family="Noto Serif JP" font-weight="700">(伽耶)</text><g data-tip="{&quot;n&quot;: &quot;統一新羅&quot;, &quot;e&quot;: &quot;676-935&quot;, &quot;d&quot;: &quot;慶州が首都(推定人口100万＝当時世界有数の大都市)。9州5小京制。国学(教育機関)設置。★仏教文化の全盛＝仏国寺(釈迦塔・多宝塔)・石窟庵(本尊の釈迦如来像＝東アジア仏教彫刻の傑作)→いずれも世界遺産。★無垢浄光大陀羅尼経＝現存する世界最古の木版印刷物(751年頃)。末期は骨品制の矛盾→真骨貴族の内紛→地方豪族(豪族)が台頭→後三国時代(後高句麗=弓裔/後百済=甄萱)→王建が高麗を建国。&quot;}"><rect x="1036" y="42" width="256" height="192" rx="4" fill="rgba(180,140,80,0.1)" stroke="rgba(180,140,80,0.15000000000000002)" stroke-width="0.8" stroke-dasharray="3,2"/><text x="1164" y="141.0" text-anchor="middle" fill="rgba(255,255,255,.7)" font-size="8" font-family="Noto Serif JP" font-weight="700">統一新羅</text></g><g data-tip="{&quot;n&quot;: &quot;高麗&quot;, &quot;e&quot;: &quot;918-1392&quot;, &quot;d&quot;: &quot;王建(太祖)が後三国を統一(936)。開京(開城)が首都。★科挙制度を導入(958光宗)→唐の制度を模倣するが両班(文班・武班)制度と並立。仏教国家＝★高麗版大蔵経(再雕大蔵経)＝モンゴル撃退を祈願して制作された8万枚以上の木版→海印寺に現存(世界遺産)。★金属活字の発明(13C)＝グーテンベルク(15C)より約200年先行→世界最古の金属活字印刷(直指心体要節1377)。高麗青磁(翡色青磁)。モンゴル帝国の6度の侵攻(1231-)→三別抄の抵抗(1270-73)→元の支配下に(征東行省＝日本遠征の基地)→高麗王は元の公主と婚姻→恭愍王が反元政策→紅巾軍の侵入→新興武人・李成桂の台頭。&quot;}"><rect x="1275" y="42" width="469" height="192" rx="4" fill="rgba(80,150,120,0.1)" stroke="rgba(80,150,120,0.15000000000000002)" stroke-width="0.8" stroke-dasharray="3,2"/><text x="1510" y="141.0" text-anchor="middle" fill="rgba(255,255,255,.7)" font-size="8" font-family="Noto Serif JP" font-weight="700">高麗</text></g><g data-tip="{&quot;n&quot;: &quot;朝鮮(李朝)&quot;, &quot;e&quot;: &quot;1392-1897&quot;, &quot;d&quot;: &quot;李成桂が高麗を倒して建国(1392)。国号「朝鮮」は明の洪武帝が選定。漢城(ソウル)に遷都→景福宮を建設。★朱子学を国教化→仏教を弾圧(寺院の都市部からの追放・僧侶の入都禁止)。両班制(文班・武班の官僚貴族＝人口の約10%)。★世宗大王(在位1418-50)＝ハングル(訓民正音1443)を創製→「知恵ある者は朝の間に、愚かな者でも十日で習える」→民族固有の文字→ただし両班は漢字を使い続ける。集賢殿(学術機関)。測雨器(世界最古の雨量計)。★壬辰倭乱(1592-98)＝豊臣秀吉の朝鮮出兵→李舜臣の亀甲船で日本水軍を撃退(鳴梁海戦)→明の援軍→国土荒廃。★丙子胡乱(1636-37)＝後金(清)の侵攻→仁祖が南漢山城で降伏→清に服属(朝貢)。英祖・正祖の時代(18C)＝実学(丁若鎔ら)の発展→ただし鎖国政策。大院君(19C)の攘夷政策→開国(1876)へ。&quot;}"><rect x="1744" y="42" width="499" height="192" rx="4" fill="rgba(130,100,160,0.1)" stroke="rgba(130,100,160,0.15000000000000002)" stroke-width="0.8" stroke-dasharray="3,2"/><text x="1994" y="141.0" text-anchor="middle" fill="rgba(255,255,255,.7)" font-size="8" font-family="Noto Serif JP" font-weight="700">朝鮮(李朝)</text></g><g data-tip="{&quot;n&quot;: &quot;大韓帝国&quot;, &quot;e&quot;: &quot;1897-1910&quot;, &quot;d&quot;: &quot;高宗がロシア公使館避難(俄館播遷1896)から帰還後、1897年に皇帝を称して大韓帝国を宣言→清との宗属関係の正式な否定。光武改革(近代化)＝電気・鉄道・郵便制度の導入。ただし★日露戦争(1904-05)でロシアが敗北→ポーツマス条約で日本の韓国における優越権が列強に承認される→第二次日韓協約(1905)で外交権剥奪→統監府設置(初代統監＝伊藤博文)→★ハーグ密使事件(1907)→高宗退位→第三次日韓協約で軍隊解散→★義兵運動→安重根が伊藤博文を暗殺(1909ハルビン)→★韓国併合条約(1910)で消滅。&quot;}"><rect x="2243" y="42" width="20" height="192" rx="4" fill="rgba(130,100,160,0.08)" stroke="rgba(130,100,160,0.13)" stroke-width="0.8" stroke-dasharray="3,2"/></g><g data-tip="{&quot;n&quot;: &quot;日本統治&quot;, &quot;e&quot;: &quot;1910-1945&quot;, &quot;d&quot;: &quot;朝鮮総督府(初代総督:寺内正毅)を設置。★第1期:武断政治(1910-19)＝憲兵警察制度・土地調査事業(1910-18申告主義→農民の土地喪失)→東洋拓殖株式会社。★第2期:文化政治(1919-37)＝三一運動後の融和策→普通警察に移行・朝鮮語新聞許可(朝鮮日報・東亜日報)→ただし実質は分断統治。★第3期:皇民化政策(1937-45)＝日中戦争以降→★創氏改名(日本式の姓名を強制)・日本語教育強制(朝鮮語使用禁止)・神社参拝強制・★強制連行(徴用＝炭鉱・軍需工場)・「従軍慰安婦」問題→現在の日韓歴史問題の核心。大韓民国臨時政府(1919上海→重慶)＝李承晩(初代大統領)・金九(暗殺1949)。&quot;}"><rect x="2256" y="42" width="35" height="192" rx="4" fill="rgba(180,80,80,0.12)" stroke="rgba(180,80,80,0.16999999999999998)" stroke-width="0.8" stroke-dasharray="3,2"/></g><g data-tip="{&quot;n&quot;: &quot;韓国&quot;, &quot;e&quot;: &quot;1948-&quot;, &quot;d&quot;: &quot;大韓民国(1948.8建国)。★李承晩(初代大統領)＝反共・親米→朝鮮戦争→独裁化→四月革命(1960学生デモ)で退陣。★朴正熙(1961-79)＝軍事クーデタで政権掌握→開発独裁→★「漢江の奇跡」(高度経済成長＝1960年代GDP成長率年10%超)→日韓基本条約(1965)→セマウル運動→維新体制(独裁強化)→暗殺(1979)。★全斗煥＝光州事件(1980市民弾圧)→★民主化(1987六月民主抗争→直接選挙制)。金大中(ノーベル平和賞2000)＝太陽政策(対北融和)。IT・半導体・K-POP・韓国映画の世界的影響力。&quo amily="Noto Serif JP" font-weight="700">高句麗</text></g><g data-tip="{&quot;n&quot;: &quot;渤海&quot;, &quot;e&quot;: &quot;698-926&quot;, &quot;d&quot;: &quot;高句麗の遺民・大祚栄(だいそえい)が698年に満州東部で建国。唐から「海東の盛国」と称される。5京制(上京龍泉府が首都)。唐の制度を模倣しつつ高句麗の文化を継承。日本とも34回の使節を交換(渤海使)。文王の時代(737-793)が全盛期。契丹(遼)の耶律阿保機に滅ぼされる(926)。新羅と南北に並立した時代を「南北国時代」とも呼ぶ。&quot;}"><rect x="1058" y="45" width="225" height="36" rx="3" fill="rgba(100,130,180,0.17)" stroke="rgba(100,130,180,0.27)" stroke-width="0.5"/><text x="1170" y="65" text-anchor="middle" fill="var(--text)" font-size="6.5" font-family="Noto Serif JP" font-weight="700">渤海</text></g><g data-tip="{&quot;n&quot;: &quot;百済&quot;, &quot;e&quot;: &quot;BC18-AD660&quot;, &quot;d&quot;: &quot;馬韓地域で温祚が建国(伝承)。漢江流域→高句麗に圧迫されて公州(475)→扶余(538)と南遷。★日本(倭)と密接な関係＝仏教伝来(552年説/538年説)・五経博士(儒教)・暦法・医学を伝える→日本の飛鳥文化に多大な影響。聖明王(聖王)が仏教公伝の主体。百済観音像(法隆寺)。武寧王陵(公州)。唐・新羅連合軍に滅ぼされる(660)→百済の遺民が日本に援軍を要請→★白村江の戦い(663)で唐・新羅連合に大敗→日本は朝鮮半島への影響力を喪失。&quot;}"><rect x="349" y="95" width="671" height="36" rx="3" fill="rgba(80,150,120,0.25)" stroke="rgba(80,150,120,0.35)" stroke-width="0.5"/><text x="685" y="115" text-anchor="middle" fill="var(--text)" font-size="6.5" font-family="Noto Serif JP" font-weight="700">百済</text></g><g data-tip="{&quot;n&quot;: &quot;新羅&quot;, &quot;e&quot;: &quot;BC57-AD676&quot;, &quot;d&quot;: &quot;辰韓から発展。慶州が首都。★骨品制＝聖骨(王族のみ)・真骨(最高貴族)・6頭品〜1頭品の厳格な身分制度→官職・婚姻・住居まで規定。善徳女王(632-47)は東アジア初の女王。唐と同盟(羅唐同盟)→百済を滅ぼす(660)→高句麗を滅ぼす(668)→ただし唐が朝鮮半島に安東都護府を設置し直接支配を図る→★新羅が唐の勢力を武力で排除→朝鮮半島統一(676)。&quot;}"><rect x="311" y="145" width="725" height="36" rx="3" fill="rgba(180,140,80,0.25)" stroke="rgba(180,140,80,0.35)" stroke-width="0.5"/><text x="673" y="165" text-anchor="middle" fill="var(--text)" font-size="6.5" font-family="Noto Serif JP" font-weight="700">新羅</text></g><g data-tip="{&quot;n&quot;: &quot;伽耶&quot;, &quot;e&quot;: &quot;42-562&quot;, &quot;d&quot;: &quot;朝鮮半島南端(洛東江流域)の小国群。金官伽耶(首露王)・大伽耶など6伽耶。★鉄の産地→鉄製品を日本(倭)や中国に輸出→国際交易の結節点。日本の前方後円墳に類似した古墳も発見→日韓の密接な交流を示す。★「任那日本府」問題＝日本書紀に伽耶地域に日本の機関があったと
