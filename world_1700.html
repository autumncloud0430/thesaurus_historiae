function shiftGJ(gj,off){
 return{type:"FeatureCollection",features:gj.features.map(f=>{
 function sc(c){if(typeof c[0]==="number")return[c[0]+off,c[1]];return c.map(sc)}
 return{...f,geometry:{...f.geometry,coordinates:sc(f.geometry.coordinates)}};
 })};
}

// Filter to this era: nearest to -500
var ERA_YEARS=[-3000,-2000,-1500,-1000,-700,-500,-400,-323,-300,-200,-100,-1,100,200,300,400,500,600,700,800,900,1000,1100,1200,1279,1300,1400,1492,1530,1600,1650,1700,1715,1783,1800,1815,1880,1900,1914,1920,1930,1938,1945,1960,1994,2000];
var THIS_ERA_IDX=30; // index of -500

var DATA=R.map(r=>{
 var yN=pY(r[1]);
 let bestIdx=0,bestDist=Infinity;
 ERA_YEARS.forEach((ey,i)=>{var d=Math.abs((yN||0)-ey);if(d<bestDist){bestDist=d;bestIdx=i}});
 return{n:r[0],y:r[1],la:r[2],lo:r[3],d:r[4],cat:r[5],yN,eraIdx:bestIdx};
}).filter(d=>d.eraIdx===THIS_ERA_IDX);

let activeCats=new Set(["B","T","C","S"]),pointMarkers=[],labelLayer=null,currentFiltered=[];

function toggleCat(cat){
 if(activeCats.has(cat))activeCats.delete(cat);else activeCats.add(cat);
 if(activeCats.size===0)activeCats.add(cat);
 Object.keys(CATS).forEach(k=>{document.getElementById("p"+k.toLowerCase()).className="tb"+(activeCats.has(k)?" on":"")});
 renderPoints;
}

function getFiltered(){
 let d=DATA.filter(x=>activeCats.has(x.cat));
 var s=document.getElementById("search").value.toLowerCase();
 if(s)d=d.filter(x=>x.n.toLowerCase().includes(s)||x.d.toLowerCase().includes(s));
 return d.sort((a,b)=>(a.yN||0)-(b.yN||0));
}

function renderPoints(){
 pointMarkers.forEach(m=>map.removeLayer(m));pointMarkers=[];
 if(labelLayer){map.removeLayer(labelLayer)}
 labelLayer=L.layerGroup.addTo(map);
 var items=getFiltered;currentFiltered=items;
 items.forEach(d=>{
 var cc=CATS[d.cat];
 var r=d.cat==="S"?4:d.cat==="C"?4.5:5.5;
 [0,-360,360].forEach(off=>{
 // Invisible large hit target
 var hit=L.circleMarker([d.la,d.lo+off],{radius:14,fillColor:"transparent",fillOpacity:0,stroke:false,interactive:true}).addTo(map);
 // Visible small dot
 var dot=L.circleMarker([d.la,d.lo+off],{radius:r,fillColor:cc.c,fillOpacity:.7,color:"rgba(255,255,255,.2)",weight:1,opacity:.4,interactive:false}).addTo(map);
 var popupHtml=`<div style="font-weight:700;font-size:13px;color:${cc.c}">${cc.l.slice(0,2)} ${d.n}</div>`+
 `<div style="font-size:10px;color:#777">${d.y||""}</div>`+
 `<div style="font-size:11px;color:#aaa;line-height:1.5;margin-top:3px">${d.d}</div>`;
 hit.bindPopup(popupHtml,{className:"tp",maxWidth:300});
 hit._d=d;dot._d=d;pointMarkers.push(hit);pointMarkers.push(dot);
 });
 });
 document.getElementById("cnt").textContent=`${items.length}件`;
 // Bring all point markers to front so they sit above territories
 pointMarkers.forEach(m=>{try{m.bringToFront}catch(e){}});
 updateLabels;
}

function updateLabels(){
 if(labelLayer){map.removeLayer(labelLayer)}
 labelLayer=L.layerGroup.addTo(map);
 var zoom=map.getZoom;if(zoom<5)return;
 var bounds=map.getBounds.pad(0.1);
 var max=zoom<7?80:300;let count=0;
 for(var d of currentFiltered){
 if(count>=max)break;
 if(!bounds.contains([d.la,d.lo]))continue;
 var cc=CATS[d.cat];
 var lbl=L.tooltip({permanent:true,direction:"right",offset:[6,0],className:"ml ml-"+d.cat,opacity:1});
 lbl.setContent(d.n);lbl.setLatLng([d.la,d.lo]);
 labelLayer.addLayer(lbl);count++;
 }
}
let lt=null;
function dbl(){if(lt)clearTimeout(lt);lt=setTimeout(updateLabels,150)}
map.on("zoomend",dbl);map.on("moveend",dbl);

renderPoints;
