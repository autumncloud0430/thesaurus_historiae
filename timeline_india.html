<g data-tip="{&quot;n&quot;: &quot;マウリヤ朝&quot;, &quot;e&quot;: &quot;BC322-BC185&quot;, &quot;d&quot;: &quot;チャンドラグプタがナンダ朝を倒し北インド統一。首都パータリプトラ。アショーカ王がカリンガ戦争の惨禍を機に仏教に帰依→ダルマ(法)統治宣言。石柱碑・磨崖碑。仏教をスリランカ・東南アジアに伝播。インド亜大陸の大半を支配した史上初の統一帝国。&quot;}"><rect x="88.0" y="52" width="137.0" height="140" rx="3" fill="rgba(201,169,110,.35)" stroke="rgba(201,169,110,.55)" stroke-width="0.8"/><text x="156.5" y="122.0" text-anchor="middle" fill="var(--text)" font-size="8" font-family="Noto Serif JP" font-weight="700">マウリヤ朝</text><text x="156.5" y="132.0" text-anchor="middle" fill="var(--text3)" font-size="6" font-family="Noto Sans JP">アショーカ王の統一</text></g>
