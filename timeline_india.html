ba(255,255,255,.01)" rx="2"/><text x="4" y="84.0" fill="var(--gold2)" font-size="7" font-family="Noto Serif JP" font-weight="700">北インド主要王朝</text><g data-tip="{&quot;n&quot;: &quot;マウリヤ朝&quot;, &quot;e&quot;: &quot;BC322-BC185&quot;, &quot;d&quot;: &quot;チャンドラグプタがナンダ朝を倒し北インドを初めて統一。首都パータリプトラ。チャンドラグプタ→ビンドゥサーラ→アショーカ王。アショーカ王はカリンガ戦争の惨禍に衝撃を受け仏教に帰依→ダルマ(法)による統治を宣言。各地に石柱碑・磨崖碑を建立。仏教の保護→スリランカ・東南アジアに仏教を伝播。死後に急速に衰退し分裂。&quot;}"><rect x="135.2" y="55" width="123.30000000000001" height="24" rx="3" fill="rgba(201,169,110,.25)" stroke="rgba(201,169,110,.35)" stroke-width="0.5"/><text x="196.85" y="70.0" text-anchor="middle" fill="var(--text)" font-size="6" font-family="Noto Serif JP" font-weight="700">マウリヤ朝</text></g><g data-tip="{&quot;n&quot;: &quot;クシャーナ朝&quot;, &quot;e&quot;: &quot;1C-3C&quot;, &quot;d&quot;: &quot;中央アジアの大月氏系。カニシカ王(2C)の時代に最盛期。ガンダーラ美術＝ヘレニズムの影響を受け仏像を初めて人間の姿で制作(それ以前は仏足石・菩提樹等で象徴的に表現)。マトゥラー美術はインド的な仏像。大乗仏教を保護→中国に伝来。シルクロード交易で繁栄。プルシャプラ(ペシャーワル)が首都。&quot;}"><rect x="465.5" y="55" width="157.5" height="24" rx="3" fill="rgba(160,130,100,.22)" stroke="rgba(160,130,100,.32)" stroke-width="0.5"/><text x="544.25" y="70.0" text-anchor="middle" fill="var(--text)" font-size="6" font-family="Noto Serif JP" font-weight="700">クシャーナ朝</text><text x="544.25" y="78.0" text-anchor="middle" fill="var(--text3)" font-size="5" font-family="Noto Sans JP">ガンダーラ</text></g><g data-tip="{&quot;n&quot;: &quot;グプタ朝&quot;, &quot;e&quot;: &quot;320-550頃&quot;, &quot;d&quot;: &quot;チャンドラグプタ1世が建国。チャンドラグプタ2世(超日王/ヴィクラマーディティヤ)の時代に最盛期＝「インド古典文化の黄金時代」。カーリダーサの戯曲『シャクンタラー』。アジャンター石窟の壁画(最盛期)。ナーランダー僧院(仏教の大学)。十進法・ゼロの概念の発明。ヒンドゥー教が社会の主流に(ヴィシュヌ・シヴァ信仰の確立)。エフタル(白フン)の侵入で衰退。&quot;}"><rect x="713.0" y="55" width="207.0" height="24" rx="3" fill="rgba(201,169,110,.22)" stroke="rgba(201,169,110,.32)" stroke-width="0.5"/><text x="816.5" y="70.0" text-anchor="middle" fill="var(--text)" font-size="6" font-family="Noto Serif JP" font-weight="700">グプタ朝</text><text x="816.5" y="78.0" text-anchor="middle" fill="var(--text3)" font-size="5" font-family="Noto Sans JP">古典文化の黄金期</text></g><g data-tip="{&quot;n&quot;: &quot;ヴァルダナ朝&quot;, &quot;e&quot;: &quot;606-647&quot;, &quot;d&quot;: &quot;ハルシャ＝ヴァルダナが北インドを再統一。仏教・ヒンドゥー教双方を保護。唐の玄奘三蔵がインドを訪問(630-644)し『大唐西域記』を著す→ナーランダーで学ぶ。ハルシャ死後に帝国は崩壊→ラージプート(武士階級)の諸王国が北インドで分立する時代へ。&quot;}"><rect x="970.4" y="55" width="36.89999999999998" height="24" rx="3" fill="rgba(120,140,100,.18)" stroke="rgba(120,140,100,.28)" stroke-width="0.5"/><text x="988.8499999999999" y="70.0" text-anchor="middle" fill="var(--text)" font-size="6" font-family="Noto Serif JP" font-weight="700">ヴァルダナ朝</text></g><g data-tip="{&quot;n&quot;: &quot;マウリヤ後の分裂期&quot;, &quot;e&quot;: &quot;BC2C-AD1C&quot;, &quot;d&quot;: &quot;バラモン教復興のシュンガ朝。北西インドにギリシア系(バクトリア)・スキタイ系(サカ)・パルティア系王朝が進入→ヘレニズム文化との接触。インド＝ギリシア王メナンドロス(ミリンダ王)が仏教に帰依(『ミリンダ王の問い』)。&quot;}"><rect x="263.0" y="83" width="171.0" height="24" rx="3" fill="rgba(120,140,100,.1)" stroke="rgba(120,140,100,.2)" stroke-width="0.5"/><text x="348.5" y="98.0" text-anchor="middle" fill="var(--text)" font-size="6" font-family="Noto Serif JP" font-weight="700">シュンガ朝等</text><text x="348.5" y="106.0" text-anchor="middle" fill="var(--text3)" font-size="5" font-family="Noto Sans JP">分裂期</text></g><rect x="110" y="115" width="2070" height="30" fill="rgba(255,255,255,.01)" rx="2"/><text x="4" y="133.0" fill="var(--gold2)" font-size="7" font-family="Noto Serif JP" font-weight="700">南インド</text><g data-tip="{&quot;n&quot;: &quot;パッラヴァ朝&quot;, &quot;e&quot;: &quot;4C-9C&quot;, &quot;d&quot;: &quot;南東インド(タミル)。マハーバリプラムの石窟寺院・海岸寺院(世界遺産)。カーンチープラムが首都。東南アジアへのインド文化伝播の拠点。サンスクリット文化の普及。チョーラ朝に滅ぼされる。&quot;}"><rect x="695.0" y="118" width="529.1999999999998" height="24" rx="3" fill="rgba(100,150,130,.2)" stroke="rgba(100,150,130,.3)" stroke-width="0.5"/><text x="959.5999999999999" y="133.0" text-anchor="middle" fill="var(--text)" font-size="6" font-family="Noto Serif JP" font-weight="700">パッラヴァ朝</text><text x="959.5999999999999" y="141.0" text-anchor="middle" fill="var(--text3)" font-size="5" font-family="Noto Sans JP">マハーバリプラム</text></g><g data-tip="{&quot;n&quot;: &quot;チョーラ朝&quot;, &quot;e&quot;: &quot;9C-13C&quot;, &quot;d&quot;: &quot;南インド最大の海洋帝国。ラージェーンドラ1世がスリランカ・東南アジア(シュリーヴィジャヤ)に遠征。インド洋交易の中心。ブリハディーシュワラ寺院(タンジャーヴール)＝ドラヴィダ建築の傑作。ナタラージャ(踊るシヴァ)のブロンズ像。&quot;}"><rect x="1190.0" y="118" width="386.0999999999999" height="24" rx="3" fill="rgba(100,150,130,.25)" stroke="rgba(100,150,130,.35)" stroke-width="0.5"/><text x="1383.05" y="133.0" text-anchor="middle" fill="var(--text)" font-size="6" font-family="Noto Serif JP" font-weight="700">チョーラ朝</text><text x="1383.05" y="141.0" text-anchor="middle" fill="var(--text3)" font-size="5" font-family="Noto Sans JP">海上帝国</text></g><g data-tip="{&quot;n&quot;: &quot;ヴィジャヤナガル王国&quot;, &quot;e&quot;: &quot;1336-1646&quot;, &quot;d&quot;: &quot;デリー＝スルタン朝の南下に対抗して成立したヒンドゥー王国。首都ハンピ(世界遺産＝壮大な遺跡群)。クリシュナデーヴァラーヤ(1509-29)の黄金時代。ターリコータの戦い(1565)でデカン5スルタン国の連合に大敗→衰退→1646年滅亡。&quot;}"><rect x="1627.4" y="118" width="279.0" height="24" rx="3" fill="rgba(100,150,130,.18)" stroke="rgba(100,150,130,.28)" stroke-width="0.5"/><text x="1766.9" y="133.0" text-anchor="middle" fill="var(--text)" font-size="6" font-family="Noto Serif JP" font-weight="700">ヴィジャヤナガル</text><text x="1766.9" y="141.0" text-anchor="middle" fill="var(--text3)" font-size="5" font-family="Noto Sans JP">ハンピ</text></g><rect x="110" y="150" width="2070" height="58" fill="rgba(255,255,255,.01)" rx="2"/><text x="4" y="182.0" fill="var(--gold2)" font-size="7" font-family="Noto Serif JP" font-weight="700">イスラーム諸王朝</text><g data-tip="{&quot;n&quot;: &quot;ガズナ朝・ゴール朝&quot;, &quot;e&quot;: &quot;977-1206&quot;, &quot;d&quot;: &quot;テュルク系イスラーム勢力の北インド侵入。ガズナのマフムード(998-1030)が17回遠征しソムナート寺院を破壊。ゴール朝のムハンマドが北インドを征服→奴隷将軍アイバクがデリーを拠点にデリー＝スルタン朝(奴隷王朝)を開く。&quot;}"><rect x="1304.3000000000002" y="153" width="206.0999999999999" height="24" rx="3" fill="rgba(180,130,80,.18)" stroke="rgba(180,130,80,.28)" stroke-width="0.5"/><text x="1407.3500000000001" y="168.0" text-anchor="middle" fill="var(--text)" font-size="6" font-family="Noto Serif JP" font-weight="700">ガズナ/ゴール朝</text></g><g data-tip="{&quot;n&quot;: &quot;デリー＝スルタン朝&quot;, &quot;e&quot;: &quot;1206-1526&quot;, &quot;d&quot;: &quot;奴隷王朝(1206-90)＝クトゥブ＝ミナール建設。ハルジー朝(1290-1320)＝アラーウッディーンの南インド遠征。トゥグルク朝(1320-1413)＝イブン＝バットゥータが訪問。ティムールのデリー略奪(1398)で壊滅的打撃。サイイド朝→ロディー朝。バーブルがロディー朝を倒しムガル帝国建国。&quot;}"><rect x="1510.4" y="153" width="287.9999999999998" height="24" rx="3" fill="rgba(180,130,80,.25)" stroke="rgba(180,130,80,.35)" stroke-width="0.5"/><text x="1654.4" y="168.0" text-anchor="middle" fill="var(--text)" font-size="6" font-family="Noto Serif JP" font-weight="700">デリー＝スルタン朝</text><text x="1654.4" y="176.0" text-anchor="middle" fill="var(--text3)" font-size="5" font-family="Noto Sans JP">5王朝</text></g><g data-tip="{&quot;n&quot;: &quot;ムガル帝国 全盛期&quot;, &quot;e&quot;: &quot;1526-1707&quot;, &quot;d&quot;: &quot;ティムール朝の末裔バーブルがパーニーパットの戦い(1526)で建国。第2代フマーユーンは一時亡命→第3代アクバル(1556-1605)が最盛期＝宗教融和(ジズヤ廃止・ヒンドゥー妃との婚姻)・マンサブダール制・ファテープル＝シークリー建設。ジャハーンギール→シャー＝ジャハーン(タージ＝マハル建設)。アウラングゼーブ(1658-1707)＝最大版図だがジズヤ復活→デカン戦争で消耗→死後急速に衰退。&quot;}"><rect x="1798.3999999999999" y="153" width="162.9000000000001" height="24" rx="3" fill="rgba(180,130,80,.3)" stroke="rgba(180,130,80,.4)" stroke-width="0.5"/><text x="1879.85" y="168.0" text-anchor="middle" fill="var(--text)" font-size="6" font-family="Noto Serif JP" font-weight="700">ムガル帝国(全盛)</text></g><g data-tip="{&quot;n&quot;: &quot;ムガル帝国 衰退&quot;, &quot;e&quot;: &quot;1707-1857&quot;, &quot;d&quot;: &quot;マラーター同盟(ヒンドゥー)・ニザーム(ハイダラバード)・シク教徒(パンジャーブ)が台頭。ナーディル＝シャー(ペルシア)のデリー略奪(1739)。プラッシーの戦い(1757)で英東インド会社がベンガルの実権掌握。ムガル皇帝はデリーの傀儡に。1857年のインド大反乱で最後の皇帝バハードゥル＝シャー2世が廃位→ムガル完全滅亡。&quot;}"><rect x="1961.3" y="181" width="135.00000000000023" height="24" rx="3" fill="rgba(180,130,80,.1)" stroke="rgba(180,130,80,.2)" stroke-width="0.5"/><text x="2028.8000000000002" y="196.0" text-anchor="middle" fill="var(--text)" font-size="6" font-family="Noto Serif JP" font-weight="700">ムガル衰退</text><text x="2028.8000000000002" y="204.0" text-anchor="middle" fill="var(--text3)" font-size="5" font-family="Noto Sans JP">傀儡化</text></g><rect x="110" y="213" width="2070" height="30" fill="rgba(255,255,255,.01)" rx="2"/><text x="4" y="231.0" fill="var(--gold2)" font-size="7" font-family="Noto Serif JP" font-weight="700">英東インド会社</text><g data-tip="{&quot;n&quot;: &quot;英東インド会社の支配&quot;, &quot;e&quot;: &quot;1757-1857&quot;, &quot;d&quot;: &quot;プラッシーの戦い(1757)→ベンガルのディーワーニー(徴税権)獲得(1765)。マイソール戦争(ティプー＝スルタン)→マラーター戦争→シク戦争で全インドを掌握。永久地税制(ベンガル＝ザミンダーリー制)・ライヤットワーリー制(南インド)。英の綿製品流入→インドの伝統的手工業壊滅(「織工の骨がインドの平原を白くした」)。マコーレーの英語教育政策(1835)。鉄道建設(原料輸送のため)。&quot;}"><rect x="2006.3" y="216" width="90.00000000000023" height="24" rx="3" fill="rgba(100,130,180,.2)" stroke="rgba(100,130,180,.3)" stroke-width="0.5"/><text x="2051.3" y="231.0" text-anchor="middle" fill="var(--text)" font-size="6" font-family="Noto Serif JP" font-weight="700">東インド会社支配</text></g><rect x="110" y="248" width="2070" height="58" fill="rgba(255,255,255,.01)" rx="2"/><text x="4" y="280.0" fill="var(--gold2)" font-size="7" font-family="Noto Serif JP" font-weight="700">英領インド帝国</text><g data-tip="{&quot;n&quot;: &quot;英領インド帝国&quot;, &quot;e&quot;: &quot;1857-1885&quot;, &quot;d&quot;: &quot;インド大反乱(1857)＝セポイ(インド人傭兵)の反乱→旧ムガル皇帝を擁立→英軍が鎮圧。東インド会社解散→英政府の直接統治(インド担当大臣・総督)。ヴィクトリア女王がインド皇帝を兼ねる(1877)。近代的行政・法制度の導入。しかしインドの富がイギリスに流出(「富の流出論」＝ナオロージー)。&quot;}"><rect x="2096.3" y="251" width="25.199999999999818" height="24" rx="3" fill="rgba(100,130,180,.25)" stroke="rgba(100,130,180,.35)" stroke-width="0.5"/><text x="2108.9" y="266.0" text-anchor="middle" fill="var(--text)" font-size="6" font-family="Noto Serif JP" font-weight="700">直接統治</text></g><g data-tip="{&quot;n&quot;: &quot;インド国民会議派&quot;, &quot;e&quot;: &quot;1885-1919&quot;, &quot;d&quot;: &quot;1885年インド国民会議派結成＝当初は英教育を受けたエリートの穏健な改革要求。ベンガル分割令(1905)への反対→スワデーシー(国産品愛用)・スワラージ(自治)・ボイコット・民族教育の4綱領。急進派ティラク「スワラージは我が生得の権利」。ムスリム連盟結成(1906)＝ヒンドゥーとムスリムの溝。ローラット法(1919)→アムリトサル事件(1919.4)＝英軍が非武装の群衆に無差別射撃→約400人死亡→ガンディーの非協力運動へ。&quot;}"><rect x="2121.5" y="251" width="30.59999999999991" height="24" rx="3" fill="rgba(80,150,120,.18)" stroke="rgba(80,150,120,.28)" stroke-width="0.5"/><text x="2136.8" y="266.0" text-anchor="middle" fill="var(--text)" font-size="6" font-family="Noto Serif JP" font-weight="700">国民会議派の時代</text></g><g data-tip="{&quot;n&quot;: &quot;ガンディーの非暴力・不服従運動&quot;, &quot;e&quot;: &quot;1919-35&quot;, &quot;d&quot;: &quot;第1次非協力運動(1920-22)＝法廷・学校・行政機関のボイコット→チャウリ＝チャウラ事件(暴力事件)で中止。塩の行進(1930)＝ガンディーが78人と380kmを行進→英の塩税に対する非暴力抗議。第2次非協力運動(不服従運動)。英印円卓会議(1930-32)。インド統治法(1935)＝州レベルの自治。ガンディーの「不可触民」(ハリジャン)運動＝カースト差別との戦い。&quot;}"><rect x="2152.1" y="279" width="14.400000000000091" height="24" rx="3" fill="rgba(80,150,120,.22)" stroke="rgba(80,150,120,.32)" stroke-width="0.5"/></g><g data-tip="{&quot;n&quot;: &quot;インドの独立&quot;, &quot;e&quot;: &quot;1935-1947&quot;, &quot;d&quot;: &quot;インド統治法(1935)で州自治→国民会議派が多くの州で政権獲得。WW2＝「インドを去れ(Quit India)」運動(1942)→ガンディー・ネルーら指導者逮捕。ムスリム連盟のジンナーが「パキスタン決議」(1940)＝ムスリム国家の要求。1946年カルカッタ暴動(ヒンドゥーvsムスリム)。マウントバッテン総督が分離独立を決定→1947.8.14パキスタン独立、8.15インド独立。大規模な住民移動で約100万人死亡。ガンディー暗殺(1948.1.30)。&quot;}"><rect x="2166.5" y="279" width="10.800000000000182" height="24" rx="3" fill="rgba(80,150,120,.28)" stroke="rgba(80,150,120,.38)" stroke-width="0.5"/></g><rect x="110" y="311" width="2070" height="30" fill="rgba(255,255,255,.01)" rx="2"/><text x="4" y="329.0" fill="var(--gold2)" font-size="7" font-family="Noto Serif JP" font-weight="700">宗教・文化</text><g data-tip="{&quot;n&quot;: &quot;仏教とジャイナ教&quot;, &quot;e&quot;: &quot;BC6C-&quot;, &quot;d&quot;: &quot;ガウタマ＝シッダールタ(ブッダ、BC463頃-BC383頃)が仏教を開く。四諦・八正道・中道・縁起の法。マハーヴィーラがジャイナ教を開く＝不殺生(アヒンサー)の徹底。いずれもバラモン教のカースト制・祭祀独占への批判。クシャトリヤ(王族・武士)や商人層に支持される。&quot;}"><rect x="-25.0" y="314" width="270.0" height="24" rx="3" fill="rgba(160,140,100,.15)" stroke="rgba(160,140,100,.25)" stroke-width="0.5"/><text x="110.0" y="329.0" text-anchor="middle" fill="var(--text)" font-size="6" font-family="Noto Serif JP" font-weight="700">仏教・ジャイナ教</text></g><g data-tip="{&quo
