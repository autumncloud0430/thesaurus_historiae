</style></head><body><div class="hdr"><h1>中国近代化タイムライン(1840-2000)</h1><a href="charts.html">← Ad Chartae</a></div><div class="legend"><div class="li"><div class="ld" style="background:rgba(180,140,80,.2);border:1px solid rgba(180,140,80,.3)"></div>清朝</div><div class="li"><div class="ld" style="background:rgba(100,150,130,.2);border:1px solid rgba(100,150,130,.3)"></div>中華民国</div><div class="li"><div class="ld" style="background:rgba(180,80,80,.2);border:1px solid rgba(180,80,80,.3)"></div>中華人民共和国</div><div class="li"><div class="ld" style="background:rgba(80,150,120,.2);border:1px solid rgba(80,150,120,.3)"></div>改革開放</div><div class="li" style="font-size:6px">各バーにマウスオーバーで詳細 ← 横スクロール →</div></div><div class="wrap"><svg viewBox="0 0 1800 260" xmlns="http://www.w3.org/2000/svg" style="width:1800px;height:260px;min-width:1800px"><defs><style>g[data-tip]:hover rect{filter:brightness(1.3)}</style></defs><line x1="90.0" y1="26" x2="90.0" y2="260" stroke="rgba(201,169,110,.06)"/><text x="90.0" y="22" text-anchor="middle" fill="rgba(201,169,110,.5)" font-size="8" font-family="Cormorant Garamond" font-weight="700">1840</text><line x1="195.625" y1="32" x2="195.625" y2="260" stroke="rgba(255,255,255,.015)"/><text x="195.625" y="30" text-anchor="middle" fill="rgba(201,169,110,.25)" font-size="6" font-family="Cormorant Garamond">1850</text><line x1="301.25" y1="26" x2="301.25" y2="260" stroke="rgba(201,169,110,.06)"/><text x="301.25" y="22" text-anchor="middle" fill="rgba(201,169,110,.5)" font-size="8" font-family="Cormorant Garamond" font-weight="700">1860</text><line x1="406.875" y1="32" x2="406.875" y2="260" stroke="rgba(255,255,255,.015)"/><text x="406.875" y="30" text-anchor="middle" fill="rgba(201,169,110,.25)" font-size="6" font-family="Cormorant Garamond">1870</text><line x1="512.5" y1="26" x2="512.5" y2="260" stroke="rgba(201,169,110,.06)"/><text x="512.5" y="22" text-anchor="middle" fill="rgba(201,169,110,.5)" font-size="8" font-family="Cormorant Garamond" font-weight="700">1880</text><line x1="618.125" y1="32" x2="618.125" y2="260" stroke="rgba(255,255,255,.015)"/><text x="618.125" y="30" text-anchor="middle" fill="rgba(201,169,110,.25)" font-size="6" font-family="Cormorant Garamond">1890</text><line x1="723.75" y1="26" x2="723.75" y2="260" stroke="rgba(201,169,110,.06)"/><text x="723.75" y="22" text-anchor="middle" fill="rgba(201,169,110,.5)" font-size="8" font-family="Cormorant Garamond" font-weight="700">1900</text><line x1="829.375" y1="32" x2="829.375" y2="260" stroke="rgba(255,255,255,.015)"/><text x="829.375" y="30" text-anchor="middle" fill="rgba(201,169,110,.25)" font-size="6" font-family="Cormorant Garamond">1910</text><line x1="935.0" y1="26" x2="935.0" y2="260" stroke="rgba(201,169,110,.06)"/><text x="935.0" y="22" text-anchor="middle" fill="rgba(201,169,110,.5)" font-size="8" font-family="Cormorant Garamond" font-weight="700">1920</text><line x1="1040.625" y1="32" x2="1040.625" y2="260" stroke="rgba(255,255,255,.015)"/><text x="1040.625" y="30" text-anchor="middle" fill="rgba(201,169,110,.25)" font-size="6" font-family="Cormorant Garamond">1930</text><line x1="1146.25" y1="26" x2="1146.25" y2="260" stroke="rgba(201,169,110,.06)"/><text x="1146.25" y="22" text-anchor="middle" fill="rgba(201,169,110,.5)" font-size="8" font-family="Cormorant Garamond" font-weight="700">1940</text><line x1="1251.875" y1="32" x2="1251.875" y2="260" stroke="rgba(255,255,255,.015)"/><text x="1251.875" y="30" text-anchor="middle" fill="rgba(201,169,110,.25)" font-size="6" font-family="Cormorant Garamond">1950</text><line x1="1357.5" y1="26" x2="1357.5" y2="260" stroke="rgba(201,169,110,.06)"/><text x="1357.5" y="22" text-anchor="middle" fill="rgba(201,169,110,.5)" font-size="8" font-family="Cormorant Garamond" font-weight="700">1960</text><line x1="1463.125" y1="32" x2="1463.125" y2="260" stroke="rgba(255,255,255,.015)"/><text x="1463.125" y="30" text-anchor="middle" fill="rgba(201,169,110,.25)" font-size="6" font-family="Cormorant Garamond">1970</text><line x1="1568.75" y1="26" x2="1568.75" y2="260" stroke="rgba(201,169,110,.06)"/><text x="1568.75" y="22" text-anchor="middle" fill="rgba(201,169,110,.5)" font-size="8" font-family="Cormorant Garamond" font-weight="700">1980</text><line x1="1674.375" y1="32" x2="1674.375" y2="260" stroke="rgba(255,255,255,.015)"/><text x="1674.375" y="30" text-anchor="middle" fill="rgba(201,169,110,.25)" font-size="6" font-family="Cormorant Garamond">1990</text><line x1="1780.0" y1="26" x2="1780.0" y2="260" stroke="rgba(201,169,110,.06)"/><text x="1780.0" y="22" text-anchor="middle" fill="rgba(201,169,110,.5)" font-size="8" font-family="Cormorant Garamond" font-weight="700">2000</text><rect x="90" y="55" width="1690" height="50" fill="rgba(255,255,255,.01)" rx="2"/><text x="4" y="83" fill="var(--gold2)" font-size="7" font-family="Noto Serif JP" font-weight="700">政治体制</text><g data-tip="{&quot;n&quot;: &quot;清朝末期&quot;, &quot;e&quot;: &quot;1840-1912&quot;, &quot;d&quot;: &quot;アヘン戦争(1840-42)で西洋の衝撃。太平天国の乱(1851-64)で国力消耗。洋務運動(1861-95)＝「中体西用」→日清戦争敗北で失敗露呈。戊戌変法(1898)＝康有為・梁啓超の改革→103日で挫折(西太后のクーデタ)。義和団事件(1900)→8カ国連合軍→北京議定書。清末新政(科挙廃止1905)→遅すぎた改革。1911年辛亥革命→1912年宣統帝(溥儀)退位＝清朝滅亡。&quot;}"><rect x="90.0" y="63" width="760.5" height="35" rx="3" fill="rgba(180,140,80,.2)" stroke="rgba(180,140,80,.3)" stroke-width="0.5"/><text x="470.25" y="83.5" text-anchor="middle" fill="var(--text)" font-size="6.5" font-family="Noto Serif JP" font-weight="700">清朝末期</text></g><g data-tip="{&quot;n&quot;: &quot;中華民国 混乱期&quot;, &quot;e&quot;: &quot;1912-1928&quot;, &quot;d&quot;: &quot;孫文が臨時大総統→袁世凱に譲る→袁世凱が皇帝即位を画策(1915)→失敗・死去(1916)→軍閥割拠の時代。五四運動(1919)＝ヴェルサイユ条約への抗議→反帝国主義・反封建運動。中国共産党結成(1921)。孫文の第一次国共合作(1924)→孫文死去(1925)→蒋介石が実権掌握→北伐(1926-28)→上海クーデタ(1927)で共産党を弾圧。&quot;}"><rect x="850.5" y="63" width="169.0000000000001" height="35" rx="3" fill="rgba(100,150,130,.18)" stroke="rgba(100,150,130,.28)" stroke-width="0.5"/><text x="935.0" y="83.5" text-anchor="middle" fill="var(--text)" font-size="6.5" font-family="Noto Serif JP" font-weight="700">中華民国(混乱)</text><text x="935.0" y="92.5" text-anchor="middle" fill="var(--text3)" font-size="5.5" font-family="Noto Sans JP">軍閥割拠</text></g><g data-tip="{&quot;n&quot;: &quot;南京国民政府&quot;, &quot;e&quot;: &quot;1928-1949&quot;, &quot;d&quot;: &quot;蒋介石が北伐を完了し南京に国民政府を樹立。共産党への包囲討伐戦→長征(1934-36)＝共産党が延安に根拠地を移す。西安事件(1936)＝張学良が蒋介石を監禁→第二次国共合作→抗日統一戦線。日中戦争(1937-45)＝重慶に遷都。WW2後の国共内戦→共産党の勝利→蒋介石は台湾に撤退(1949)。&quot;}"><rect x="1019.5000000000001" y="63" width="221.8124999999999" height="35" rx="3" fill="rgba(100,150,130,.22)" stroke="rgba(100,150,130,.32)" stroke-width="0.5"/><text x="1130.40625" y="83.5" text-anchor="middle" fill="var(--text)" font-size="6.5" font-family="Noto Serif JP" font-weight="700">国民政府(南京)</text><text x="1130.40625" y="92.5" text-anchor="middle" fill="var(--text3)" font-size="5.5" font-family="Noto Sans JP">蒋介石</text></g><g data-tip="{&quot;n&quot;: &quot;中華人民共和国&quot;, &quot;e&quot;: &quot;1949-&quot;, &quot;d&quot;: &quot;毛沢東が天安門で建国宣言(1949.10.1)。土地改革(地主の土地を農民に分配)。朝鮮戦争参戦(1950-53)。第一次五カ年計画(1953-57)＝ソ連型重工業化。反右派闘争(1957)＝知識人弾圧。大躍進政策(1958-61)→大飢饉。文化大革命(1966-76)→毛沢東死去・四人組逮捕。鄧小平の改革開放(1978-)→経済特区→社会主義市場経済。天安門事件(1989)。WTO加盟(2001)。&quot;}"><rect x="1241.3125" y="63" width="538.6875" height="35" rx="3" fill="rgba(180,80,80,.22)" stroke="rgba(180,80,80,.32)" stroke-width="0.5"/><text x="1510.65625" y="83.5" text-anchor="middle" fill="var(--text)" font-size="6.5" font-family="Noto Serif JP" font-weight="700">中華人民共和国</text></g><rect x="90" y="125" width="1690" height="50" fill="rgba(255,255,255,.01)" rx="2"/><text x="4" y="153" fill="var(--gold2)" font-size="7" font-family="Noto Serif JP" font-weight="700">近代化の試み</text><g data-tip="{&quot;n&quot;: &quot;洋務運動&quot;, &quot;e&quot;: &quot;1861-1895&quot;, &quot;d&quot;: &quot;曾国藩・李鴻章・左宗棠・張之洞らの「自強運動」。スローガンは「中体西用(中国の体制を維持し西洋の技術を利用)」。江南製造局(軍事)・輪船招商局(海運)等を設立。北洋艦隊を整備。しかし日清戦争(1894-95)で北洋艦隊が壊滅し制度の根本的改革なしには近代化できないことが明らかに。&quot;}"><rect x="311.8125" y="133" width="359.125" height="35" rx="3" fill="rgba(130,130,160,.18)" stroke="rgba(130,130,160,.28)" stroke-width="0.5"/><text x="491.375" y="153.5" text-anchor="middle" fill="var(--text)" font-size="6.5" font-family="Noto Serif JP" font-weight="700">洋務運動</text><text x="491.375" y="162.5" text-anchor="middle" fill="var(--text3)" font-size="5.5" font-family="Noto Sans JP">中体西用</text></g><g data-tip="{&quot;n&quot;: &quot;清末新政&quot;, &quot;e&quot;: &quot;1905-1911&quot;, &quot;d&quot;: &quot;義和団事件後の遅すぎた改革。科挙制度の廃止(1905)＝1300年続いた官吏登用制度の終焉。新式軍隊の整備。欽定憲法大綱(1908)＝立憲君主制の約束。しかし皇族内閣の組閣(1911)で民心が離反→辛亥革命。「太遅太少(too late, too little)」の典型例。&quot;}"><rect x="776.5625" y="133" width="63.375" height="35" rx="3" fill="rgba(130,130,160,.15)" stroke="rgba(130,130,160,.25)" stroke-width="0.5"/><text x="808.25" y="153.5" text-anchor="middle" fill="var(--text)" font-size="6.5" font-family="Noto Serif JP" font-weight="700">清末新政</text></g><g data-tip="{&quot;n&quot;: &quot;新文化運動と五四運動&quot;, &quot;e&quot;: &quot;1915-1930&quot;, &quot;d&quot;: &quot;陳独秀が『新青年』(1915)で儒教批判と科学・民主主義(「徳先生と賽先生」)を提唱。胡適の白話文学運動→魯迅『狂人日記』(1918)。五四運動(1919.5.4)＝ヴェルサイユ条約で山東省の旧ドイツ利権が日本に→学生デモ→全国に波及＝反帝国主義・反封建運動。マルクス主義の流入→中国共産党結成(1921)の土壌に。&quot;}"><rect x="924.4375" y="133" width="116.1875" height="35" rx="3" fill="rgba(130,130,160,.2)" stroke="rgba(130,130,160,.3)" stroke-width="0.5"/><text x="982.53125" y="153.5" text-anchor="middle" fill="var(--text)" font-size="6.5" font-family="Noto Serif JP" font-weight="700">新文化運動</text><text x="982.53125" y="162.5" text-anchor="middle" fill="var(--text3)" font-size="5.5" font-family="Noto Sans JP">五四</text></g><g data-tip="{&quot;n&quot;: &quot;第一次五カ年計画&quot;, &quot;e&quot;: &quot;1953-1957&quot;, &quot;d&quot;: &quot;ソ連の技術援助による重工業化計画。鞍山製鉄所等の建設。農業の集団化。工業生産は年平均18%成長と一定の成功を収める。しかし毛沢東はソ連型の漸進路線に不満→大躍進政策への布石。百花斉放・百家争鳴(1956)→反右派闘争(1957)で知識人を弾圧。&quot;}"><rect x="1283.5625" y="133" width="42.25" height="35" rx="3" fill="rgba(180,80,80,.15)" stroke="rgba(180,80,80,.25)" stroke-width="0.5"/><text x="1304.6875" y="153.5" text-anchor="middle" fill="var(--text)" font-size="6.5" font-family="Noto Serif JP" font-weight="700">第一次五カ年</text></g><g data-tip="{&quot;n&quot;: &quot;大躍進政策&quot;, &quot;e&quot;: &quot;1958-1961&quot;, &quot;d&quot;: &quot;毛沢東主導の急進的工業化・農業集団化。人民公社の設立。「15年でイギリスに追いつく」のスローガン。裏庭製鉄(低品質の鉄を大量生産)。非現実的な穀物増産報告(水増し)→実際は大飢饉→推定1500万〜5500万人が餓死(中国近代史最大の人災)。毛沢東は国家主席を辞任(1959)→劉少奇・鄧小平が実務を担当。&quot;}"><rect x="1336.375" y="133" width="31.6875" height="35" rx="3" fill="rgba(180,60,60,.22)" stroke="rgba(180,60,60,.32)" stroke-width="0.5"/><text x="1352.21875" y="153.5" text-anchor="middle" fill="var(--text)" font-size="6.5" font-family="Noto Serif JP" font-weight="700">大躍進</text></g><g data-tip="{&quot;n&quot;: &quot;プロレタリア文化大革命&quot;, &quot;e&quot;: &quot;1966-1976&quot;, &quot;d&quot;: &quot;大躍進の失敗で後退した毛沢東が権力奪還のために発動。「造反有理(反逆に道理あり)」のスローガン。紅衛兵(毛沢東を崇拝する学生)が知識人・幹部を迫害。劉少奇が失脚・獄死。林彪事件(1971)。鄧小平も2度失脚。古典文化・文化財の大規模な破壊。経済・教育が10年間停滞。毛沢東死去(1976.9)→四人組逮捕(1976.10)で終結。&quot;}"><rect x="1420.875" y="133" width="105.625" height="35" rx="3" fill="rgba(180,60,60,.28)" stroke="rgba(180,60,60,.38)" stroke-width="0.5"/><text x="1473.6875" y="153.5" text-anchor="middle" fill="var(--text)" font-size="6.5" font-family="Noto Serif JP" font-weight="700">文化大革命</text></g><g data-tip="{&quot;n&quot;: &quot;改革開放&quot;, &quot;e&quot;: &quot;1978-&quot;, &quot;d&quot;: &quot;鄧小平が実権掌握。1978年12月の第11期三中全会が転換点。農村＝人民公社を解体し生産請負制(家庭連産承包責任制)を導入→農業生産が急増。工業＝経済特区(深圳・珠海・汕頭・厦門)を設置→外資を導入。「先富論(先に豊かになれる者から豊かになれ)」。社会主義市場経済＝共産党の一党支配を維持しつつ市場経済を導入。天安門事件(1989)＝民主化要求を武力弾圧→国際的孤立→鄧小平の南巡講話(1992)で改革加速。&quot;}"><rect x="1547.625" y="133" width="232.375" height="35" rx="3" fill="rgba(80,150,120,.25)" stroke="rgba(80,150,120,.35)" stroke-width="0.5"/><text x="1663.8125" y="153.5" text-anchor="middle" fill="var(--text)" font-size="6.5" font-family="Noto Serif JP" font-weight="700">改革開放</text><text x="1663.8125" y="162.5" text-anchor="middle" fill="var(--text3)" font-size="5.5" font-family="Noto Sans JP">鄧小平</text></g><rect x="90" y="200" width="1690" height="50" fill="rgba(255,255,255,.01)" rx="2"/><text x="4" y="228" fill="var(--gold2)" font-size="7" font-family="Noto Serif JP" font-weight="700">対外関係</text><g data-tip="{&quot;n&quot;: &quot;日中戦争&quot;, &quot;e&quot;: &quot;1937-1945&quot;, &quot;d&quot;: &quot;1937年盧溝橋事件→全面戦争。南京事件(1937.12)。蒋介石は重慶に遷都。第二次国共合作(1937)→共産党は延安を拠点にゲリラ戦。アメリカの参戦(1941)で連合国に。カイロ宣言(1943)で日本の敗北後の中国への領土返還を確認。1945年8月15日日本降伏。&quot;}"><rect x="1114.5625" y="208" width="84.5" height="35" rx="3" fill="rgba(180,80,80,.22)" stroke="rgba(180,80,80,.32)" stroke-width="0.5"/><text x="1156.8125" y="228.5" text-anchor="middle" fill="var(--text)" font-size="6.5" font-family="Noto Serif JP" font-weight="700">日中戦争</text></g><g data-tip="{&quot;n&quot;: &quot;朝鮮戦争と中国&quot;, &quot;e&quot;: &quot;1950-53&quot;, &quot;d&quot;: &quot;1950年10月、中国人民義勇軍(実質は正規軍)が北朝鮮を支援して参戦。マッカーサーの中国本土爆撃案をトルーマンが却下→マッカーサー解任。38度線付近で膠着→1953年休戦。中国は「抗美援朝(アメリカに抗し朝鮮を援ける)」として国内統合に利用。米中対立が固定化。&quot;}"><rect x="1251.875" y="208" width="31.6875" height="35" rx="3" fill="rgba(180,80,80,.15)" stroke="rgba(180,80,80,.25)" stroke-width="0.5"/><text x="1267.71875" y="228.5" text-anchor="middle" fill="var(--text)" font-size="6.5" font-family="Noto Serif JP" font-weight="700">朝鮮</text></g><g data-tip="{&quot;n&quot;: &quot;戊戌変法(百日維新)&quot;, &quot;e&quot;: &quot;1898&quot;, &quot;d&quot;: &quot;光緒帝と康有為・梁啓超が立憲君主制をめざす急進改革。科挙改革・新式学校・議会開設等を布告。しかし西太后のクーデタで103日で挫折。譚嗣同ら「戊戌の六君子」が処刑。康有為・梁啓超は日本に亡命。変法の失敗→革命路線(孫文)への転換。&quot;}" style="cursor:pointer"><rect x="702.625" y="133" width="21.125" height="35" rx="3" fill="rgba(100,130,180,.2)" stroke="rgba(100,130,180,.3)" stroke-width="0.5"/><text x="713.1875" y="130" text-anchor="middle" fill="var(--text2)" font-size="6" font-family="Noto Sans JP">戊戌変法</text></g><g data-tip="{&quot;n&quot;: &quot;アヘン戦争&quot;, &quot;e&quot;: &quot;1840-42&quot;, &quot;d&quot;: &quot;林則徐がイギリス商人のアヘンを没収・焼却→イギリスが報復として派兵。南京条約(1842)＝香港割譲・広州等5港開港・公行の廃止・賠償金2100万ドル。追加条約で治外法権・協定関税・最恵国待遇→不平等条約体制の始まり。中国の半植民地化の出発点。&quot;}" style="cursor:pointer"><rect x="90.0" y="208" width="21.125" height="35" rx="3" fill="rgba(100,130,180,.2)" stroke="rgba(100,130,180,.3)" stroke-width="0.5"/><text x="100.5625" y="205" text-anchor="middle" fill="var(--text2)" font-size="6" font-family="Noto Sans JP">アヘン戦争</text></g><g data-tip="{&quot;n&quot;: &quot;アロー戦争(第二次アヘン戦争)&quot;, &quot;e&quot;: &quot;1856-60&quot;, &quot;d&quot;: &quot;アロー号事件(英)・フランス人宣教師殺害(仏)を口実に英仏連合軍が出兵。天津条約(1858)→北京条約(1860)＝天津等の追加開港・九龍割譲。英仏連合軍が円明園を略奪・放火＝中国における帝国主義侵略の象徴。ロシアも沿海州を獲得(北京条約)。&quot;}" style="cursor:pointer"><rect x="259.0" y="208" width="21.125" height="35" rx="3" fill="rgba(100,130,180,.2)" stroke="rgba(100,130,180,.3)" stroke-width="0.5"/><text x="269.5625" y="205" text-anchor="middle" fill="var(--text2)" font-size="6" font-family="Noto Sans JP">アロー戦争</text></g><g data-tip="{&quot;n&quot;: &quot;日清戦争&quot;, &quot;e&quot;: &quot;1894-95&quot;, &quot;d&quot;: &quot;朝鮮の東学党の乱(甲午農民戦争)への出兵をめぐり日清が衝突。下関条約(1895)＝遼東半島・台湾・澎湖諸島の割譲、賠償金2億テール。三国干渉(露仏独)で遼東半島を返還→列強の中国分割が加速(租借地・勢力圏の設定)。変法運動の契機。&quot;}" style="cursor:pointer"><rect x="660.375" y="208" width="21.125" height="35" rx="3" fill="rgba(100,130,180,.2)" stroke="rgba(100,130,180,.3)" stroke-width="0.5"/><text x="670.9375" y="205" text-anchor="middle" fill="var(--text2)" font-size="6" font-family="Noto Sans JP">日清戦争</text></g><g data-tip="{&quot;n&quot;: &quot;義和団事件&quot;, &quot;e&quot;: &quot;1900-01&quot;, &quot;d&quot;: &quot;「扶清滅洋(清を助け洋を滅ぼす)」を掲げる義和団が北京の列強公使館を包囲。西太后が列強に宣戦布告。8カ国連合軍(日英米仏独露伊墺)が鎮圧。北京議定書(辛丑条約)＝巨額の賠償金(4億5000万テール)・外国軍の北京駐留権→清朝の半植民地化が決定的に。&quot;}" style="cursor:pointer"><rect x="723.75" y="208" width="21.125" height="35" rx="3" fill="rgba(100,130,180,.2)" stroke="rgba(100,130,180,.3)" stroke-width="0.5"/><text x="734.3125" y="205" text-anchor="middle" fill="var(--text2)" font-size="6" font-family="Noto Sans JP">義和団</text></g><line x1="111.125" y1="38" x2="111.125" y2="260" stroke="rgba(201,169,110,.4)" stroke-width="1" stroke-dasharray="2,2"/><text x="111.125" y="35" text-anchor="middle" fill="rgba(201,169,110,.6)" font-size="5.5" font-family="Noto Sans JP">1842 南京条約</text><line x1="206.1875" y1="38" x2="206.1875" y2="260" stroke="rgba(201,169,110,.4)" stroke-width="1" stroke-dasharray="2,2"/><text x="206.1875" y="35" text-anchor="middle" fill="rgba(201,169,110,.6)" font-size="5.5" font-family="Noto Sans JP">1851 太平天国</text><line x1="702.625" y1="38" x2="702.625" y2="260" stroke="rgba(201,169,110,.4)" stroke-width="1" stroke-dasharray="2,2"/><text x="702.625" y="35" text-anchor="middle" fill="rgba(201,169,110,.6)" font-size="5.5" font-family="Noto Sans JP">1898 戊戌</text><line x1="839.9375" y1="38" x2="839.9375" y2="260" stroke="rgba(201,169,110,.4)" stroke-width="1" stroke-dasharray="2,2"/><text x="839.9375" y="35" text-anchor="middle" fill="rgba(201,169,110,.6)" font-size="5.5" font-family="Noto Sans JP">1911 辛亥革命</text><line x1="945.5625" y1="38" x2="945.5625" y2="260" stroke="rgba(201,169,110,.4)" stroke-width="1" stroke-dasharray="2,2"/><text x="945.5625" y="35" text-anchor="middle" fill="rgba(201,169,110,.6)" font-size="5.5" font-family="Noto Sans JP">1921 共産党</text><line x1="1082.875" y1="38" x2="1082.875" y2="260" stroke="rgba(201,169,110,.4)" stroke-width="1" stroke-dasharray="2,2"/><text x="1082.875" y="35" text-anchor="middle" fill="rgba(201,169,110,.6)" font-size="5.5" font-family="Noto Sans JP">1934 長征</text><line x1="1241.3125" y1="38" x2="1241.3125" y2="260" stroke="rgba(201,169,110,.4)" stroke-width="1" stroke-dasharray="2,2"/><text x="1241.3125" y="35" text-anchor="middle" fill="rgba(201,169,110,.6)" font-size="5.5" font-family="Noto Sans JP">1949 建国</text><line x1="1484.25" y1="38" x2="1484.25" y2="260" stroke="rgba(201,169,110,.4)" stroke-width="1" stroke-dasharray="2,2"/><text x="1484.25" y="35" text-anchor="middle" fill="rgba(201,169,110,.6)" font-size="5.5" font-family="Noto Sans JP">1972 ニクソン訪中</text><line x1="1663.8125" y1="38" x2="1663.8125" y2="260" stroke="rgba(201,169,110,.4)" stroke-width="1" stroke-dasharray="2,2"/><text x="1663.8125" y="35" text-anchor="middle" fill="rgba(201,169,110,.6)" font-size="5.5" font-family="Noto Sans JP">1989 天安門</text></svg></div><div class="note"><p>中国近代化＝<strong>「屈辱の世紀(1840-1949)→社会主義建設(1949-78)→改革開放(1978-)」</strong>の三段階。全バーにマウスオーバーで詳細表示。「洋務運動→変法→革命→共産主義→市場経済」という近代化路線の変遷と、各段階の成功・失敗の原因が入試の論述テーマ。</p></div><div class="tt" id="tooltip"><div class="tt-name"></div><div class="tt-era"></div><div class="tt-desc"></div></div><script>var tt=document.getElementById("tooltip");document.querySelectorAll("[data-tip]").forEach(function(el){el.style.cursor="pointer";el.addEventListener("mouseenter",function(e){var d=JSON.parse(el.getAttribute("data-tip"));tt.querySelector(".tt-name").textContent=d.n||"";tt.querySelector(".tt-era").textContent=d.e||"";tt.querySelector(".tt-desc").textContent=d.d||"";tt.style.display="block";var r=el.getBoundingClientRect();var tx=Math.min(r.left,window.innerWidth-370);var ty=r.bottom+6;if(ty+tt.offsetHeight>window.innerHeight)ty=r.top-tt.offsetHeight-6;tt.style.left=Math.max(4,tx)+"px";tt.style.top=ty+"px"});el.addEventListener("mouseleave",function(){tt.style.display="none"})});</script></body></html>
