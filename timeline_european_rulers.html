d&quot;: &quot;テューダー朝の開祖。ランカスター系の血統でヨーク家の姫エリザベスと結婚→薔薇戦争の両派を統合。星室庁裁判所で貴族を統制し王権を強化。財政の安定化に成功し、イングランドの中央集権国家の基盤を築いた。&quot;}"><rect x="323.0818965517241" y="55" width="159.8275862068965" height="22" rx="3" fill="rgba(180,100,100,0.2)" stroke="rgba(180,100,100,0.3)" stroke-width="0.5"/><text x="402.9956896551724" y="68.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">ヘンリ7世</text></g><g data-tip="{&quot;n&quot;: &quot;ヘンリ8世&quot;, &quot;e&quot;: &quot;1509-47&quot;, &quot;d&quot;: &quot;★超。キャサリン＝オブ＝アラゴンとの離婚をめぐり教皇と対立→首長法(1534)で英国国教会を創設しローマから離脱。6人の妻(離婚2・処刑2・病死1・生存1)。修道院解散(1536-39)で教会財産を没収→ジェントリに売却。トマス＝モアを処刑。教義はカトリックに近く、教皇権のみを否認。&quot;}"><rect x="482.90948275862064" y="55" width="253.06034482758622" height="22" rx="3" fill="rgba(180,100,100,0.2)" stroke="rgba(180,100,100,0.3)" stroke-width="0.5"/><text x="609.4396551724137" y="68.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">ヘンリ8世</text></g><g data-tip="{&quot;n&quot;: &quot;エドワード6世&quot;, &quot;e&quot;: &quot;1547-53&quot;, &quot;d&quot;: &quot;ヘンリ8世とジェーン＝シーモアの息子。9歳で即位し摂政(サマセット公→ノーサンバーランド公)が実権を握る。一般祈祷書(1549)でプロテスタント化を推進。15歳で結核により死去。後継問題でメアリとの対立が生じる。&quot;}"><rect x="735.9698275862069" y="55" width="39.956896551724185" height="22" rx="3" fill="rgba(180,100,100,0.2)" stroke="rgba(180,100,100,0.3)" stroke-width="0.5"/><text x="755.948275862069" y="68.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">エドワード6世</text></g><g data-tip="{&quot;n&quot;: &quot;メアリ1世&quot;, &quot;e&quot;: &quot;1553-58&quot;, &quot;d&quot;: &quot;ヘンリ8世とキャサリンの娘。カトリックを復活しプロテスタント約300人を処刑→「血のメアリ(ブラッディ・メアリ)」。スペインのフェリペ2世と結婚し英西同盟→フランスとの戦争でカレーを喪失。子なしで死去→異母妹エリザベスが即位。&quot;}"><rect x="775.926724137931" y="55" width="33.297413793103374" height="22" rx="3" fill="rgba(180,100,100,0.2)" stroke="rgba(180,100,100,0.3)" stroke-width="0.5"/><text x="792.5754310344828" y="68.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">メアリ1世</text></g><g data-tip="{&quot;n&quot;: &quot;エリザベス1世&quot;, &quot;e&quot;: &quot;1558-1603&quot;, &quot;d&quot;: &quot;★超。統一法(1559)で国教会を再確立。カトリックとピューリタンの中間路線(ヴィア＝メディア)。アルマダ海戦(1588)でスペイン無敵艦隊を撃破→イングランドの国際的威信が飛躍的に向上。東インド会社設立(1600)。シェイクスピア・フランシス＝ベーコンの黄金時代。「処女王(ヴァージン・クイーン)」として生涯未婚→テューダー朝断絶。&quot;}"><rect x="809.2241379310344" y="55" width="299.67672413793116" height="22" rx="3" fill="rgba(180,100,100,0.2)" stroke="rgba(180,100,100,0.3)" stroke-width="0.5"/><text x="959.0625" y="68.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">エリザベス1世</text></g><g data-tip="{&quot;n&quot;: &quot;ジェームズ1世&quot;, &quot;e&quot;: &quot;1603-25&quot;, &quot;d&quot;: &quot;スコットランド王ジェームズ6世がイングランド王を兼ねる(同君連合)。王権神授説(『自由な君主制の真の法』)を主張し議会と対立。欽定訳聖書(キング・ジェームズ版、1611)を刊行＝英語の標準化に貢献。ピューリタンの不満→一部がメイフラワー号で北米へ(1620)。&quot;}"><rect x="1108.9008620689656" y="55" width="146.50862068965512" height="22" rx="3" fill="rgba(140,120,80,0.2)" stroke="rgba(140,120,80,0.3)" stroke-width="0.5"/><text x="1182.155172413793" y="68.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">ジェームズ1世</text></g><g data-tip="{&quot;n&quot;: &quot;チャールズ1世&quot;, &quot;e&quot;: &quot;1625-49&quot;, &quot;d&quot;: &quot;★超。権利の請願(1628)を受け入れるも翌年議会を解散→11年間の議会なし統治(個人統治)。スコットランドの反乱→やむなく長期議会(1640)を召集。ピューリタン革命(内戦、1642-49)で議会派(クロムウェル率いる鉄騎隊)に敗北→裁判にかけられ処刑(1649)＝英国史上唯一の国王処刑。&quot;}"><rect x="1255.4094827586207" y="55" width="159.8275862068965" height="22" rx="3" fill="rgba(140,120,80,0.2)" stroke="rgba(140,120,80,0.3)" stroke-width="0.5"/><text x="1335.3232758620688" y="68.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">チャールズ1世</text></g><g data-tip="{&quot;n&quot;: &quot;共和政・護国卿&quot;, &quot;e&quot;: &quot;1649-60&quot;, &quot;d&quot;: &quot;共和政(コモンウェルス)を宣言するもクロムウェルが護国卿(ロード＝プロテクター)として実質独裁。航海法(1651)＝オランダの中継貿易を排除→英蘭戦争。アイルランドを武力征服(カトリック弾圧)。ピューリタン的道徳の強制(演劇禁止等)→国民の反発。クロムウェル死後(1658)→息子リチャードが後継するも失敗→王政復古(1660)。&quot;}"><rect x="1415.2370689655172" y="55" width="73.25431034482767" height="22" rx="3" fill="rgba(100,130,100,0.2)" stroke="rgba(100,130,100,0.3)" stroke-width="0.5"/><text x="1451.8642241379312" y="68.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">共和政/クロムウェル</text></g><g data-tip="{&quot;n&quot;: &quot;チャールズ2世&quot;, &quot;e&quot;: &quot;1660-85&quot;, &quot;d&quot;: &quot;王政復古(1660)。表面上は議会と協調するがカトリックに密かに傾斜。審査法(1673)＝公職にカトリック教徒を就けることを禁止。人身保護法(ハビアス＝コーパス、1679)＝不当な逮捕・拘禁を防止。この頃にトーリ(王権支持)とホイッグ(議会派)の二党対立が形成。&quot;}"><rect x="1488.4913793103449" y="55" width="166.4870689655172" height="22" rx="3" fill="rgba(140,120,80,0.2)" stroke="rgba(140,120,80,0.3)" stroke-width="0.5"/><text x="1571.7349137931035" y="68.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">チャールズ2世</text></g><g data-tip="{&quot;n&quot;: &quot;ジェームズ2世&quot;, &quot;e&quot;: &quot;1685-88&quot;, &quot;d&quot;: &quot;カトリック復活を企図し審査法の適用停止・カトリック将校の任用を強行→議会のトーリ・ホイッグ双方が反発。オランダのウィリアム(オレンジ公)とメアリ(ジェームズの娘)をイングランドに招請→ジェームズは戦わずフランスに亡命＝名誉革命(1688)。「血を流さない革命」。&quot;}"><rect x="1654.978448275862" y="55" width="19.97844827586232" height="22" rx="3" fill="rgba(140,120,80,0.2)" stroke="rgba(140,120,80,0.3)" stroke-width="0.5"/><text x="1664.9676724137933" y="68.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">ジェームズ2世</text></g><g data-tip="{&quot;n&quot;: &quot;ウィリアム3世＋メアリ2世&quot;, &quot;e&quot;: &quot;1689-1702&quot;, &quot;d&quot;: &quot;★超。名誉革命(1688)で即位。権利の章典(1689)＝議会の同意なき課税・常備軍の禁止・議会での言論の自由→議会主権と王権の制限＝立憲君主政の成立。宗教寛容法(1689)。アウクスブルク同盟戦争(1689-97)でフランスのルイ14世と対立。イングランド銀行設立(1694)。&quot;}"><rect x="1681.6163793103449" y="55" width="86.57327586206907" height="22" rx="3" fill="rgba(140,120,80,0.2)" stroke="rgba(140,120,80,0.3)" stroke-width="0.5"/><text x="1724.9030172413795" y="68.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">ウィリアム3世</text></g><g data-tip="{&quot;n&quot;: &quot;アン女王&quot;, &quot;e&quot;: &quot;1702-14&quot;, &quot;d&quot;: &quot;スペイン継承戦争(1701-14)に参戦。マールバラ公の軍事的勝利(ブレンハイムの戦い1704)。合同法(1707)＝イングランドとスコットランドの合同→グレートブリテン王国成立。ユトレヒト条約(1713)でジブラルタル等を獲得。ステュアート朝最後の君主→ハノーヴァー朝へ。&quot;}"><rect x="1768.189655172414" y="55" width="79.91379310344814" height="22" rx="3" fill="rgba(140,120,80,0.2)" stroke="rgba(140,120,80,0.3)" stroke-width="0.5"/><text x="1808.1465517241381" y="68.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">アン女王</text></g><g data-tip="{&quot;n&quot;: &quot;ジョージ1世&quot;, &quot;e&quot;: &quot;1714-27&quot;, &quot;d&quot;: &quot;ドイツのハノーファー選帝侯。アン女王の遠縁として即位。英語をほとんど話せず閣議に出席しない→第一大蔵卿ウォルポールが事実上の首相として統治→責任内閣制(議会に対して責任を負う内閣)の始まり。南海泡沫事件(1720)。&quot;}"><rect x="1848.103448275862" y="55" width="86.57327586206884" height="22" rx="3" fill="rgba(80,150,120,0.2)" stroke="rgba(80,150,120,0.3)" stroke-width="0.5"/><text x="1891.3900862068965" y="68.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">ジョージ1世</text></g><g data-tip="{&quot;n&quot;: &quot;ジョージ2世&quot;, &quot;e&quot;: &quot;1727-60&quot;, &quot;d&quot;: &quot;ウォルポール首相が1742年まで在任(英国史上最長の首相)。オーストリア継承戦争(1740-48)ではマリア＝テレジアを支援。七年戦争(1756-63)＝大ピットの戦時指導→カナダ・インドでフランスに勝利→第一次大英帝国の頂点。デッティンゲンの戦い(1743)で自ら戦場に立った最後の英国王。&quot;}"><rect x="1934.676724137931" y="55" width="219.76293103448302" height="22" rx="3" fill="rgba(80,150,120,0.2)" stroke="rgba(80,150,120,0.3)" stroke-width="0.5"/><text x="2044.5581896551726" y="68.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">ジョージ2世</text></g><g data-tip="{&quot;n&quot;: &quot;ジョージ3世&quot;, &quot;e&quot;: &quot;1760-1820&quot;, &quot;d&quot;: &quot;★超。在位60年(当時最長)。アメリカ独立戦争(1775-83)で13植民地を喪失→パリ条約(1783)。しかし同時期にインド支配を強化(インド統治法1784)。対仏戦争(1793-1815)で小ピット首相が指導。晩年はポルフィリン症(精神錯乱)→摂政時代(1811-20)に息子ジョージが代行。&quot;}"><rect x="2154.439655172414" y="55" width="399.5689655172414" height="22" rx="3" fill="rgba(80,150,120,0.2)" stroke="rgba(80,150,120,0.3)" stroke-width="0.5"/><text x="2354.2241379310344" y="68.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">ジョージ3世</text></g><g data-tip="{&quot;n&quot;: &quot;ジョージ4世&quot;, &quot;e&quot;: &quot;1820-30&quot;, &quot;d&quot;: &quot;摂政時代(1811-20)から実質統治。摂政時代のリージェンシー様式(建築・ファッション)。カトリック解放法(1829)＝カトリック教徒の公職就任を許可(アイルランドのオコンネルの運動の成果)。浪費家として国民に不人気。&quot;}"><rect x="2554.0086206896553" y="55" width="66.59482758620697" height="22" rx="3" fill="rgba(80,150,120,0.2)" stroke="rgba(80,150,120,0.3)" stroke-width="0.5"/><text x="2587.306034482759" y="68.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">ジョージ4世</text></g><g data-tip="{&quot;n&quot;: &quot;ウィリアム4世&quot;, &quot;e&quot;: &quot;1830-37&quot;, &quot;d&quot;: &quot;第一次選挙法改正(1832)＝腐敗選挙区(オールド＝サラム等人口のいない選挙区)の廃止→産業都市(マンチェスター・バーミンガム等)に議席配分→中産階級に参政権拡大。奴隷制廃止法(1833)＝大英帝国全域で奴隷制を廃止。工場法(1833)＝児童労働の制限。&quot;}"><rect x="2620.6034482758623" y="55" width="46.616379310344655" height="22" rx="3" fill="rgba(80,150,120,0.2)" stroke="rgba(80,150,120,0.3)" stroke-width="0.5"/><text x="2643.9116379310344" y="68.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">ウィリアム4世</text></g><g data-tip="{&quot;n&quot;: &quot;ヴィクトリア女王&quot;, &quot;e&quot;: &quot;1837-1901&quot;, &quot;d&quot;: &quot;★超。在位63年(1837-1901)。大英帝国の全盛期＝「太陽の沈まぬ帝国」。自由貿易主義(穀物法廃止1846・航海法廃止1849)。パーマストン(外交)→グラッドストン(自由党・自由主義改革)vsディズレーリ(保守党・帝国主義)の二大政党政治。第二次・第三次選挙法改正で参政権拡大。インド皇帝(1877)。ダーウィン『種の起源』(1859)。「ヴィクトリア朝」＝道徳的厳格さと繁栄の時代。&quot;}"><rect x="2667.219827586207" y="55" width="426.20689655172373" height="22" rx="3" fill="rgba(80,150,120,0.2)" stroke="rgba(80,150,120,0.3)" stroke-width="0.5"/><text x="2880.323275862069" y="68.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">ヴィクトリア</text></g><g data-tip="{&quot;n&quot;: &quot;エドワード7世→ジョージ5世&quot;, &quot;e&quot;: &quot;1901-&quot;, &quot;d&quot;: &quot;エドワード7世(1901-10)＝社交家として英仏協商(1904)の成立に貢献→三国協商(英仏露)の基盤。ジョージ5世(1910-36)＝WW1の時代。反ドイツ感情からサクス＝コバーグ＝ゴータ家をウィンザー家に改称(1917)。アイルランド自由国成立(1922)。&quot;}"><rect x="3093.4267241379307" y="55" width="86.5732758620693" height="22" rx="3" fill="rgba(80,150,120,0.2)" stroke="rgba(80,150,120,0.3)" stroke-width="0.5"/><text x="3136.7133620689656" y="68.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">エドワード7世/ジョージ5世</text></g><rect x="90" y="84" width="3090" height="28" fill="rgba(255,255,255,.01)" rx="2"/><text x="4" y="101.0" fill="var(--gold2)" font-size="7" font-family="Noto Serif JP" font-weight="700">フランス</text><g data-tip="{&quot;n&quot;: &quot;ルイ11世&quot;, &quot;e&quot;: &quot;1461-83&quot;, &quot;d&quot;: &quot;「蜘蛛王」の異名。陰謀と外交術で大貴族の反抗を抑え中央集権を推進。最大の敵シャルル突進公(ブルゴーニュ公)の死(1477)後にブルゴーニュ公国を吸収。フランスを百年戦争の荒廃から復興させ、近世フランスの中央集権国家の基盤を築いた。&quot;}"><rect x="163.2543103448276" y="87" width="146.5086206896552" height="22" rx="3" fill="rgba(100,100,180,0.2)" stroke="rgba(100,100,180,0.3)" stroke-width="0.5"/><text x="236.50862068965517" y="100.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">ルイ11世</text></g><g data-tip="{&quot;n&quot;: &quot;シャルル8世→ルイ12世&quot;, &quot;e&quot;: &quot;1483-1515&quot;, &quot;d&quot;: &quot;シャルル8世がナポリ王位を主張してイタリア侵攻(1494)＝イタリア戦争の開始→ルネサンス文化をフランスに持ち帰る。ルイ12世はミラノ公国を一時占領。いずれも恒久的領土獲得には失敗したが、フランスにルネサンスの芸術・思想を導入する契機となった。&quot;}"><rect x="309.7629310344828" y="87" width="213.10344827586198" height="22" rx="3" fill="rgba(100,100,180,0.2)" stroke="rgba(100,100,180,0.3)" stroke-width="0.5"/><text x="416.3146551724138" y="100.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">シャルル8世/ルイ12世</text></g><g data-tip="{&quot;n&quot;: &quot;フランソワ1世&quot;, &quot;e&quot;: &quot;1515-47&quot;, &quot;d&quot;: &quot;★超。ヴァロワ朝の黄金時代。イタリア戦争でハプスブルク家のカール5世と30年以上にわたり激しく対立(マリニャーノの勝利1515→パヴィアの敗北1525で捕虜に)。レオナルド＝ダ＝ヴィンチをフランスに招聘。コレージュ＝ド＝フランス設立(人文主義教育)。シャンボール城建設。フランス＝ルネサンスの最大の保護者。オスマンのスレイマン1世と同盟(キリスト教国の衝撃)。&quot;}"><rect x="522.8663793103448" y="87" width="213.1034482758621" height="22" rx="3" fill="rgba(100,100,180,0.2)" stroke="rgba(100,100,180,0.3)" stroke-width="0.5"/><text x="629.4181034482758" y="100.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">フランソワ1世</text></g><g data-tip="{&quot;n&quot;: &quot;アンリ2世&quot;, &quot;e&quot;: &quot;1547-59&quot;, &quot;d&quot;: &quot;フランソワ1世の息子。カール5世・フェリペ2世との戦争を継続。カトー＝カンブレジ条約(1559)でイタリア戦争が終結→フランスはイタリアへの領土的野心を断念。馬上試合で事故死(槍が目に刺さる)→ユグノー戦争の混乱の幕開けに。&quot;}"><rect x="735.9698275862069" y="87" width="79.91379310344837" height="22" rx="3" fill="rgba(100,100,180,0.2)" stroke="rgba(100,100,180,0.3)" stroke-width="0.5"/><text x="775.926724137931" y="100.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">アンリ2世</text></g><g data-tip="{&quot;n&quot;: &quot;ユグノー戦争期&quot;, &quot;e&quot;: &quot;1559-89&quot;, &quot;d&quot;: &quot;シャルル9世(1559-74)は母后カトリーヌ＝ド＝メディシスの摂政下。サン＝バルテルミの虐殺(1572)＝カトリック側がパリのユグノー指導者コリニー提督を含む数千人を殺害。アンリ3世(1574-89)はギーズ公(カトリック急進派)を暗殺するも自身もカトリック修道士に暗殺→ヴァロワ朝断絶。&quot;}"><rect x="815.8836206896552" y="87" width="199.78448275862058" height="22" rx="3" fill="rgba(100,100,180,0.2)" stroke="rgba(100,100,180,0.3)" stroke-width="0.5"/><text x="915.7758620689656" y="100.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">シャルル9世/アンリ3世</text></g><g data-tip="{&quot;n&quot;: &quot;アンリ4世&quot;, &quot;e&quot;: &quot;1589-1610&quot;, &quot;d&quot;: &quot;★超。ブルボン朝の開祖。元ユグノー(カルヴァン派)だが「パリはミサに値する」と語りカトリックに改宗して王位を確保。ナントの勅令(1598)＝ユグノーに信仰の自由と約200の安全都市を保障→約40年間のユグノー戦争を終結。「鶏鍋を毎日食べられるように」と民生安定を重視。宰相シュリーの財政改革。1610年に狂信的カトリック教徒ラヴァイヤックに暗殺。&quot;}"><rect x="1015.6681034482758" y="87" width="139.84913793103465" height="22" rx="3" fill="rgba(180,130,80,0.2)" stroke="rgba(180,130,80,0.3)" stroke-width="0.5"/><text x="1085.592672413793" y="100.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">アンリ4世</text></g><g data-tip="{&quot;n&quot;: &quot;ルイ13世&quot;, &quot;e&quot;: &quot;1610-43&quot;, &quot;d&quot;: &quot;幼少で即位。母后マリー＝ド＝メディシスの摂政→宰相リシュリュー枢機卿(1624-42)が実権を掌握。リシュリューの政策：ユグノーの政治的特権を剥奪(ラ＝ロシェル包囲1628、ただし信仰の自由は維持)。国内の大貴族を弾圧。三十年戦争にプロテスタント側で介入(カトリック国でありながら国益＝ハプスブルク弱体化を優先)。アカデミー＝フランセーズ創設(1635)。&quot;}"><rect x="1155.5172413793105" y="87" width="219.76293103448256" height="22" rx="3" fill="rgba(180,130,80,0.2)" stroke="rgba(180,130,80,0.3)" stroke-width="0.5"/><text x="1265.3987068965516" y="100.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">ルイ13世</text></g><g data-tip="{&quot;n&quot;: &quot;ルイ14世(太陽王)&quot;, &quot;e&quot;: &quot;1643-1715&quot;, &quot;d&quot;: &quot;★超。在位72年＝欧州史上最長。5歳で即位→マザラン枢機卿が摂政(フロンドの乱1648-53を鎮圧)。親政開始(1661)後「朕は国家なり」。ヴェルサイユ宮殿建設(1682移転)→貴族を宮廷に集めて統制。コルベールの重商主義(東インド会社・王立マニュファクチュア)。ナントの勅令を廃止(1685)→ユグノー約20万人が国外流出＝フランスの経済的損失。ファルツ継承戦争・スペイン継承戦争で国力を消耗。絶対王政の頂点にして衰退の始まり。&quot;}"><rect x="1375.280172413793" y="87" width="479.48275862068954" height="22" rx="3" fill="rgba(180,130,80,0.2)" stroke="rgba(180,130,80,0.3)" stroke-width="0.5"/><text x="1615.0215517241377" y="100.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">ルイ14世</text></g><g data-tip="{&quot;n&quot;: &quot;ルイ15世&quot;, &quot;e&quot;: &quot;1715-74&quot;, &quot;d&quot;: &quot;5歳で即位(ルイ14世の曾孫)。オルレアン公の摂政→フルリー枢機卿。ポーランド継承戦争・オーストリア継承戦争に参加。七年戦争(1756-63)でカナダ(パリ条約でイギリスに割譲)・インドの大半を喪失→第一次植民地帝国の崩壊。ポンパドゥール夫人・デュバリー夫人。王権の威信低下。「我が亡き後に洪水よ来たれ(Après moi, le déluge)」。&quot;}"><rect x="1854.7629310344826" y="87" width="392.9094827586207" height="22" rx="3" fill="rgba(180,130,80,0.2)" stroke="rgba(180,130,80,0.3)" stroke-width="0.5"/><text x="2051.217672413793" y="100.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">ルイ15世</text></g><g data-tip="{&quot;n&quot;: &quot;ルイ16世&quot;, &quot;e&quot;: &quot;1774-92&quot;, &quot;d&quot;: &quot;★超。アメリカ独立戦争を支援(1778参戦)→財政危機が深刻化。テュルゴー・ネッケルの財政改革が特権身分の抵抗で頓挫→三部会召集(1789)＝175年ぶり→フランス革命の勃発。バスティーユ襲撃(7.14)。ヴァレンヌ逃亡事件(1791)＝国王がオーストリアへの逃亡を図り途中で逮捕→国民の信頼を完全に喪失。王権停止(1792)→共和政宣言→裁判→ギロチンで処刑(1793.1.21)。&quot;}"><rect x="2247.6724137931033" y="87" width="119.87068965517255" height="22" rx="3" fill="rgba(180,130,80,0.2)" stroke="rgba(180,130,80,0.3)" stroke-width="0.5"/><text x="2307.6077586206893" y="100.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">ルイ16世</text></g><g data-tip="{&quot;n&quot;: &quot;第一共和政&quot;, &quot;e&quot;: &quot;1792-99&quot;, &quot;d&quot;: &quot;国民公会(1792-95)：ジロンド派(穏健共和派)→ジャコバン派(急進派＝ロベスピエール)の恐怖政治(1793-94)＝革命裁判所・ギロチン。反革命・投機の取り締まり・最高価格令。テルミドールのクーデタ(1794.7)でロベスピエール処刑→総裁政府(1795-99)→政治的不安定→ナポレオンのブリュメールのクーデタ(1799)。&quot;}"><rect x="2367.543103448276" y="87" width="46.61637931034511" height="22" rx="3" fill="rgba(180,80,80,0.2)" stroke="rgba(180,80,80,0.3)" stroke-width="0.5"/><text x="2390.8512931034484" y="100.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">第一共和政</text></g><g data-tip="{&quot;n&quot;: &quot;ナポレオン1世&quot;, &quot;e&quot;: &quot;1799-1814/15&quot;, &quot;d&quot;: &quot;★超。コルシカ島出身。ブリュメール18日のクーデタ(1799)→統領政府→第一統領→皇帝(1804、教皇ピウス7世が戴冠式に出席するも自ら冠を被る)。ナポレオン法典(1804)＝近代市民法の基礎。アウステルリッツ三帝会戦(1805)で露墺に大勝。大陸封鎖令(1806)＝英の経済封鎖→ポルトガル・スペインが従わず半島戦争。ロシア遠征(1812)で60万の大軍が壊滅→ライプツィヒの戦い(1813)→退位→エルバ島→百日天下→ワーテルロー(1815)→セントヘレナ島で病死(1821)。&quot;}"><rect x="2414.159482758621" y="87" width="99.89224137930978" height="22" rx="3" fill="rgba(180,80,80,0.2)" stroke="rgba(180,80,80,0.3)" stroke-width="0.5"/><text x="2464.105603448276" y="100.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">ナポレオン</text></g><g data-tip="{&quot;n&quot;: &quot;復古王政&quot;, &quot;e&quot;: &quot;1814-30&quot;, &quot;d&quot;: &quot;ウィーン会議(1814-15)でブルボン朝復活。ルイ18世(1814-24)は憲章(シャルト)を認め立憲君主制を受容→比較的穏健。シャルル10世(1824-30)は反動化→出版の自由制限・議会解散→七月革命(1830)で退位→ブルボン本家の王統が終焉。&quot;}"><rect x="2514.0517241379307" y="87" width="106.55172413793161" height="22" rx="3" fill="rgba(80,150,130,0.2)" stroke="rgba(80,150,130,0.3)" stroke-width="0.5"/><text x="2567.3275862068967" y="100.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">復古王政</text></g><g data-tip="{&quot;n&quot;: &quot;七月王政&quot;, &quot;e&quot;: &quot;1830-48&quot;, &quot;d&quot;: &quot;ルイ＝フィリップはオルレアン家出身→「市民の王」として即位。三色旗の復活。制限選挙(財産資格)→銀行家・産業資本家(ブルジョワジー)の「金融貴族」が支配。ギゾー首相「金持ちになりたまえ」。労働者・農民は選挙権なし→不満蓄積→二月革命(1848)でルイ＝フィリップ退位→第二共和政。&quot;}"><rect x="2620.6034482758623" y="87" width="119.8706896551721" height="22" rx="3" fill="rgba(80,150,130,0.2)" stroke="rgba(80,150,130,0.3)" stroke-width="0.5"/><text x="2680.5387931034484" y="100.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">ルイ＝フィリップ</text></g><g data-tip="{&quot;n&quot;: &quot;第二共和政&quot;, &quot;e&quot;: &quot;1848-52&quot;, &quot;d&quot;: &quot;男子普通選挙で大統領選→ルイ＝ナポレオン(ナポレオン1世の甥)が「ナポレオン」の名前の力で当選。社会主義的な国立作業場は閉鎖→六月蜂起(労働者の反乱)を弾圧。1851年にクーデタ→翌年国民投票で皇帝即位＝第二帝政。わずか4年間の共和政。&quot;}"><rect x="2740.4741379310344" y="87" width="26.63793103448279" height="22" rx="3" fill="rgba(80,150,130,0.2)" stroke="rgba(80,150,130,0.3)" stroke-width="0.5"/><text x="2753.793103448276" y="100.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">第二共和政</text></g><g data-tip="{&quot;n&quot;: &quot;ナポレオン3世&quot;, &quot;e&quot;: &quot;1852-70&quot;, &quot;d&quot;: &quot;オスマン男爵によるパリ大改造(大通り・上下水道)＝近代都市計画の模範。クリミア戦争(1853-56)で英と組みロシアに勝利→パリ条約。イタリア統一を支援(サルデーニャと同盟→ソルフェリーノの戦い1859)→ニース・サヴォワを獲得。メキシコ出兵(1861-67)は完全な失敗。普仏戦争(1870)でセダンの戦い→捕虜→退位→第三共和政へ。&quot;}"><rect x="2767.112068965517" y="87" width="119.87068965517255" height="22" rx="3" fill="rgba(180,80,80,0.2)" stroke="rgba(180,80,80,0.3)" stroke-width="0.5"/><text x="2827.0474137931033" y="100.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">ナポレオン3世</text></g><g data-tip="{&quot;n&quot;: &quot;第三共和政&quot;, &quot;e&quot;: &quot;1870-1940&quot;, &quot;d&quot;: &quot;パリ＝コミューン(1871)＝世界初の労働者自治政府(72日間)→ヴェルサイユ政府が鎮圧(「血の一週間」)。ドレフュス事件(1894-1906)＝ユダヤ系将校の冤罪→共和派vs軍部・カトリック→ゾラ『私は弾劾する』→共和派の勝利→政教分離法(1905)。アフリカ植民地拡大(ファショダ事件1898で英と対立→妥協)。英仏協商(1904)→三国協商(英仏露)→WW1へ。&quot;}"><rect x="2886.9827586206898" y="87" width="293.01724137931024" height="22" rx="3" fill="rgba(80,150,130,0.2)" stroke="rgba(80,150,130,0.3)" stroke-width="0.5"/><text x="3033.491379310345" y="100.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">第三共和政</text></g><rect x="90" y="116" width="3090" height="28" fill="rgba(255,255,255,.01)" rx="2"/><text x="4" y="133.0" fill="var(--gold2)" font-size="7" font-family="Noto Serif JP" font-weight="700">スペイン</text><g data-tip="{&quot;n&quot;: &quot;カトリック両王&quot;, &quot;e&quot;: &quot;1474-1504&quot;, &quot;d&quot;: &quot;★超。イサベル1世(カスティリャ、1474-1504)とフェルナンド2世(アラゴン、1479-1516)の結婚(1469)→スペイン統一の基盤。グラナダ陥落(1492.1)＝約800年のレコンキスタ完了。同年コロンブスの第1回航海を支援(10月)→新大陸「発見」。異端審問(トルケマーダ)。ユダヤ人追放令(1492)→スペインから約16万人が国外退去。&quot;}"><rect x="249.82758620689654" y="119" width="199.78448275862067" height="22" rx="3" fill="rgba(180,160,80,0.2)" stroke="rgba(180,160,80,0.3)" stroke-width="0.5"/><text x="349.71982758620686" y="132.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">イサベル＋フェルナンド</text></g><g data-tip="{&quot;n&quot;: &quot;カルロス1世&quot;, &quot;e&quot;: &quot;1516-56&quot;, &quot;d&quot;: &quot;★超。スペイン王カルロス1世(1516-)＝神聖ローマ皇帝カール5世(1519-)を兼ねる。ハプスブルク家の婚姻政策の結果、スペイン・ネーデルラント・南イタリア・オーストリア・新大陸を統治＝「太陽の沈まぬ帝国」。ヴォルムス帝国議会(1521)でルターと対峙。フランソワ1世とイタリア戦争。アウクスブルクの和議(1555)で宗教問題に疲れ退位→スペインはフェリペ2世に、帝位はフェルディナント1世に。&quot;}"><rect x="529.5258620689656" y="119" width="266.37931034482756" height="22" rx="3" fill="rgba(180,140,60,0.2)" stroke="rgba(180,140,60,0.3)" stroke-width="0.5"/><text x="662.7155172413793" y="132.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">カルロス1世(カール5世)</text></g><g data-tip="{&quot;n&quot;: &quot;フェリペ2世&quot;, &quot;e&quot;: &quot;1556-98&quot;, &quot;d&quot;: &quot;★超。スペインの全盛期。カトリックの擁護者。レパントの海戦(1571)でオスマン海軍に勝利(ドン＝フアン指揮)。ポルトガルを併合(1580)→イベリア半島統一。エル＝エスコリアル宮殿建設(修道院＋宮殿＋墓廟)。しかしアルマダ海戦(1588)で英エリザベスに敗北→制海権喪失。オランダ独立戦争(八十年戦争1568-1648)が泥沼化。新大陸の銀の流入→価格革命。&quot;}"><rect x="795.9051724137931" y="119" width="279.6982758620692" height="22" rx="3" fill="rgba(180,140,60,0.2)" stroke="rgba(180,140,60,0.3)" stroke-width="0.5"/><text x="935.7543103448277" y="132.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">フェリペ2世</text></g><g data-tip="{&quot;n&quot;: &quot;スペイン＝ハプスブルク後期&quot;, &quot;e&quot;: &quot;1598-1665&quot;, &quot;d&quot;: &quot;フェリペ3世(1598-1621)：モリスコ(改宗ムスリム)追放(1609)→農業労働力喪失で経済的打撃。オランダとの12年休戦(1609)。フェリペ4世(1621-65)：宰相オリバーレスの改革失敗。三十年戦争に参戦→ロクロワの戦い(1643)で仏に敗北。ポルトガル独立(1640)。ウェストファリア条約(1648)でオランダ独立を承認。宮廷画家ベラスケス(『ラス＝メニーナス』)の時代。&quot;}"><rect x="1075.6034482758623" y="119" width="446.18534482758605" height="22" rx="3" fill="rgba(180,140,60,0.2)" stroke="rgba(180,140,60,0.3)" stroke-width="0.5"/><text x="1298.6961206896553" y="132.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">フェリペ3世/4世</text></g><g data-tip="{&quot;n&quot;: &quot;カルロス2世&quot;, &quot;e&quot;: &quot;1665-1700&quot;, &quot;d&quot;: &quot;ハプスブルク家の近親婚の結果、重度の身体・精神障害。「呪われた王(El Hechizado)」。統治能力を欠き宮廷の派閥争い。子孫を残せず→遺言でフランスのブルボン家(ルイ14世の孫フィリップ)を後継に指名→スペイン継承戦争(1701-14)の原因。スペイン＝ハプスブルク朝の断絶。&quot;}"><rect x="1521.7887931034484" y="119" width="233.08189655172418" height="22" rx="3" fill="rgba(180,140,60,0.2)" stroke="rgba(180,140,60,0.3)" stroke-width="0.5"/><text x="1638.3297413793105" y="132.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">カルロス2世</text></g><g data-tip="{&quot;n&quot;: &quot;フェリペ5世&quot;, &quot;e&quot;: &quot;1700-46&quot;, &quot;d&quot;: &quot;ルイ14世の孫。スペイン継承戦争(1701-14)を経てユトレヒト条約(1713)＝スペインのブルボン朝が確定(ただし仏西の王位合同は永久に禁止)。ジブラルタルとメノルカを英に割譲。ネーデルラント・ミラノ・ナポリ・サルデーニャをオーストリアに。スペインは二流国に転落。&quot;}"><rect x="1754.8706896551726" y="119" width="306.3362068965521" height="22" rx="3" fill="rgba(160,80,80,0.2)" stroke="rgba(160,80,80,0.3)" stroke-width="0.5"/><text x="1908.0387931034486" y="132.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">フェリペ5世</text></g><g data-tip="{&quot;n&quot;: &quot;カルロス3世&quot;, &quot;e&quot;: &quot;1759-88&quot;, &quot;d&quot;: &quot;啓蒙専制君主。イエズス会追放(1767)。マドリード市街の整備(街路灯・下水道)。王立工場の設立。アメリカ独立戦争(1779-83)でフランスとともに英に参戦→フロリダを回復。スペインのブルボン朝で最も有能な王とされる。&quot;}"><rect x="2147.780172413793" y="119" width="193.125" height="22" rx="3" fill="rgba(160,80,80,0.2)" stroke="rgba(160,80,80,0.3)" stroke-width="0.5"/><text x="2244.342672413793" y="132.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">カルロス3世</text></g><g data-tip="{&quot;n&quot;: &quot;カルロス4世&quot;, &quot;e&quot;: &quot;1788-1808&quot;, &quot;d&quot;: &quot;フランス革命に対し対仏大同盟に参加→敗北しフランスと同盟。宰相ゴドイの失政。ナポレオンのスペイン介入→バイヨンヌの退位(1808)＝カルロス4世と息子フェルナンド7世がともに退位→ジョゼフ＝ボナパルト(ナポレオンの兄)がスペイン王に→スペイン独立戦争(半島戦争1808-14)＝ゲリラ戦の語源。&quot;}"><rect x="2340.905172413793" y="119" width="133.18965517241395" height="22" rx="3" fill="rgba(160,80,80,0.2)" stroke="rgba(160,80,80,0.3)" stroke-width="0.5"/><text x="2407.5" y="132.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">カルロス4世</text></g><g data-tip="{&quot;n&quot;: &quot;復帰〜混乱&quot;, &quot;e&quot;: &quot;1814-68&quot;, &quot;d&quot;: &quot;フェルナンド7世(1814-33)：ナポレオン退位後に復帰。自由主義的1812年憲法を撤回→絶対王政復帰。ラテンアメリカ植民地の独立(1820年代)を阻止できず→スペイン植民地帝国の崩壊。イサベル2世(1833-68)：カルリスタ戦争(継承権争い)。政治的混乱→1868年の九月革命で退位→空位→アマデオ1世→第一共和政(1873-74)→失敗。&quot;}"><rect x="2514.0517241379307" y="119" width="359.61206896551766" height="22" rx="3" fill="rgba(160,80,80,0.2)" stroke="rgba(160,80,80,0.3)" stroke-width="0.5"/><text x="2693.8577586206893" y="132.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">フェルナンド7世→イサベル2世</text></g><g data-tip="{&quot;n&quot;: &quot;王政復古&quot;, &quot;e&quot;: &quot;1874-1931&quot;, &quot;d&quot;: &quot;アルフォンソ12世(1874-85)で王政復古。カノバスとサガスタの保守・自由両党による「ターノ(交代制)」政治。米西戦争(1898)でキューバ・フィリピン・プエルトリコ・グアムを喪失→「98年の世代」(ウナムーノ等)の文学・思想＝スペインの没落への省察。アルフォンソ13世(1886-1931)の時代に政治的不安定が続く。&quot;}"><rect x="2913.6206896551726" y="119" width="266.37931034482745" height="22" rx="3" fill="rgba(160,80,80,0.2)" stroke="rgba(160,80,80,0.3)" stroke-width="0.5"/><text x="3046.810344827586" y="132.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">アルフォンソ12世/13世</text></g><rect x="90" y="148" width="3090" height="28" fill="rgba(255,255,255,.01)" rx="2"/><text x="4" y="165.0" fill="var(--gold2)" font-size="7" font-family="Noto Serif JP" font-weight="700">ハプスブルク/オーストリア</text><g data-tip="{&quot;n&quot;: &quot;初期ハプスブルク&quot;, &quot;e&quot;: &quot;1452-1519&quot;, &quot;d&quot;: &quot;フリードリヒ3世(1452-93)：「AEIOU(Austriae Est Imperare Orbi Universo＝全世界を支配するはオーストリアの定め)」。マクシミリアン1世(1493-1519)：「中世最後の騎士」。婚姻政策の天才＝ブルゴーニュ(ネーデルラント)・スペイン・ハンガリー・ボヘミアをハプスブルク家に。「戦争は他国に任せよ、幸いなるオーストリアよ、汝は結婚せよ(Bella gerant alii, tu felix Austria nube)」。&quot;}"><rect x="103.31896551724138" y="151" width="446.1853448275863" height="22" rx="3" fill="rgba(160,140,80,0.2)" stroke="rgba(160,140,80,0.3)" stroke-width="0.5"/><text x="326.41163793103453" y="164.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">フリードリヒ3世/マクシミリアン1世</text></g><g data-tip="{&quot;n&quot;: &quot;カール5世&quot;, &quot;e&quot;: &quot;1519-56&quot;, &quot;d&quot;: &quot;★超。スペイン王(カルロス1世)＋神聖ローマ皇帝を兼任。ハプスブルク帝国の頂点。ヴォルムス帝国議会(1521)でルターに撤回を迫る→拒否→破門。フランソワ1世とイタリア戦争(パヴィアの戦い1525)。オスマンのウィーン包囲(1529)を撃退。宗教問題に疲れアウクスブルクの和議(1555)後に退位→スペインはフェリペ2世、帝位はフェルディナント1世に分割。修道院に隠棲し1558年死去。&quot;}"><rect x="549.5043103448277" y="151" width="246.40086206896547" height="22" rx="3" fill="rgba(160,140,80,0.2)" stroke="rgba(160,140,80,0.3)" stroke-width="0.5"/><text x="672.7047413793105" y="164.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">カール5世</text></g><g data-tip="{&quot;n&quot;: &quot;16C後半のハプスブルク&quot;, &quot;e&quot;: &quot;1556-1612&quot;, &quot;d&quot;: &quot;フェルディナント1世(1556-64)：オーストリア・ハプスブルク家の始祖。ハンガリー・ボヘミアを統治しオスマンと対峙。マクシミリアン2世(1564-76)：宗教的に寛容。ルドルフ2世(1576-1612)：プラハに宮廷を移し芸術・科学を保護(ティコ＝ブラーエ・ケプラー)。錬金術に傾倒。統治力は弱く帝国は宗教対立で不安定化→三十年戦争の遠因。&quot;}"><rect x="795.9051724137931" y="151" width="372.9310344827585" height="22" rx="3" fill="rgba(160,140,80,0.2)" stroke="rgba(160,140,80,0.3)" stroke-width="0.5"/><text x="982.3706896551723" y="164.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">フェルディナント1世〜ルドルフ2世</text></g><g data-tip="{&quot;n&quot;: &quot;三十年戦争期&quot;, &quot;e&quot;: &quot;1619-48&quot;, &quot;d&quot;: &quot;フェルディナント2世(1619-37)＝三十年戦争の中心人物。厳格なカトリックで反宗教改革を推進。プラハ窓外投擲事件(1618)→ボヘミア段階→白山の戦い(1620)でプロテスタントのボヘミア反乱を鎮圧。ヴァレンシュタインを傭兵隊長に任用→暗殺。フェルディナント3世(1637-57)の時代にウェストファリア条約(1648)＝帝国の分権化が確定→神聖ローマ帝国は「名ばかりの帝国」に。&quot;}"><rect x="1215.4525862068965" y="151" width="193.125" height="22" rx="3" fill="rgba(160,140,80,0.2)" stroke="rgba(160,140,80,0.3)" stroke-width="0.5"/><text x="1312.0150862068965" y="164.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">フェルディナント2世/3世</text></g><g data-tip="{&quot;n&quot;: &quot;レオポルト1世&quot;, &quot;e&quot;: &quot;1658-1705&quot;, &quot;d&quot;: &quot;第二次ウィーン包囲(1683)＝オスマン軍がウィーンを包囲→ポーランド王ヤン3世ソビエスキの援軍で撃退→カルロヴィッツ条約(1699)でハンガリー・トランシルヴァニアをオスマンから奪回＝ハプスブルク帝国の東方への大拡大。スペイン継承戦争(1701-14)ではフランスのブルボン家と対立。バロック文化のウィーン。&quot;}"><rect x="1475.1724137931035" y="151" width="312.9956896551721" height="22" rx="3" fill="rgba(160,140,80,0.2)" stroke="rgba(160,140,80,0.3)" stroke-width="0.5"/><text x="1631.6702586206895" y="164.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">レオポルト1世</text></g><g data-tip="{&quot;n&quot;: &quot;マリア＝テレジア&quot;, &quot;e&quot;: &quot;1740-80&quot;, &quot;d&quot;: &quot;★超。カール6世の娘。プラグマティッシェ・ザンクツィオン(国事詔書)で女子の相続を認めさせるも、即位するとプロイセンのフリードリヒ2世がシレジアに侵攻→オーストリア継承戦争(1740-48)＝シレジア喪失。外交革命(1756)＝300年来の敵フランスと同盟(仏墺同盟)→七年戦争(1756-63)でもシレジア奪回ならず。啓蒙的改革(教育制度・農民保護)。16人の子を出産(末娘がマリー＝アントワネット)。シェーンブルン宮殿拡張。&quot;}"><rect x="2021.25" y="151" width="266.37931034482745" height="22" rx="3" fill="rgba(160,140,80,0.2)" stroke="rgba(160,140,80,0.3)" stroke-width="0.5"/><text x="2154.439655172414" y="164.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">マリア＝テレジア</text></g><g data-tip="{&quot;n&quot;: &quot;ヨーゼフ2世&quot;, &quot;e&quot;: &quot;1780-90&quot;, &quot;d&quot;: &quot;啓蒙専制君主の典型。宗教寛容令(1781)＝プロテスタント・ギリシア正教に信仰の自由。農奴制の緩和(ロボット特許状)。700以上の修道院を閉鎖。死刑の原則廃止。改革が急進的すぎて貴族・教会・地方の反発を招く→「多すぎることをし、善意が多すぎた」。死後多くの改革が撤回される。「人民の中の哲学者」を自称。&quot;}"><rect x="2287.6293103448274" y="151" width="66.59482758620697" height="22" rx="3" fill="rgba(160,140,80,0.2)" stroke="rgba(160,140,80,0.3)" stroke-width="0.5"/><text x="2320.926724137931" y="164.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">ヨーゼフ2世</text></g><g data-tip="{&quot;n&quot;: &quot;フランツ&quot;, &quot;e&quot;: &quot;1792-1835&quot;, &quot;d&quot;: &quot;最後の神聖ローマ皇帝フランツ2世(1792-1806)。ナポレオンのアウステルリッツ(1805)敗北後、ライン同盟結成に対抗して神聖ローマ帝国を解体(1806)→自らオーストリア皇帝フランツ1世に(1804より)。ナポレオン戦争を通じて4度対仏大同盟に参加→最終的にナポレオン敗北。ウィーン会議(1814-15)＝宰相メッテルニヒが主導→正統主義・勢力均衡→「会議は踊る、されど進まず」。ウィーン体制下の反動政治。&quot;}"><rect x="2367.543103448276" y="151" width="286.35775862068976" height="22" rx="3" fill="rgba(160,140,80,0.2)" stroke="rgba(160,140,80,0.3)" stroke-width="0.5"/><text x="2510.7219827586205" y="164.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">フランツ2世/1世</text></g><g data-tip="{&quot;n&quot;: &quot;フランツ＝ヨーゼフ1世&quot;, &quot;e&quot;: &quot;1848-1916&quot;, &quot;d&quot;: &quot;★超。在位68年(1848-1916)＝欧州史上最長級。三月革命(1848)の混乱の中で18歳で即位。ハンガリーの反乱をロシアの援助で鎮圧。1859年イタリア統一戦争でサルデーニャ・フランスに敗北→ロンバルディアを喪失。普墺戦争(1866)でプロイセンに敗北→ドイツ統一から排除。アウスグライヒ(1867)＝オーストリア＝ハンガリー二重帝国の成立(ハンガリーに自治を認める妥協)。ボスニア併合(1908)→汎スラヴ主義との対立→サラエヴォ事件(1914)→WW1。皇后エリーザベト暗殺(1898)・皇太子ルドルフ自殺(1889)→個人的悲劇の連続。&quot;}"><rect x="2740.4741379310344" y="151" width="452.84482758620743" height="22" rx="3" fill="rgba(160,140,80,0.2)" stroke="rgba(160,140,80,0.3)" stroke-width="0.5"/><text x="2966.896551724138" y="164.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">フランツ＝ヨーゼフ1世</text></g><rect x="90" y="180" width="3090" height="28" fill="rgba(255,255,255,.01)" rx="2"/><text x="4" y="197.0" fill="var(--gold2)" font-size="7" font-family="Noto Serif JP" font-weight="700">プロイセン/ドイツ</text><g data-tip="{&quot;n&quot;: &quot;大選帝侯&quot;, &quot;e&quot;: &quot;1640-88&quot;, &quot;d&quot;: &quot;フリードリヒ＝ヴィルヘルム(在位1640-88)。三十年戦争で荒廃したブランデンブルクの再建。常備軍を創設(軍事国家プロイセンの原型)。ユグノー(フランスのカルヴァン派)を受け入れて経済発展を図る(ポツダム勅令1685)。西プロイセンの獲得。プロイセンの大国化の基盤を築いた。&quot;}"><rect x="1355.3017241379312" y="183" width="319.65517241379325" height="22" rx="3" fill="rgba(120,130,150,0.2)" stroke="rgba(120,130,150,0.3)" stroke-width="0.5"/><text x="1515.129310344828" y="196.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">大選帝侯</text></g><g data-tip="{&quot;n&quot;: &quot;フリードリヒ1世&quot;, &quot;e&quot;: &quot;1701-13&quot;, &quot;d&quot;: &quot;初代プロイセン王(1701)。スペイン継承戦争で神聖ローマ皇帝側に味方する見返りとして王号を獲得(ケーニヒスベルクで戴冠)。文化・芸術の保護(ベルリンの科学アカデミー設立)。しかし財政を圧迫→息子の「兵隊王」の質素路線の伏線に。&quot;}"><rect x="1761.530172413793" y="183" width="79.91379310344837" height="22" rx="3" fill="rgba(120,130,150,0.2)" stroke="rgba(120,130,150,0.3)" stroke-width="0.5"/><text x="1801.4870689655172" y="196.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">フリードリヒ1世</text></g><g data-tip="{&quot;n&quot;: &quot;フリードリヒ＝ヴィルヘルム1世&quot;, &quot;e&quot;: &quot;1713-40&quot;, &quot;d&quot;: &quot;「兵隊王(Soldatenkönig)」。極端な質素倹約と軍備拡大→プロイセンの人口は欧州13位だが軍の規模は4位に。「長身連隊(巨人擲弾兵)」の逸話。官僚制の整備＝能率的な行政機構(「軍隊のような国家」)。息子フリードリヒ(後の大王)とは対立→フルート演奏を禁止し友人を処刑。&quot;}"><rect x="1841.4439655172414" y="183" width="179.8060344827586" height="22" rx="3" fill="rgba(120,130,150,0.2)" stroke="rgba(120,130,150,0.3)" stroke-width="0.5"/><text x="1931.3469827586207" y="196.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">兵隊王</text></g><g data-tip="{&quot;n&quot;: &quot;フリードリヒ2世(大王)&quot;, &quot;e&quot;: &quot;1740-86&quot;, &quot;d&quot;: &quot;★超。啓蒙専制君主の代表格。マリア＝テレジアの即位に乗じてシレジアに侵攻→オーストリア継承戦争(1740-48)＝シレジア獲得。七年戦争(1756-63)＝英と同盟し仏墺露の包囲に耐える→プロイセンを欧州の列強に押し上げた。「国王は国家第一の下僕」→啓蒙思想の実践(宗教寛容・拷問廃止・農業改革)。ヴォルテールとの交流(サンスーシ宮殿)。ポーランド第一次分割(1772)に参加。&quot;}"><rect x="2021.25" y="183" width="306.33620689655163" height="22" rx="3" fill="rgba(120,130,150,0.2)" stroke="rgba(120,130,150,0.3)" stroke-width="0.5"/><text x="2174.418103448276" y="196.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">フリードリヒ大王</text></g><g data-tip="{&quot;n&quot;: &quot;フリードリヒ＝ヴィルヘルム2世→3世&quot;, &quot;e&quot;: &quot;1786-1840&quot;, &quot;d&quot;: &quot;フリードリヒ＝ヴィルヘルム2世(1786-97)：フランス革命に対し対仏同盟に参加。ポーランド第二次(1793)・第三次分割(1795)。フリードリヒ＝ヴィルヘルム3世(1797-1840)：イエナ・アウエルシュタットの戦い(1806)でナポレオンに大敗→ティルジットの屈辱的講和。シュタイン・ハルデンベルクの改革(農奴解放・都市自治・軍制改革・教育改革＝ベルリン大学設立1810)。解放戦争(1813-14)でナポレオンに勝利。ウィーン会議でラインラントを獲得。&quot;}"><rect x="2327.5862068965516" y="183" width="359.61206896551766" height="22" rx="3" fill="rgba(120,130,150,0.2)" stroke="rgba(120,130,150,0.3)" stroke-width="0.5"/><text x="2507.3922413793107" y="196.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">F.W.2世/3世</text></g><g data-tip="{&quot;n&quot;: &quot;フリードリヒ＝ヴィルヘルム4世&quot;, &quot;e&quot;: &quot;1840-61&quot;, &quot;d&quot;: &quot;三月革命(1848)でベルリンにバリケード→憲法制定を約束。フランクフルト国民議会が小ドイツ主義(オーストリアを除く統一)で統一ドイツの帝冠を提供→「ドブの中から拾い上げた王冠(革命に由来する王冠)」として拒否＝「上からの統一」のみ受け入れる姿勢。欽定憲法(1850)を発布。精神疾患で弟ヴィルヘルムが摂政(1858)。&quot;}"><rect x="2687.1982758620693" y="183" width="139.84913793103397" height="22" rx="3" fill="rgba(120,130,150,0.2)" stroke="rgba(120,130,150,0.3)" stroke-width="0.5"/><text x="2757.122844827586" y="196.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">F.W.4世</text></g><g data-tip="{&quot;n&quot;: &quot;ヴィルヘルム1世&quot;, &quot;e&quot;: &quot;1861-88&quot;, &quot;d&quot;: &quot;★超。ビスマルクを首相に任命(1862)。「鉄血演説」＝「現下の大問題は演説や多数決ではなく鉄と血によって解決される」→軍備拡張路線。デンマーク戦争(1864)→普墺戦争(1866)＝ケーニヒグレーツの戦いでオーストリアに大勝→北ドイツ連邦。普仏戦争(1870-71)＝セダンでナポレオン3世を捕虜→ヴェルサイユ宮殿鏡の間でドイツ帝国成立を宣言(1871.1.18)。初代ドイツ皇帝。ビスマルクの「飴と鞭」＝社会保険＋社会主義者鎮圧法。&quot;}"><rect x="2827.0474137931033" y="183" width="179.80603448275906" height="22" rx="3" fill="rgba(120,130,150,0.2)" stroke="rgba(120,130,150,0.3)" stroke-width="0.5"/><text x="2916.950431034483" y="196.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">ヴィルヘルム1世</text></g><g data-tip="{&quot;n&quot;: &quot;ヴィルヘルム2世&quot;, &quot;e&quot;: &quot;1888-1918&quot;, &quot;d&quot;: &quot;★超。ビスマルクを罷免(1890)→「世界政策(Weltpolitik)」に転換。3B政策(ベルリン・ビザンティウム・バグダード)＝英の3C政策と対立。大海軍建設(ティルピッツ)→英独建艦競争。モロッコ事件(1905,1911)で英仏との緊張。WW1では軍部(ルーデンドルフ・ヒンデンブルク)に実権を奪われる。キール軍港反乱→ドイツ革命→退位(1918.11)→オランダに亡命(1941年死去)。&quot;}"><rect x="3006.8534482758623" y="183" width="199.78448275862047" height="22" rx="3" fill="rgba(120,130,150,0.2)" stroke="rgba(120,130,150,0.3)" stroke-width="0.5"/><text x="3106.7456896551726" y="196.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">ヴィルヘルム2世</text></g><rect x="90" y="212" width="3090" height="28" fill="rgba(255,255,255,.01)" rx="2"/><text x="4" y="229.0" fill="var(--gold2)" font-size="7" font-family="Noto Serif JP" font-weight="700">ロシア</text><g data-tip="{&quot;n&quot;: &quot;イヴァン3世&quot;, &quot;e&quot;: &quot;1462-1505&quot;, &quot;d&quot;: &quot;「タタールのくびき」からの解放(1480)＝キプチャク＝ハンへの貢納を停止しモスクワの実質的独立を達成。周辺のロシア諸公国を併合(ノヴゴロド共和国1478等)→モスクワを中心とした統一国家の形成。ビザンツ最後の皇帝の姪ソフィアと結婚→双頭の鷲を紋章に→「第三のローマ」思想＝ローマ→コンスタンティノープルに続くキリスト教世界の中心はモスクワという自負。&quot;}"><rect x="169.91379310344826" y="215" width="286.35775862068965" height="22" rx="3" fill="rgba(130,80,80,0.2)" stroke="rgba(130,80,80,0.3)" stroke-width="0.5"/><text x="313.0926724137931" y="228.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">イヴァン3世</text></g><g data-tip="{&quot;n&quot;: &quot;イヴァン4世&quot;, &quot;e&quot;: &quot;1533-84&quot;, &quot;d&quot;: &quot;初めてツァーリ(皇帝)を正式に名乗る(1547戴冠)。カザン＝ハン国(1552)・アストラハン＝ハン国(1556)を征服→ヴォルガ川流域を確保。コサックのイェルマークがシベリア進出を開始(1581)。前半は改革的(全国会議＝ゼムスキー＝ソボル)だが後半はオプリーチニナ(親衛隊)による恐怖政治。激怒して息子イヴァンを杖で殴打→死亡(レーピンの絵画で有名)。&quot;}"><rect x="642.7370689655173" y="215" width="339.6336206896551" height="22" rx="3" fill="rgba(130,80,80,0.2)" stroke="rgba(130,80,80,0.3)" stroke-width="0.5"/><text x="812.5538793103449" y="228.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">イヴァン4世(雷帝)</text></g><g data-tip="{&quot;n&quot;: &quot;動乱時代&quot;, &quot;e&quot;: &quot;1584-1613&quot;, &quot;d&quot;: &quot;イヴァン4世死後の後継者問題→フョードル1世(虚弱)→ボリス＝ゴドゥノフ(策謀家)→偽ドミトリー1世(イヴァン4世の息子を僭称)→偽ドミトリー2世。ポーランド軍がモスクワを占領。大飢饉。ミーニンとポジャルスキーがポーランド軍を撃退(1612)→1613年ゼムスキー＝ソボルでミハイル＝ロマノフがツァーリに選出→ロマノフ朝(〜1917)の始まり。&quot;}"><rect x="982.3706896551724" y="215" width="193.1249999999999" height="22" rx="3" fill="rgba(100,100,100,0.2)" stroke="rgba(100,100,100,0.3)" stroke-width="0.5"/><text x="1078.9331896551723" y="228.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">動乱時代</text></g><g data-tip="{&quot;n&quot;: &quot;初期ロマノフ&quot;, &quot;e&quot;: &quot;1613-82&quot;, &quot;d&quot;: &quot;ミハイル(1613-45)：動乱からの秩序回復。アレクセイ(1645-76)：ペレヤスラフ協定(1654)でウクライナのコサック(フメリニツキー)を保護下に→ポーランドからウクライナ左岸を獲得。教会改革(総主教ニーコン)→古儀式派(ラスコーリニキ)の分離＝ロシア正教の分裂。ステンカ＝ラージンの反乱(1670-71)＝ドン＝コサックの大反乱→鎮圧。農奴制の法的固定化(1649年法典)。&quot;}"><rect x="1175.4956896551723" y="215" width="459.5043103448277" height="22" rx="3" fill="rgba(160,100,130,0.2)" stroke="rgba(160,100,130,0.3)" stroke-width="0.5"/><text x="1405.247844827586" y="228.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">初期ロマノフ</text></g><g data-tip="{&quot;n&quot;: &quot;ピョートル1世&quot;, &quot;e&quot;: &quot;1682-1725&quot;, &quot;d&quot;: &quot;★超。西欧視察(大使節団1697-98)→ロシアの強制的西欧化。ひげ税・西洋服の強制。北方戦争(1700-21)＝ナルヴァの敗北(1700)→ポルタヴァの勝利(1709)でスウェーデンに大勝→ニスタット条約でバルト海沿岸を獲得→「インペラートル(皇帝)」の称号。サンクトペテルブルク建設(1703)＝「西への窓」→首都をモスクワから移転。元老院・シノド(宗務院)の設置＝教会を国家に従属させる。息子アレクセイを拷問死させる。&quot;}"><rect x="1635.0" y="215" width="286.35775862068954" height="22" rx="3" fill="rgba(160,100,130,0.2)" stroke="rgba(160,100,130,0.3)" stroke-width="0.5"/><text x="1778.1788793103447" y="228.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">ピョートル大帝</text></g><g data-tip="{&quot;n&quot;: &quot;女帝の時代&quot;, &quot;e&quot;: &quot;1725-62&quot;, &quot;d&quot;: &quot;エカチェリーナ1世(1725-27)→ピョートル2世→アンナ(1730-40)＝ドイツ人寵臣ビロンの専横「ビロンの時代」→イヴァン6世→エリザヴェータ(1741-62)＝七年戦争でプロイセンを追い詰める→ピョートル3世(1762)＝プロイセンを崇拝しフリードリヒ大王と講和→妻エカチェリーナのクーデタで退位(暗殺?)。宮廷革命の連続＝近衛連隊の力が皇帝を左右。&quot;}"><rect x="1921.3577586206895" y="215" width="246.4008620689658" height="22" rx="3" fill="rgba(160,100,130,0.2)" stroke="rgba(160,100,130,0.3)" stroke-width="0.5"/><text x="2044.5581896551726" y="228.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">女帝の時代</text></g><g data-tip="{&quot;n&quot;: &quot;エカチェリーナ2世&quot;, &quot;e&quot;: &quot;1762-96&quot;, &quot;d&quot;: &quot;★超。ドイツ出身の皇妃がクーデタで即位。啓蒙専制君主＝ヴォルテール・ディドロと書簡を交わし「北方のセミラミス」と称される。しかし実態はプガチョフの反乱(1773-75)鎮圧後に農奴制を強化→啓蒙と専制の矛盾。ポーランド分割(第1次1772・第2次1793・第3次1795)でポーランドを消滅させる。オスマン帝国との戦争でキュチュク＝カイナルジ条約(1774)→クリミア併合(1783)→黒海への出口を獲得。&quot;}"><rect x="2167.7586206896553" y="215" width="226.42241379310326" height="22" rx="3" fill="rgba(160,100,130,0.2)" stroke="rgba(160,100,130,0.3)" stroke-width="0.5"/><text x="2280.969827586207" y="228.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">エカチェリーナ2世</text></g><g data-tip="{&quot;n&quot;: &quot;アレクサンドル1世&quot;, &quot;e&quot;: &quot;1801-25&quot;, &quot;d&quot;: &quot;祖母エカチェリーナに溺愛され自由主義的教育を受ける。ナポレオンとティルジット条約(1807)→同盟→決裂→ナポレオンのロシア遠征(1812)＝モスクワを焼いて撤退させる「焦土作戦」→60万の大軍壊滅＝「祖国戦争」。ウィーン会議(1814-15)で神聖同盟を提唱(キリスト教的友愛による国際秩序)。しかし晩年は反動化→デカブリストの乱(1825.12)＝自由主義的将校の反乱(即位直後のニコライ1世が鎮圧)。&quot;}"><rect x="2427.4784482758623" y="215" width="159.82758620689629" height="22" rx="3" fill="rgba(160,100,130,0.2)" stroke="rgba(160,100,130,0.3)" stroke-width="0.5"/><text x="2507.3922413793107" y="228.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">アレクサンドル1世</text></g><g data-tip="{&quot;n&quot;: &quot;ニコライ1世&quot;, &quot;e&quot;: &quot;1825-55&quot;, &quot;d&quot;: &quot;デカブリストの乱を鎮圧して即位→反動政治。「正教・専制・国民性」の三原則。「ヨーロッパの憲兵」＝1848年ハンガリー革命をオーストリアの要請で鎮圧。クリミア戦争(1853-56)で英仏オスマン連合軍に敗北(セヴァストポリ陥落)→ロシアの軍事的・社会的後進性が露呈→パリ条約で黒海の非武装化。敗戦中に死去→息子アレクサンドル2世の改革の契機に。&quot;}"><rect x="2587.3060344827586" y="215" width="199.78448275862047" height="22" rx="3" fill="rgba(160,100,130,0.2)" stroke="rgba(160,100,130,0.3)" stroke-width="0.5"/><text x="2687.198275862069" y="228.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">ニコライ1世</text></g><g data-tip="{&quot;n&quot;: &quot;アレクサンドル2世&quot;, &quot;e&quot;: &quot;1855-81&quot;, &quot;d&quot;: &quot;★超。「解放皇帝」。クリミア戦争の敗北を受け大改革を断行。農奴解放令(1861)＝ロシア近代化の出発点(だが土地はミール＝共同体に帰属→農民の自由な移動は制限)。地方自治制(ゼムストヴォ)導入。裁判制度改革(陪審制)。軍制改革(徴兵制)。露土戦争(1877-78)→サン＝ステファノ条約→ベルリン会議(ビスマルクが調停)でバルカンの大ブルガリアを縮小。ナロードニキ(人民主義者＝「ヴ＝ナロード(人民のなかへ)」運動)に爆弾で暗殺(1881)。&quot;}"><rect x="2787.090517241379" y="215" width="173.14655172413813" height="22" rx="3" fill="rgba(160,100,130,0.2)" stroke="rgba(160,100,130,0.3)" stroke-width="0.5"/><text x="2873.6637931034484" y="228.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">アレクサンドル2世</text></g><g data-tip="{&quot;n&quot;: &quot;アレクサンドル3世&quot;, &quot;e&quot;: &quot;1881-94&quot;, &quot;d&quot;: &quot;父の暗殺を受けて反動化→秘密警察(オフラーナ)強化・大学の自治制限・ゼムストヴォの権限縮小。「露仏同盟」(1891-94)＝ビスマルク体制の崩壊→独が二正面戦争の可能性に直面(WW1の遠因)。シベリア鉄道着工(1891)。蔵相ヴィッテの工業化政策(外資導入・金本位制)。反ユダヤ政策(ポグロム)→ユダヤ人の大量移民(米国・パレスチナへ)。&quot;}"><rect x="2960.237068965517" y="215" width="86.57327586206884" height="22" rx="3" fill="rgba(160,100,130,0.2)" stroke="rgba(160,100,130,0.3)" stroke-width="0.5"/><text x="3003.5237068965516" y="228.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">アレクサンドル3世</text></g><g data-tip="{&quot;n&quot;: &quot;ニコライ2世&quot;, &quot;e&quot;: &quot;1894-1917&quot;, &quot;d&quot;: &quot;★超。ロマノフ朝最後の皇帝。日露戦争(1904-05)で敗北→血の日曜日事件(1905.1)＝ガポン神父率いる平和的デモを軍が銃撃→第一次ロシア革命→十月詔書でドゥーマ(国会)の設立を約束。ストルイピンの農業改革(ミール解体→自作農創出)は暗殺(1911)で中断。WW1参戦→大量の戦死者・物資不足→二月革命(1917.3)→退位→ロマノフ朝滅亡(304年間)。1918年7月エカテリンブルクで一家全員がボリシェヴィキに処刑。&quot;}"><rect x="3046.810344827586" y="215" width="153.16810344827582" height="22" rx="3" fill="rgba(160,100,130,0.2)" stroke="rgba(160,100,130,0.3)" stroke-width="0.5"/><text x="3123.3943965517237" y="228.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">ニコライ2世</text></g><line x1="109.97844827586206" y1="50" x2="109.97844827586206" y2="324" stroke="rgba(201,169,110,.4)" stroke-width="1" stroke-dasharray="2,2"/><text x="109.97844827586206" y="49" text-anchor="middle" fill="rgba(201,169,110,.6)" font-size="5.5" font-family="Noto Sans JP">1453 百年戦争終結</text><line x1="369.69827586206895" y1="50" x2="369.69827586206895" y2="324" stroke="rgba(201,169,110,.4)" stroke-width="1" stroke-dasharray="2,2"/><text x="369.69827586206895" y="49" text-anchor="middle" fill="rgba(201,169,110,.6)" font-size="5.5" font-family="Noto Sans JP">1492 レコンキスタ</text><line x1="536.1853448275863" y1="50" x2="536.1853448275863" y2="324" stroke="rgba(201,169,110,.4)" stroke-width="1" stroke-dasharray="2,2"/><text x="536.1853448275863" y="49" text-anchor="middle" fill="rgba(201,169,110,.6)" font-size="5.5" font-family="Noto Sans JP">1517 宗教改革</text><line x1="789.2456896551724" y1="50" x2="789.2456896551724" y2="324" stroke="rgba(201,169,110,.4)" stroke-width="1" stroke-dasharray="2,2"/><text x="789.2456896551724" y="49" text-anchor="middle" fill="rgba(201,169,110,.6)" font-size="5.5" font-family="Noto Sans JP">1555 アウクスブルク</text><line x1="1009.0086206896552" y1="50" x2="1009.0086206896552" y2="324" stroke="rgba(201,169,110,.4)" stroke-width="1" stroke-dasharray="2,2"/><text x="1009.0086206896552" y="49" text-anchor="middle" fill="rgba(201,169,110,.6)" font-size="5.5" font-family="Noto Sans JP">1588 アルマダ</text><line x1="1208.7931034482758" y1="50" x2="1208.7931034482758" y2="324" stroke="rgba(201,169,110,.4)" stroke-width="1" stroke-dasharray="2,2"/><text x="1208.7931034482758" y="49" text-anchor="middle" fill="rgba(201,169,110,.6)" font-size="5.5" font-family="Noto Sans JP">1618 三十年戦争</text><line x1="1408.5775862068965" y1="50" x2="1408.5775862068965" y2="324" stroke="rgba(201,169,110,.4)" stroke-width="1" stroke-dasharray="2,2"/><text x="1408.5775862068965" y="49" text-anchor="middle" fill="rgba(201,169,110,.6)" font-size="5.5" font-family="Noto Sans JP">1648 ウェストファリア</text><line x1="1681.6163793103449" y1="50" x2="1681.6163793103449" y2="324" str (--gold2)" font-size="7" font-family="Noto Serif JP" font-weight="700">アメリカ大統領</text><g data-tip="{&quot;n&quot;: &quot;ジョージ＝ワシントン&quot;, &quot;e&quot;: &quot;1789-97&quot;, &quot;d&quot;: &quot;初代大統領。独立戦争の英雄。「3選しない」の前例(→22修正で法制化)。中立外交(仏革命への不介入)。首都ワシントンD.C.の建設。連邦主義者(ハミルトン)vs共和派(ジェファソン)の対立が始まる。&quot;}"><rect x="2347.564655172414" y="247" width="53.275862068965125" height="22" rx="3" fill="rgba(180,100,80,0.2)" stroke="rgba(180,100,80,0.3)" stroke-width="0.5"/><text x="2374.2025862068967" y="260.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">ワシントン</text></g><g data-tip="{&quot;n&quot;: &quot;ジョン＝アダムズ&quot;, &quot;e&quot;: &quot;1797-1801&quot;, &quot;d&quot;: &quot;第2代。連邦主義者。仏との準戦争状態。外国人・治安諸法(言論弾圧)→不人気→ジェファソンに敗北。&quot;}"><rect x="2400.840517241379" y="247" width="26.637931034483245" height="22" rx="3" fill="rgba(180,100,80,0.2)" stroke="rgba(180,100,80,0.3)" stroke-width="0.5"/><text x="2414.1594827586205" y="260.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">J.アダムズ</text></g><g data-tip="{&quot;n&quot;: &quot;トマス＝ジェファソン&quot;, &quot;e&quot;: &quot;1801-09&quot;, &quot;d&quot;: &quot;第3代。独立宣言の起草者。ルイジアナ購入(1803)＝ナポレオンから仏領ルイジアナを1500万ドルで購入→国土が倍増。ルイス＝クラーク探検隊。&quot;}"><rect x="2427.4784482758623" y="247" width="53.275862068965125" height="22" rx="3" fill="rgba(180,100,80,0.2)" stroke="rgba(180,100,80,0.3)" stroke-width="0.5"/><text x="2454.116379310345" y="260.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">ジェファソン</text></g><g data-tip="{&quot;n&quot;: &quot;ジェームズ＝マディソン&quot;, &quot;e&quot;: &quot;1809-17&quot;, &quot;d&quot;: &quot;第4代。「憲法の父」。米英戦争(1812-14)＝英がワシントンを焼くも最終的に引き分け→米のナショナリズム高揚。&quot;}"><rect x="2480.7543103448274" y="247" width="53.27586206896558" height="22" rx="3" fill="rgba(180,100,80,0.2)" stroke="rgba(180,100,80,0.3)" stroke-width="0.5"/><text x="2507.3922413793102" y="260.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">マディソン</text></g><g data-tip="{&quot;n&quot;: &quot;ジェームズ＝モンロー&quot;, &quot;e&quot;: &quot;1817-25&quot;, &quot;d&quot;: &quot;第5代。★モンロー宣言(1823)＝「ヨーロッパはアメリカに干渉するな、アメリカもヨーロッパに干渉しない」＝孤立主義の基本原則。「好感の時代」。&quot;}"><rect x="2534.030172413793" y="247" width="53.27586206896558" height="22" rx="3" fill="rgba(180,100,80,0.2)" stroke="rgba(180,100,80,0.3)" stroke-width="0.5"/><text x="2560.668103448276" y="260.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">モンロー</text></g><g data-tip="{&quot;n&quot;: &quot;アンドリュー＝ジャクソン&quot;, &quot;e&quot;: &quot;1829-37&quot;, &quot;d&quot;: &quot;第7代。★ジャクソニアン＝デモクラシー＝白人男子普通選挙の実現・猟官制(スポイルズ＝システム)。「庶民の大統領」。しかし先住民強制移住法(涙の道1838)。&quot;}"><rect x="2613.9439655172414" y="247" width="53.27586206896558" height="22" rx="3" fill="rgba(180,100,80,0.2)" stroke="rgba(180,100,80,0.3)" stroke-width="0.5"/><text x="2640.581896551724" y="260.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">ジャクソン</text></g><g data-tip="{&quot;n&quot;: &quot;エイブラハム＝リンカン&quot;, &quot;e&quot;: &quot;1861-65&quot;, &quot;d&quot;: &quot;第16代。★超。共和党。南北戦争(1861-65)を指導。奴隷解放宣言(1863)。ゲティスバーグ演説「人民の、人民による、人民のための政治」。ホームステッド法(1862)。暗殺(1865.4)。&quot;}"><rect x="2827.0474137931033" y="247" width="26.63793103448279" height="22" rx="3" fill="rgba(180,100,80,0.2)" stroke="rgba(180,100,80,0.3)" stroke-width="0.5"/><text x="2840.3663793103447" y="260.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">リンカン</text></g><g data-tip="{&quot;n&quot;: &quot;アンドリュー＝ジョンソン&quot;, &quot;e&quot;: &quot;1865-69&quot;, &quot;d&quot;: &quot;第17代。南部再建(リコンストラクション)。弾劾裁判にかけられるも1票差で無罪。&quot;}"><rect x="2853.685344827586" y="247" width="26.637931034483245" height="22" rx="3" fill="rgba(180,100,80,0.2)" stroke="rgba(180,100,80,0.3)" stroke-width="0.5"/><text x="2867.004310344828" y="260.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">A.ジョンソン</text></g><g data-tip="{&quot;n&quot;: &quot;ユリシーズ＝グラント&quot;, &quot;e&quot;: &quot;1869-77&quot;, &quot;d&quot;: &quot;第18代。南北戦争の英雄。金ぴか時代の汚職。南部再建の挫折。&quot;}"><rect x="2880.3232758620693" y="247" width="53.275862068965125" height="22" rx="3" fill="rgba(180,100,80,0.2)" stroke="rgba(180,100,80,0.3)" stroke-width="0.5"/><text x="2906.9612068965516" y="260.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">グラント</text></g><g data-tip="{&quot;n&quot;: &quot;ジェームズ＝ガーフィールド&quot;, &quot;e&quot;: &quot;1881&quot;, &quot;d&quot;: &quot;第20代。就任4か月で暗殺。猟官制の弊害が露呈→ペンドルトン法(公務員制度改革1883)。&quot;}"><rect x="2960.237068965517" y="247" width="3" height="22" rx="3" fill="rgba(180,100,80,0.2)" stroke="rgba(180,100,80,0.3)" stroke-width="0.5"/></g><g data-tip="{&quot;n&quot;: &quot;ウィリアム＝マッキンリー&quot;, &quot;e&quot;: &quot;1897-1901&quot;, &quot;d&quot;: &quot;第25代。米西戦争(1898)→フィリピン・グアム・プエルトリコ獲得。帝国主義への転換。1901年暗殺→セオドア＝ローズヴェルトへ。&quot;}"><rect x="3066.7887931034484" y="247" width="26.637931034482335" height="22" rx="3" fill="rgba(180,100,80,0.2)" stroke="rgba(180,100,80,0.3)" stroke-width="0.5"/><text x="3080.1077586206893" y="260.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">マッキンリー</text></g><g data-tip="{&quot;n&quot;: &quot;セオドア＝ローズヴェルト&quot;, &quot;e&quot;: &quot;1901-09&quot;, &quot;d&quot;: &quot;第26代。★棍棒外交(カリブ海への積極介入)。パナマ運河建設(1904-14)。革新主義(トラスト規制・自然保護)。日露戦争の調停(ポーツマス条約1905)→ノーベル平和賞。&quot;}"><rect x="3093.4267241379307" y="247" width="53.275862068966035" height="22" rx="3" fill="rgba(180,100,80,0.2)" stroke="rgba(180,100,80,0.3)" stroke-width="0.5"/><text x="3120.064655172414" y="260.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">T.ローズヴェルト</text></g><g data-tip="{&quot;n&quot;: &quot;ウィリアム＝タフト&quot;, &quot;e&quot;: &quot;1909-13&quot;, &quot;d&quot;: &quot;第27代。ドル外交(中南米への経済的影響力)。&quot;}"><rect x="3146.7025862068967" y="247" width="26.637931034482335" height="22" rx="3" fill="rgba(180,100,80,0.2)" stroke="rgba(180,100,80,0.3)" stroke-width="0.5"/><text x="3160.0215517241377" y="260.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">タフト</text></g><g data-tip="{&quot;n&quot;: &quot;ウッドロー＝ウィルソン&quot;, &quot;e&quot;: &quot;1913-21&quot;, &quot;d&quot;: &quot;第28代。★超。WW1参戦(1917)。十四カ条(1918)＝民族自決・国際連盟・秘密外交廃止。パリ講和会議。しかし米上院がヴェルサイユ条約批准を拒否→連盟に不参加。理想主義外交の挫折。&quot;}"><rect x="3173.340517241379" y="247" width="53.275862068966035" height="22" rx="3" fill="rgba(180,100,80,0.2)" stroke="rgba(180,100,80,0.3)" stroke-width="0.5"/><text x="3199.9784482758623" y="260.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">ウィルソン</text></g><rect x="90" y="276" width="3090" height="28" fill="rgba(255,255,255,.01)" rx="2"/><text x="4" y="293.0" fill="var(--gold2)" font-size="7" font-family="Noto Serif JP" font-weight="700">中国皇帝</text><g data-tip="{&quot;n&quot;: &quot;景泰帝&quot;, &quot;e&quot;: &quot;1449-57&quot;, &quot;d&quot;: &quot;明。土木の変(1449)＝オイラトのエセンがモンゴルに侵攻し英宗を捕虜に→景泰帝が即位して北京を防衛。明の対外的威信が低下。&quot;}"><rect x="83.34051724137932" y="279" width="53.27586206896551" height="22" rx="3" fill="rgba(180,60,60,0.2)" stroke="rgba(180,60,60,0.3)" stroke-width="0.5"/><text x="109.97844827586206" y="292.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">景泰帝</text></g><g data-tip="{&quot;n&quot;: &quot;英宗(天順帝)&quot;, &quot;e&quot;: &quot;1457-64&quot;, &quot;d&quot;: &quot;明。オイラトから帰還後クーデタで復位(奪門の変)。&quot;}"><rect x="136.61637931034483" y="279" width="46.616379310344826" height="22" rx="3" fill="rgba(180,60,60,0.2)" stroke="rgba(180,60,60,0.3)" stroke-width="0.5"/><text x="159.92456896551724" y="292.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">英宗(復辟)</text></g><g data-tip="{&quot;n&quot;: &quot;成化帝&quot;, &quot;e&quot;: &quot;1465-87&quot;, &quot;d&quot;: &quot;明。宦官の専横が深刻化。しかし経済は発展。&quot;}"><rect x="189.89224137931035" y="279" width="146.50862068965523" height="22" rx="3" fill="rgba(180,60,60,0.2)" stroke="rgba(180,60,60,0.3)" stroke-width="0.5"/><text x="263.14655172413796" y="292.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">成化帝</text></g><g data-tip="{&quot;n&quot;: &quot;弘治帝&quot;, &quot;e&quot;: &quot;1488-1505&quot;, &quot;d&quot;: &quot;明の「中興の祖」。宦官の排除と政治の刷新。文治を重視。&quot;}"><rect x="343.06034482758616" y="279" width="113.21120689655174" height="22" rx="3" fill="rgba(180,60,60,0.2)" stroke="rgba(180,60,60,0.3)" stroke-width="0.5"/><text x="399.66594827586204" y="292.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">弘治帝</text></g><g data-tip="{&quot;n&quot;: &quot;正徳帝&quot;, &quot;e&quot;: &quot;1506-21&quot;, &quot;d&quot;: &quot;明。放蕩と遊興。宦官劉瑾の専横。しかし陽明学(王陽明)が興隆。&quot;}"><rect x="462.93103448275866" y="279" width="99.89224137931018" height="22" rx="3" fill="rgba(180,60,60,0.2)" stroke="rgba(180,60,60,0.3)" stroke-width="0.5"/><text x="512.8771551724137" y="292.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">正徳帝</text></g><g data-tip="{&quot;n&quot;: &quot;嘉靖帝&quot;, &quot;e&quot;: &quot;1522-66&quot;, &quot;d&quot;: &quot;明。大礼の議(皇位継承問題)。北虜南倭＝北のモンゴル(アルタン＝ハン)と南の倭寇の二重の脅威。道教に傾倒し政治を顧みず。&quot;}"><rect x="569.4827586206897" y="279" width="293.01724137931035" height="22" rx="3" fill="rgba(180,60,60,0.2)" stroke="rgba(180,60,60,0.3)" stroke-width="0.5"/><text x="715.9913793103449" y="292.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">嘉靖帝</text></g><g data-tip="{&quot;n&quot;: &quot;隆慶帝&quot;, &quot;e&quot;: &quot;1567-72&quot;, &quot;d&quot;: &quot;明。海禁を緩和→民間貿易を部分的に解禁＝銀の流入が加速。&quot;}"><rect x="869.1594827586207" y="279" width="33.29741379310349" height="22" rx="3" fill="rgba(180,60,60,0.2)" stroke="rgba(180,60,60,0.3)" stroke-width="0.5"/><text x="885.8081896551724" y="292.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">隆慶帝</text></g><g data-tip="{&quot;n&quot;: &quot;万暦帝&quot;, &quot;e&quot;: &quot;1573-1620&quot;, &quot;d&quot;: &quot;明。★超。初期は張居正が改革(一条鞭法の全国実施＝税の銀納一本化)。しかし張居正死後は政治を放棄し30年近く朝廷に出ず。万暦三大征(朝鮮出兵＝文禄・慶長の役に明も参戦)で国力を消耗。東林党vs宦官の党争→明の衰亡の決定的要因。&quot;}"><rect x="909.1163793103448" y="279" width="312.99568965517244" height="22" rx="3" fill="rgba(180,60,60,0.2)" stroke="rgba(180,60,60,0.3)" stroke-width="0.5"/><text x="1065.614224137931" y="292.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">万暦帝</text></g><g data-tip="{&quot;n&quot;: &quot;天啓帝&quot;, &quot;e&quot;: &quot;1621-27&quot;, &quot;d&quot;: &quot;明。宦官魏忠賢の専横。東林党を弾圧。後金(ヌルハチ)の脅威が増大。&quot;}"><rect x="1228.771551724138" y="279" width="39.956896551724185" height="22" rx="3" fill="rgba(180,60,60,0.2)" stroke="rgba(180,60,60,0.3)" stroke-width="0.5"/><text x="1248.75" y="292.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">天啓帝</text></g><g data-tip="{&quot;n&quot;: &quot;崇禎帝&quot;, &quot;e&quot;: &quot;1628-44&quot;, &quot;d&quot;: &quot;明最後の皇帝。魏忠賢を排除するも財政破綻・農民反乱(李自成)を阻止できず。李自成が北京を占領→崇禎帝が景山で自縊＝★明の滅亡(1644)。&quot;}"><rect x="1275.3879310344828" y="279" width="106.55172413793093" height="22" rx="3" fill="rgba(180,60,60,0.2)" stroke="rgba(180,60,60,0.3)" stroke-width="0.5"/><text x="1328.6637931034484" y="292.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">崇禎帝</text></g><g data-tip="{&quot;n&quot;: &quot;順治帝(清)&quot;, &quot;e&quot;: &quot;1644-61&quot;, &quot;d&quot;: &quot;清の中国支配の開始。★呉三桂が山海関を開き清軍を招き入れる→李自成を駆逐→北京入城。辮髪の強制＝「頭を留める者は髪を留めず、髪を留める者は頭を留めず」。南明の抵抗を鎮圧。&quot;}"><rect x="1381.9396551724137" y="279" width="113.21120689655163" height="22" rx="3" fill="rgba(100,80,160,0.2)" stroke="rgba(100,80,160,0.3)" stroke-width="0.5"/><text x="1438.5452586206895" y="292.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">順治帝</text></g><g data-tip="{&quot;n&quot;: &quot;康熙帝&quot;, &quot;e&quot;: &quot;1661-1722&quot;, &quot;d&quot;: &quot;★超。清の全盛期の始まり。在位61年(中国史最長)。三藩の乱(呉三桂1673-81)を鎮圧。台湾の鄭氏を滅ぼす(1683)。ネルチンスク条約(1689)＝ロシアと国境画定(中国初の対等条約)。ジュンガル部を撃退。イエズス会宣教師(カスティリオーネ等)を宮廷に招き西洋科学を導入。典礼問題(中国の祖先崇拝とキリスト教の両立)→後にキリスト教布教を禁止。『康熙字典』編纂。&quot;}"><rect x="1495.1508620689654" y="279" width="406.2284482758621" height="22" rx="3" fill="rgba(100,80,160,0.2)" stroke="rgba(100,80,160,0.3)" stroke-width="0.5"/><text x="1698.2650862068963" y="292.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">康熙帝</text></g><g data-tip="{&quot;n&quot;: &quot;雍正帝&quot;, &quot;e&quot;: &quot;1722-35&quot;, &quot;d&quot;: &quot;康熙帝の子。軍機処の設置＝皇帝独裁の強化。地丁銀制(丁税を地税に組み込む＝人頭税の事実上の廃止→人口爆発の一因)。キリスト教布教の禁止を強化。&quot;}"><rect x="1901.3793103448274" y="279" width="86.57327586206907" height="22" rx="3" fill="rgba(100,80,160,0.2)" stroke="rgba(100,80,160,0.3)" stroke-width="0.5"/><text x="1944.6659482758619" y="292.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">雍正帝</text></g><g data-tip="{&quot;n&quot;: &quot;乾隆帝&quot;, &quot;e&quot;: &quot;1735-95&quot;, &quot;d&quot;: &quot;★超。在位60年(祖父康熙を超えないよう退位)。清の最大版図＝新疆(ジュンガル滅亡)・チベット・モンゴル・台湾を統治。「十全武功」。マカートニー使節(1793)＝英ジョージ3世の通商要求を拒否(「天朝は万物を備え外国の産物を必要としない」)→しかしこの時期に英は産業革命の真只中。晩年は和珅(寵臣)の汚職が蔓延。『四庫全書』編纂(ただし禁書・焚書も)。&quot;}"><rect x="1987.9525862068965" y="279" width="399.56896551724117" height="22" rx="3" fill="rgba(100,80,160,0.2)" stroke="rgba(100,80,160,0.3)" stroke-width="0.5"/><text x="2187.737068965517" y="292.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">乾隆帝</text></g><g data-tip="{&quot;n&quot;: &quot;嘉慶帝&quot;, &quot;e&quot;: &quot;1796-1820&quot;, &quot;d&quot;: &quot;白蓮教徒の乱(1796-1804)が清の衰退を示す。和珅を処刑。しかし国力は下降線。&quot;}"><rect x="2394.1810344827586" y="279" width="159.82758620689674" height="22" rx="3" fill="rgba(100,80,160,0.2)" stroke="rgba(100,80,160,0.3)" stroke-width="0.5"/><text x="2474.094827586207" y="292.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">嘉慶帝</text></g><g data-tip="{&quot;n&quot;: &quot;道光帝&quot;, &quot;e&quot;: &quot;1820-50&quot;, &quot;d&quot;: &quot;★アヘン戦争(1840-42)。林則徐がアヘンを焼却→英が開戦→南京条約＝香港割譲・5港開港・不平等条約体制の始まり。「天下」秩序の崩壊。&quot;}"><rect x="2554.0086206896553" y="279" width="199.78448275862047" height="22" rx="3" fill="rgba(100,80,160,0.2)" stroke="rgba(100,80,160,0.3)" stroke-width="0.5"/><text x="2653.9008620689656" y="292.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">道光帝</text></g><g data-tip="{&quot;n&quot;: &quot;咸豊帝&quot;, &quot;e&quot;: &quot;1850-61&quot;, &quot;d&quot;: &quot;太平天国の乱(1851-64)。アロー戦争(1856-60)→北京条約。英仏連合軍が円明園を焼却。咸豊帝は熱河に逃亡し死去→西太后が実権を握る。&quot;}"><rect x="2753.793103448276" y="279" width="73.25431034482745" height="22" rx="3" fill="rgba(100,80,160,0.2)" stroke="rgba(100,80,160,0.3)" stroke-width="0.5"/><text x="2790.4202586206893" y="292.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">咸豊帝</text></g><g data-tip="{&quot;n&quot;: &quot;同治帝&quot;, &quot;e&quot;: &quot;1861-75&quot;, &quot;d&quot;: &quot;西太后と東太后が垂簾聴政。洋務運動(1861-)＝曾国藩・李鴻章・左宗棠が「中体西用」で近代化。同治中興。&quot;}"><rect x="2827.0474137931033" y="279" width="93.23275862068976" height="22" rx="3" fill="rgba(100,80,160,0.2)" stroke="rgba(100,80,160,0.3)" stroke-width="0.5"/><text x="2873.6637931034484" y="292.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">同治帝</text></g><g data-tip="{&quot;n&quot;: &quot;光緒帝&quot;, &quot;e&quot;: &quot;1875-1908&quot;, &quot;d&quot;: &quot;日清戦争(1894-95)敗北→下関条約。戊戌変法(1898)＝康有為・梁啓超の改革→西太后のクーデタで103日で挫折。義和団事件(1900)→北京議定書。光緒帝は西太后に幽閉され1908年に死去(毒殺説)。&quot;}"><rect x="2920.280172413793" y="279" width="219.7629310344828" height="22" rx="3" fill="rgba(100,80,160,0.2)" stroke="rgba(100,80,160,0.3)" stroke-width="0.5"/><text x="3030.1616379310344" y="292.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">光緒帝</text></g><g data-tip="{&quot;n&quot;: &quot;宣統帝(溥儀)&quot;, &quot;e&quot;: &quot;1908-12&quot;, &quot;d&quot;: &quot;清最後の皇帝。3歳で即位。辛亥革命(1911)→1912年退位＝★清朝滅亡・中華民国成立。後に日本の傀儡として満州国皇帝(1934-45)。映画『ラストエンペラー』。&quot;}"><rect x="3140.043103448276" y="279" width="26.63793103448279" height="22" rx="3" fill="rgba(100,80,160,0.2)" stroke="rgba(100,80,160,0.3)" stroke-width="0.5"/><text x="3153.362068965517" y="292.5" text-anchor="middle" fill="var(--text)" font-size="5.5" font-family="Noto Serif JP" font-weight="700">宣統帝(溥儀)</text></g></svg></div>
<div class="note"><p>百年戦争終結(1453)〜WW1(1914)の約460年間。欧州6カ国＋アメリカ大統領＋中国皇帝(明→清)を王朝ごとに色分けし、<strong>「同時代にどの国で誰が統治していたか」を縦に読む</strong>ことで国際関係(同盟・戦争)を立体的に理解できる。★マーク付きの人物は入試で特に。</p></div>
<div class="tt" id="tooltip"><div class="tt-name"></div><div class="tt-era"></div><div class="tt-desc"></div></div><script>var tt=document.getElementById("tooltip");document.querySelectorAll("[data-tip]").forEach(function(el){el.style.cursor="pointer";el.addEventListener("mouseenter",function(e){var d=JSON.parse(el.getAttribute("data-tip"));tt.querySelector(".tt-name").textContent=d.n||"";tt.querySelector(".tt-era").textContent=d.e||"";tt.querySelector(".tt-desc").textContent=d.d||"";tt.style.display="block";var r=el.getBoundingClientRect;var tx=Math.min(r.left,window.innerWidth-370);var ty=r.bottom+6;if(ty+tt.offsetHeight>window.innerHeight)ty=r.top-tt.offsetHeight-6;tt.style.left=Math.max(4,tx)+"px";tt.style.top=ty+"px"});el.addEventListener("mouseleave", function() {tt.style.display="none"})});</script></body></html>
