一<br>ウルのジッグラト(現存する最大級)<br>崩壊：<b>エラム人</b>(東方)と<b>アムル人</b>(西方の遊牧民)の侵入で滅亡→メソポタミアは小国分立へ", "20": "<b>古バビロニア王国(バビロン第1王朝)(BC1894頃-BC1595頃)</b><br>首都：★<b>バビロン</b>(ユーフラテス川中流)<br>民族：<b>アムル人</b>(セム語系の遊牧民出身)<br>★<b>ハンムラビ王</b>(BC1792-BC1750頃)＝メソポタミアを統一→★<b>ハンムラビ法典</b>を制定<br>法典の特徴：①★<b>「目には目を、歯には歯を」(同害復讐法＝タリオの法)</b> ②<b>身分による刑罰の差異</b>(自由人・半自由人(ムシュケーヌム)・奴隷で刑罰が異なる) ③全282条。黒色閃緑岩の石碑に楔形文字で刻まれた(★ルーヴル美術館所蔵)<br>滅亡：★<b>ヒッタイト</b>の攻撃(BC1595頃)で滅亡→カッシート人が支配<br>★入試ポイント：「ハンムラビ法典＝同害復讐法＋身分制」「ウル＝ナンム法典との比較(罰金刑 vs 同害復讐)」", "21": "<b>カッシート(バビロン第3王朝)(BC1595頃-BC1155頃)</b><br>首都：<b>バビロン</b>(後にドゥル＝クリガルズに遷都)<br>ヒッタイトがバビロンを攻撃した後にカッシート人が支配<br>約400年の長期政権＝バビロニア史上最長の王朝(ただし文化的貢献は少なめ)<br>国際外交：エジプト・ヒッタイト・アッシリアとアマルナ外交(国際書簡)<br>★<b>クドゥル(境界石)</b>＝土地寄進の記録→経済史の史料<br>滅亡：<b>エラム人</b>の攻撃で滅亡→ハンムラビ法典の石碑がエラムのスサに持ち去られた(→そこで近代に発掘)", "22": "<b>新バビロニア(カルデア)(BC625-BC539)</b><br>首都：★<b>バビロン</b>(ユーフラテス川にまたがる大都市)<br>建国：ナボポラッサルがアッシリアから独立→メディアと連合してニネヴェを攻略(BC612)<br>最盛期：★<b>ネブカドネザル2世</b>(BC604-BC562)→★<b>バビロン捕囚</b>(BC586＝ユダ王国を滅ぼしエルサレム神殿を破壊→ユダヤ人をバビロンに強制移住)→ユダヤ教の成熟(律法中心の信仰へ)<br><b>バビロンの空中庭園</b>＝世界七不思議の一つ(実在は不確実)<br>イシュタル門(青い彩釉煉瓦＝★ベルリンのペルガモン博物館所蔵)<br>滅亡：★<b>アケメネス朝のキュロス2世</b>に征服(BC539)→★バビロン捕囚の解放＝ユダヤ人がエルサレムに帰還<br>★入試ポイント：「★4王国の一つ」「ネブカドネザル2世＝バビロン捕囚(BC586)」「キュロス2世に滅亡(BC539)→捕囚の解放」", "23": "<b>エラム(BC2700頃-BC640頃)</b><br>首都：★<b>スサ</b>(ザグロス山脈西麓。後にアケメネス朝の行政首都にもなる)<br>メソポタミアの東隣→メソポタミア文明と交流しつつ独自性を維持<br>独自の<b>エラム文字</b>(原エラム文字→線文字エラム。未解読の部分も多い)<br>ウル第3王朝を滅ぼす(BC2004頃)。カッシートを滅ぼす(BC1155頃)→ハンムラビ法典の石碑をスサに持ち帰る<br>最盛期(BC13-12C頃)：チョガ＝ザンビール(ジッグラト)の建設<br>★アッシリアのアッシュルバニパルに壊滅的打撃(BC640頃)→衰退→アケメネス朝に吸収", "24": "<b>メディア王国(BC7C後半-BC550)</b><br>首都：★<b>エクバタナ(ハマダーン)</b>(イラン高原西部)<br>★<b>イラン系民族で最初の統一王国</b><br>キュアクサレス王がアッシリア滅亡に貢献(BC612、新バビロニアと連合してニネヴェ攻略)<br>ザグロス山脈以東のイラン高原を支配<br>リディアと衝突→日食(BC585.5.28、「タレスが予言した日食」)で停戦<br>滅亡：★<b>アケメネス朝のキュロス2世</b>(元はメディアの臣下→反乱して独立)に倒される(BC550)→アケメネス朝ペルシアの建国<br>★入試ポイント：「★4王国の一つ」「エクバタナ」「キュロス2世に滅亡(BC550)＝アケメネス朝建国」"};
