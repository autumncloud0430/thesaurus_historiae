var map=L.map('map',{zoomControl:true,attributionControl:false}).setView([39,-98],4);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}@2x.png',{maxZoom:10,minZoom:3}).addTo(map);

var colors=['#4a90d9','#6aaa64','#d4a040','#c44e52','#b07acc','#3a9fbf','#e06666','#8fbc5e'];
var ci=0;

var geoLayer=L.geoJSON(TERR,{
  style:function(f){
    var col=colors[(ci++)%colors.length];
    return{color:col,weight:1.5,fillColor:col,fillOpacity:0.15,opacity:0.6};
  },
  onEachFeature:function(f,layer){
    var name=f.properties.N;
    var info=INFO[name];
    var popup;
    if(info){
      popup='<strong>'+info[0]+'</strong> ('+name+')<br><span class="cap">州都: '+info[1]+'</span><br>'+info[2];
    } else {
      popup='<strong>'+name+'</strong>';
    }
    layer.bindPopup(popup,{maxWidth:280});
    layer._stateName=name;
    layer._stateJP=info?info[0]:'';
  }
}).addTo(map);

// Labels
var labels=[];
geoLayer.eachLayer(function(layer){
  var name=layer.feature.properties.N;
  var info=INFO[name];
  if(!info)return;
  var center=layer.getBounds().getCenter();
  var icon=L.divIcon({className:'sl',html:'<div style="font-size:8px;color:rgba(255,255,255,.7);font-weight:600;text-shadow:0 0 4px #000;white-space:nowrap;font-family:Noto Sans JP">'+info[0]+'</div>',iconSize:null});
  var m=L.marker(center,{icon:icon,interactive:false});
  m._minZ=4;labels.push(m);
});
function updateLabels(){var z=map.getZoom();labels.forEach(function(m){if(z>=m._minZ){if(!map.hasLayer(m))map.addLayer(m);}else{if(map.hasLayer(m))map.removeLayer(m);}});}
map.on('zoomend',updateLabels);updateLabels();

document.getElementById('search').addEventListener('input',function(){
  var q=this.value.toLowerCase();var count=0;
  geoLayer.eachLayer(function(layer){
    var match=q===''||layer._stateName.toLowerCase().indexOf(q)>=0||(layer._stateJP&&layer._stateJP.indexOf(q)>=0);
    if(match){layer.setStyle({fillOpacity:0.15,opacity:0.6});count++;}
    else{layer.setStyle({fillOpacity:0.02,opacity:0.1});}
  });
  document.getElementById('count').textContent=count+'州表示中';
});
