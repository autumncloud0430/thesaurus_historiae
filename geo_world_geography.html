*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',sans-serif;background:#06090f;color:#d4cfc6;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.hdr{padding:8px 14px;border-bottom:1px solid rgba(201,169,110,.08);display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0}
.hdr h1{font-size:13px;font-weight:700;color:#e8c888}
.hdr a{font-size:11px;color:#c9a96e;text-decoration:none;opacity:.5}.hdr a:hover{opacity:1}
.tb{padding:2px 9px;border-radius:4px;border:1px solid transparent;cursor:pointer;font-size:10px;font-weight:600;font-family:inherit;transition:all .18s;background:rgba(255,255,255,.05);color:#555}
.tb:hover{filter:brightness(1.2)}.tb.on{border-color:rgba(255,255,255,.15);color:#ccc;background:rgba(255,255,255,.1)}
.controls{display:flex;gap:3px;padding:4px 12px;flex-wrap:wrap;border-bottom:1px solid rgba(201,169,110,.04);flex-shrink:0}
.cat-btn{font-size:7px;padding:3px 7px;border:1px solid rgba(255,255,255,.1);border-radius:3px;background:rgba(255,255,255,.03);color:#8a857d;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:3px;font-family:inherit}
.cat-btn:hover{background:rgba(255,255,255,.06)}
.cat-btn.on{color:#e0dcd6;background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2)}
.cat-btn .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.si{padding:3px 8px;border-radius:4px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.04);color:#e0dcd6;font-size:11px;font-family:inherit;width:120px;outline:none}
.si::placeholder{color:#444}
.cnt{font-size:9px;color:#555}
.search-wrap{display:flex;align-items:center;gap:6px;padding:3px 12px;border-bottom:1px solid rgba(201,169,110,.04);flex-shrink:0}
.search-wrap .hint{font-size:7px;color:#444;margin-left:6px}
#map{flex:1}
.leaflet-popup-content{font-family:'Noto Sans JP',sans-serif;font-size:10px;line-height:1.6;color:#333;max-width:260px}
.leaflet-popup-content strong{color:#8b5e3c}
.leaflet-popup-content .cat-tag{display:inline-block;font-size:7px;padding:1px 5px;border-radius:3px;margin-bottom:3px}
.layer-tog{display:flex;gap:4px;padding:3px 12px;border-bottom:1px solid rgba(201,169,110,.04);flex-shrink:0;align-items:center}
.layer-tog label{font-size:8px;color:#8a857d;display:flex;align-items:center;gap:3px;cursor:pointer}
.layer-tog input{width:12px;height:12px}

@media(max-width:600px){
.hdr,.top{padding:8px 10px}.hdr h1,.top h1{font-size:11px}
#map{height:60vh!important}
.legend .li{font-size:6.5px}
.legend .ld{width:16px;height:8px}
.controls{gap:2px;padding:4px 8px}
.cat-btn{font-size:6.5px;padding:2px 5px}
.layer-tog{gap:3px;padding:3px 8px}
.layer-tog label{font-size:7px}
.search-wrap{padding:3px 8px}
.search-wrap input,.si{width:120px;font-size:9px;padding:3px 6px}
.tb{font-size:8px;padding:2px 6px}
.note p{font-size:8px}
}
</style>

// Layer toggles
function toggleLayers(layers,show){layers.forEach(function(l){if(show)l.addTo(map);else map.removeLayer(l);})}
document.getElementById('tog-rivers').onchange=function(){toggleLayers(riverLayers,this.checked)};
document.getElementById('tog-lakes').onchange=function(){toggleLayers(lakeLayers,this.checked)};
document.getElementById('tog-mountains').onchange=function(){toggleLayers(mtnLayers,this.checked)};
document.getElementById('tog-deserts').onchange=function(){toggleLayers(desertLayers,this.checked)};

// Point markers (from existing GEO data)
var allMarkers=[];
var activeCats=new Set(Object.keys(CATS));
var ctr=document.getElementById('controls');

var allBtn=document.createElement('button');
allBtn.className='cat-btn on';allBtn.textContent='全表示/非表示';
allBtn.onclick=function(){if(activeCats.size===Object.keys(CATS).length)activeCats.clear();else activeCats=new Set(Object.keys(CATS));updateButtons();updateMarkers();};
ctr.appendChild(allBtn);

Object.keys(CATS).forEach(function(cat){
  var btn=document.createElement('button');btn.className='cat-btn on';btn.setAttribute('data-cat',cat);
  btn.innerHTML='<span class="dot" style="background:'+CATS[cat].color+'"></span>'+CATS[cat].icon+' '+CATS[cat].label+'('+GEO[cat].length+')';
  btn.onclick=function(){if(activeCats.has(cat))activeCats.delete(cat);else activeCats.add(cat);updateButtons();updateMarkers();};
  ctr.appendChild(btn);
});
function updateButtons(){document.querySelectorAll('.cat-btn[data-cat]').forEach(function(b){b.classList.toggle('on',activeCats.has(b.getAttribute('data-cat')));});}

Object.keys(GEO).forEach(function(cat){
  var cfg=CATS[cat];
  GEO[cat].forEach(function(item){
    var name=item[0],lat=item[1],lng=item[2],desc=item[3],minZoom=item[4];
    var icon=L.divIcon({className:'gm',html:'<div style="background:'+cfg.color+';color:#fff;font-size:8px;font-weight:600;padding:2px 5px;border-radius:3px;white-space:nowrap;border:1px solid rgba(255,255,255,.15);font-family:Noto Sans JP,sans-serif;box-shadow:0 1px 3px rgba(0,0,0,.5)">'+cfg.icon+' '+name+'</div>',iconSize:null,iconAnchor:[0,10]});
    var marker=L.marker([lat,lng],{icon:icon});
    marker.bindPopup('<div class="cat-tag" style="background:'+cfg.color+'22;color:'+cfg.color+';border:1px solid '+cfg.color+'44">'+cfg.icon+' '+cfg.label+'</div><br><strong>'+name+'</strong><br>'+desc,{maxWidth:260});
    marker._geoName=name;marker._geoCat=cat;marker._minZoom=minZoom;
    allMarkers.push(marker);
  });
});

var markersVisible=true;
document.getElementById('tog-markers').onchange=function(){markersVisible=this.checked;updateMarkers();};

function updateMarkers(){
  var query=document.getElementById('search').value.toLowerCase();
  var zoom=map.getZoom();var count=0;
  allMarkers.forEach(function(m){
    var show=markersVisible&&activeCats.has(m._geoCat)&&(query===''||m._geoName.toLowerCase().indexOf(query)>=0)&&(zoom>=m._minZoom||query!=='');
    if(show){if(!map.hasLayer(m))map.addLayer(m);count++;}
    else{if(map.hasLayer(m))map.removeLayer(m);}
  });
  document.getElementById('count').textContent=count+'件表示中';
}
updateMarkers();
map.on('zoomend',updateMarkers);

});
