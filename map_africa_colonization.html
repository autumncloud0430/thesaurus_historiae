.phase-desc{text-align:center;font-size:9px;color:var(--text3);padding:0 16px 6px}

@media(max-width:600px){

.wrap{padding:12px 8px}

.desc p{font-size:9px}
.desc h2{font-size:11px}
.side-note{font-size:7.5px}
.note p{font-size:8px}
}

"NAM":["ger",1990,"ナミビア","独領南西アフリカ→南ア委任統治→1990年独立"],
"NER":["fra",1960,"ニジェール","仏領"],
"NGA":["eng",1960,"ナイジェリア","英領。アフリカ最大人口。ビアフラ戦争(1967-70)"],
"RWA":["ger",1962,"ルワンダ","★独領東アフリカの一部(1884-1916)→WW1後にベルギー委任統治→1994年ジェノサイド"],
"SEN":["fra",1960,"セネガル","仏領。サンゴール大統領"],
"SLE":["eng",1961,"シエラレオネ","英領。解放奴隷の入植地"],
"SOM":["ita",1960,"ソマリア","英領＋伊領が統合"],
"ZAF":["eng",1910,"南アフリカ","ボーア戦争(1899-1902)。アパルトヘイト(1948-94)→マンデラ"],
"SSD":["eng",2011,"南スーダン","英埃共同統治→2011年独立(最新)"],
"SDN":["eng",1956,"スーダン","英埃共同統治"],
"TZA":["ger",1961,"タンザニア","独領東アフリカ→英委任統治"],
"TGO":["ger",1960,"トーゴ","★独領トーゴランド(1884-1914)→WW1後に英仏委任統治→1960年仏領部分が独立"],
"TUN":["fra",1956,"チュニジア","仏保護国(1881-)。「アラブの春」発火点"],
"UGA":["eng",1962,"ウガンダ","英領"],
"ZMB":["eng",1964,"ザンビア","英領北ローデシア"],
"ZWE":["eng",1980,"ジンバブエ","英領南ローデシア→白人少数支配→1980年独立"],
"ESH":["spa",0,"西サハラ","西領→モロッコ領有主張。未解決"]};
var C={eng:"rgba(60,120,190,.5)",fra:"rgba(120,80,170,.5)",spa:"rgba(180,80,80,.45)",por:"rgba(80,150,60,.45)",ger:"rgba(130,130,130,.45)",ita:"rgba(150,130,80,.45)",bel:"rgba(140,90,120,.45)",ott:"rgba(150,140,90,.4)",free:"rgba(201,169,110,.4)"};
var NC="rgba(100,90,70,.2)";

var early={"DZA":1,"AGO":1,"ZAF":1,"SEN":1,"GMB":1,"SLE":1,"GHA":1,"NGA":1,"MOZ":1,"EGY":1,"LBY":1,"TUN":1,"MAR":1,"LBR":1,"ETH":1};

function gc(iso,ph){
  var d=D[iso];if(!d)return NC;
  if(d[0]==="free")return C.free;
  if(ph==="now")return C.free;
  if(ph==="1975")return d[1]<=1975?C.free:C[d[0]];
  if(ph==="1960")return d[1]<=1960?C.free:C[d[0]];
  if(ph==="1945"){
    if(d[1]<=1945)return C.free;
    if(iso==="NAM")return C.eng;
    if(iso==="TZA")return C.eng;
    if(iso==="CMR"||iso==="TGO")return C.fra;
    if(iso==="RWA"||iso==="BDI")return C.bel;
    return C[d[0]];
  }
  if(ph==="1914")return C[d[0]];
  if(ph==="pre"){
    if(early[iso]){
      if(iso==="LBR"||iso==="ETH")return C.free;
      if(iso==="EGY"||iso==="TUN"||iso==="LBY")return C.ott;
      return C[d[0]];
    }
    return NC;
  }
  return C[d[0]];
}

var phases=[
  ["pre","ベルリン会議前(~1884)","沿岸部のみ。内陸は未植民地化"],
  ["1914","第一次大戦前(1914)","分割ほぼ完了。独立はエチオピアとリベリアだけ"],
  ["1945","第二次大戦後(1945)","独の植民地が委任統治に移管"],
  ["1960","「アフリカの年」(1960)","17カ国が独立（仏領中心）"],
  ["1975","葡領の独立(1975)","カーネーション革命→アンゴラ・モザンビーク独立"],
  ["now","現在","南スーダン(2011)が最新"]
];

var cur="1914";
var bc=document.getElementById("btns");
var dc=document.getElementById("desc");
phases.forEach(function(p){
  var b=document.createElement("button");
  b.textContent=p[1];b.setAttribute("data-p",p[0]);
  if(p[0]===cur)b.className="active";
  b.onclick=function(){
    cur=p[0];
    document.querySelectorAll(".phases button").forEach(function(x){x.className=""});
    b.className="active";
    dc.textContent=p[2];
    document.querySelectorAll(".country").forEach(function(el){
      var iso=el.getAttribute("data-iso");
      el.style.fill=gc(iso,cur);
    });
  };
  bc.appendChild(b);
});
dc.textContent=phases[1][2];

// Initial paint
document.querySelectorAll(".country").forEach(function(el){
  var iso=el.getAttribute("data-iso");
  el.style.fill=gc(iso,cur);
});

// Tooltip
var tip=document.getElementById("tip");
var tm=false,tt=null;
document.addEventListener("touchstart",function(e){tm=false;tt=e.target},{passive:true});
document.addEventListener("touchmove",function(){tm=true},{passive:true});
document.addEventListener("touchend",function(e){
  if(tm)return;
  var c=tt?tt.closest(".country"):null;
  if(c){e.preventDefault();showTip(c,e)}else if(!tt||!tt.closest("#tip"))tip.style.display="none";
});
document.querySelectorAll(".country").forEach(function(el){
  el.addEventListener("mouseenter",function(e){showTip(el,e)});
  el.addEventListener("mouseleave",function(){tip.style.display="none"});
});

function showTip(el,e){
  var iso=el.getAttribute("data-iso");
  var d=D[iso];if(!d)return;
  var h="<strong>"+d[2]+"</strong>";
  if(d[1]>0)h+=" ("+d[1]+"年独立)";
  h+="<br>"+d[3];
  tip.innerHTML=h;tip.style.display="block";
  var r=el.getBoundingClientRect();
  var l=r.left+r.width/2;
  if(l>window.innerWidth-160)l=window.innerWidth-310;
  if(l<10)l=10;
  tip.style.left=l+"px";
  tip.style.top=(r.top-80>10?r.top-80:r.bottom+10)+"px";
}
})();
</script></body></html>
